<script>
window._bidbotData = { ready: false, onReady: null };
const _db = supabase.createClient(
  "https://powcnxmsrxixufcqbxbw.supabase.co",
  "sb_publishable_P_iPFer-s3i8zV8106O_zQ_McYNHXeJ"
);
window._db = _db;
// Catch OAuth callback as early as possible, before React mounts
_db.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN' && session) {
    // Session is now stored; React's resolveProfile will pick it up via getSession()
    if (window.location.hash && window.location.hash.includes('access_token')) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  }
});

// If Supabase returned an OAuth session via URL hash, parse it now before React mounts
// so that getSession() inside the React useEffect finds it immediately.
if (window.location.hash && window.location.hash.includes('access_token')) {
  _db.auth.getSession().then(function(res) {
    if (res.data && res.data.session) {
      // Session stored; strip the hash so the router doesn't misinterpret it
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  });
}

// Mount immediately; all data loads after auth state is confirmed
window._bidbotData.ready = true;
if (window._bidbotData.onReady) window._bidbotData.onReady();
</script>

// ─── PLATFORM BADGE ───────────────────────────────────────────────────────────
function getPlatformBadge(url) {
  if (!url) return null;
  const u = url.toLowerCase();
  let label, bg, border, color;
  if (u.includes("bidnetdirect.com"))      { label="BidNet";      bg="rgba(59,130,246,0.15)";  border="rgba(59,130,246,0.35)";  color="#3b82f6"; }
  else if (u.includes("govdeals.com"))     { label="GovDeals";    bg="rgba(16,185,129,0.15)";  border="rgba(16,185,129,0.35)";  color="#10b981"; }
  else if (u.includes("bonfirehub.com"))   { label="Bonfire";     bg="rgba(249,115,22,0.15)";  border="rgba(249,115,22,0.35)";  color="#f97316"; }
  else if (u.includes("bidprime.com"))     { label="BidPrime";    bg="rgba(168,85,247,0.15)";  border="rgba(168,85,247,0.35)";  color="#a855f7"; }
  else if (u.includes("demandstar.com"))   { label="DemandStar";  bg="rgba(20,184,166,0.15)";  border="rgba(20,184,166,0.35)";  color="#14b8a6"; }
  else if (u.includes("ionwave.net"))      { label="IonWave";     bg="rgba(234,179,8,0.15)";   border="rgba(234,179,8,0.35)";   color="#eab308"; }
  else if (u.includes("drive.google.com")) { label="Google Drive";bg="rgba(59,130,246,0.15)";  border="rgba(59,130,246,0.35)";  color="#3b82f6"; }
  else if (u.includes("box.com"))          { label="Box";         bg="rgba(59,130,246,0.15)";  border="rgba(59,130,246,0.35)";  color="#3b82f6"; }
  else if (u.includes("dropbox.com"))      { label="Dropbox";     bg="rgba(59,130,246,0.15)";  border="rgba(59,130,246,0.35)";  color="#3b82f6"; }
  else if (u.match(/school|district|k12|\.edu/)) { label="Website"; bg="rgba(148,163,184,0.15)"; border="rgba(148,163,184,0.35)"; color="#94a3b8"; }
  else                                     { label="Link";        bg="rgba(148,163,184,0.15)"; border="rgba(148,163,184,0.35)"; color="#94a3b8"; }
  return <span style={{ display:"inline-block", background:bg, border:`1px solid ${border}`, color, fontSize:"9px", fontWeight:700, padding:"1px 5px", borderRadius:"3px", letterSpacing:"0.05em", marginLeft:"4px", verticalAlign:"middle", whiteSpace:"nowrap" }}>{label}</span>;
}

// ─── LINK BADGE HELPERS ───────────────────────────────────────────────────────
function badgeLink(url, label, bg, border, color) {
  return (
    <a href={url} target="_blank" rel="noreferrer" style={{ textDecoration:"none" }}>
      <span style={{ display:"inline-block", background:bg, border:`1px solid ${border}`, color, fontSize:"9px", fontWeight:700, padding:"1px 5px", borderRadius:"3px", letterSpacing:"0.05em", verticalAlign:"middle", whiteSpace:"nowrap" }}>{label}</span>
    </a>
  );
}

  if (u.includes("ionwave.net"))                   return badgeLink(url, "IonWave",       "rgba(234,179,8,0.15)",   "rgba(234,179,8,0.35)",   "#eab308");
  if (u.includes("sam.gov"))                       return badgeLink(url, "SAM.gov",       "rgba(198,12,48,0.15)",   "rgba(198,12,48,0.35)",   "#C60C30");
  if (u.includes("planetbids.com"))                return badgeLink(url, "PlanetBids",    "rgba(168,85,247,0.15)",  "rgba(168,85,247,0.35)",  "#a855f7");
  if (u.includes("publicpurchase.com"))            return badgeLink(url, "PublicPurchase","rgba(20,184,166,0.15)",  "rgba(20,184,166,0.35)",  "#14b8a6");
  if (u.includes("periscope.com") || u.includes("bids.periscope")) return badgeLink(url, "Periscope", "rgba(234,179,8,0.15)", "rgba(234,179,8,0.35)", "#eab308");
  if (u.includes("bidsync.com"))                   return badgeLink(url, "BidSync",       "rgba(59,130,246,0.15)",  "rgba(59,130,246,0.35)",  "#3b82f6");
  if (u.includes("onvia.com"))                     return badgeLink(url, "Onvia",         "rgba(16,185,129,0.15)",  "rgba(16,185,129,0.35)",  "#10b981");
  if (u.includes("sciquest.com"))                  return badgeLink(url, "SciQuest",      "rgba(249,115,22,0.15)",  "rgba(249,115,22,0.35)",  "#f97316");
  return <a href={url} target="_blank" rel="noreferrer" style={{ color:"#B0B7BC", fontSize:"11px", textDecoration:"underline" }}>View</a>;
}

// Availability indicator for Box links: true=✓ false=✕ null=?
function docAvailBadge(docAvailable) {
  if (docAvailable === true)  return <span title="Document available"    style={{ color:"#10b981", fontWeight:700, fontSize:"11px", marginLeft:"3px" }}>✓</span>;
  if (docAvailable === false) return <span title="Document unavailable"  style={{ color:"#C60C30", fontWeight:700, fontSize:"11px", marginLeft:"3px" }}>✕</span>;
  return                             <span title="Availability unknown"  style={{ color:"#4a6080", fontWeight:700, fontSize:"11px", marginLeft:"3px" }}>?</span>;
}

// DOC URL / BID DOC cell — file type badges + platform badges
// Pass onExtract to get a "→" arrow on PDFs that triggers contact extraction
// Pass docAvailable (true/false/null) to show availability indicator on Box links
function docUrlCell(url, onExtract, docAvailable) {
  if (!url) return <span style={{ color:"#4a6080" }}>—</span>;
  const u = url.toLowerCase();
  if (u.includes(".pdf")) {
    return (
      <span style={{ display:"inline-flex", alignItems:"center", gap:"4px" }}>
        {badgeLink(url, "PDF", "rgba(249,115,22,0.15)", "rgba(249,115,22,0.35)", "#f97316")}
        {onExtract && <span onClick={onExtract} title="Extract contacts" style={{ cursor:"pointer", color:"#f97316", fontSize:"12px", fontWeight:700, lineHeight:1 }}>→</span>}
      </span>
    );
  }
  if (u.match(/\.docx?(\?|$)/) || u.includes(".docx") || u.includes(".doc"))
    return badgeLink(url, "DOC", "rgba(59,130,246,0.15)", "rgba(59,130,246,0.35)", "#3b82f6");
  if (u.match(/\.xlsx?(\?|$)/) || u.includes(".xlsx") || u.includes(".xls"))
    return badgeLink(url, "XLS", "rgba(16,185,129,0.15)", "rgba(16,185,129,0.35)", "#10b981");
  if (u.includes("docs.google.com") || u.includes("drive.google.com")) return badgeLink(url, "Google Drive", "rgba(59,130,246,0.15)", "rgba(59,130,246,0.35)", "#3b82f6");
  if (u.includes("box.com"))          return <span style={{ display:"inline-flex", alignItems:"center" }}>{badgeLink(url, "Box", "rgba(59,130,246,0.15)", "rgba(59,130,246,0.35)", "#3b82f6")}{docAvailBadge(docAvailable)}</span>;
  if (u.includes("dropbox.com"))      return badgeLink(url, "Dropbox", "rgba(59,130,246,0.15)", "rgba(59,130,246,0.35)", "#3b82f6");
  return <a href={url} target="_blank" rel="noreferrer" style={{ color:"#B0B7BC", fontSize:"11px", textDecoration:"underline" }}>View</a>;
}

function ScoreBadge({ score }) {
  const color = score >= 70 ? "#10b981" : score >= 50 ? "#C60C30" : "#B0B7BC";
  return (
    <span style={{
      background:`${color}18`, border:`1px solid ${color}40`,
      color, fontSize:"11px", fontWeight:700, padding:"2px 8px", borderRadius:"99px",
      fontFamily:"'Courier New',monospace"
    }}>{score}</span>
  );
}

function TierBadge({ tier }) {
  return (
    <span style={{
      background: tier==="HOT" ? "rgba(198,12,48,0.15)" : "rgba(198,12,48,0.15)",
      border: tier==="HOT" ? "1px solid rgba(198,12,48,0.3)" : "1px solid rgba(198,12,48,0.3)",
      color: tier==="HOT" ? "#C60C30" : "#C60C30",
      fontSize:"10px", fontWeight:700, padding:"2px 8px", borderRadius:"4px", letterSpacing:"0.05em"
    }}>{tier}</span>
  );
}

function StatusDot({ status }) {
  const colors = { active:"#10b981", error:"#C60C30", skipped:"#B0B7BC", success:"#10b981", failed:"#C60C30" };
  const labels = { active:"Active", error:"Error", skipped:"Skipped", success:"Success", failed:"Failed" };
  return (
    <span style={{ display:"flex", alignItems:"center", gap:"5px" }}>
      <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:colors[status]||"#B0B7BC", display:"inline-block" }} />
      <span style={{ color:colors[status]||"#B0B7BC", fontSize:"12px" }}>{labels[status]||status}</span>
    </span>
  );
}

function DashboardView({ onNavigate, onRunScan, scanning }) {

    ? []  // Reset to 0 while scan is running
    : window._bidbotData && window._bidbotData.ready
      ? (window._LIVE_HOT || []).filter(l => l.tier === "HOT")
      : (window._LIVE_HOT || []).filter(l=>l.tier==="HOT");
  const liveSources = window._LIVE_SOURCES || [];
  const totalSources = window._bidbotData && window._bidbotData.ready ? liveSources.length : MOCK_SOURCES.length;
  const activeSources = window._bidbotData && window._bidbotData.ready ? liveSources.filter(s=>!s.captcha_protected).length : MOCK_SOURCES.filter(s=>!s.captcha_protected).length;
  const captchaSources = window._bidbotData && window._bidbotData.ready ? liveSources.filter(s=>s.captcha_protected).length : MOCK_SOURCES.filter(s=>s.captcha_protected).length;
  const weekLeads = window._bidbotData && window._bidbotData.ready ? (window._ALL_LEADS||[]).filter(l=>{
    const d = new Date(l.scan_date); const now = new Date();
    const diff = (now - d) / (1000*60*60*24);
    return diff <= 7 && l.tier === "HOT";
  }).length : 42;
  const stats = [
    { label:"HOT Leads Today", value:today.length, icon:Flame, color:"#C60C30", sub:"New this scan", page:"hot_leads" },
    { label:"Total Sources", value:totalSources, icon:Globe, color:"#B0B7BC", sub:`${activeSources} active · ${captchaSources} CAPTCHA`, page:"sources" },
    { label:"Hot Leads This Week", value:weekLeads, icon:TrendingUp, color:"#10b981", sub:"Last 7 days", page:"hot_leads" },
    { label:"Sources Added / Month", value:activeSources, icon:Plus, color:"#B0B7BC", sub:"Active sources", page:"sources" },

  return (
    <div style={{ padding:"28px", overflowY:"auto", flex:1 }}>

            {MOCK_SCAN_HISTORY.slice(0,3).map((s,i)=>(
              <tr key={s.id} style={{ borderTop:"1px solid #003366", background:i%2===0?"transparent":"rgba(255,255,255,0.01)" }}>
                <td style={{ padding:"11px 16px", fontSize:"12px", color:"#B0B7BC", fontFamily:"monospace" }}>{s.date || (s.started_at ? new Date(s.started_at.endsWith("Z") ? s.started_at : s.started_at + "Z").toLocaleDateString("en-CA",{timeZone:"America/New_York"}) : "—")}</td>
                <td style={{ padding:"11px 16px", fontSize:"12px", color:"#B0B7BC", fontFamily:"monospace" }}>{s.time || (s.started_at ? new Date(s.started_at.endsWith("Z") ? s.started_at : s.started_at + "Z").toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true,timeZone:"America/New_York"}) : "—")}</td>
                <td style={{ padding:"11px 16px" }}>
                    {s.captcha_protected
                      ? <span style={{ fontSize:"11px", padding:"3px 8px", borderRadius:"99px", background:"rgba(176,183,188,0.15)", color:"#B0B7BC", border:"1px solid rgba(176,183,188,0.3)", fontWeight:600 }}>🔒 CAPTCHA</span>
                      : <StatusDot status={s.status || "active"} />
                    }
                  </td>
                <td style={{ padding:"11px 16px", fontSize:"12px", color:"#B0B7BC", fontFamily:"monospace" }}>
                  {s.duration || 
                   (s.finished_at && s.started_at ? Math.floor((new Date(s.finished_at)-new Date(s.started_at))/60000)+"m" : 
                   (s.duration_seconds ? Math.floor(s.duration_seconds/60)+"m "+s.duration_seconds%60+"s" : "—"))}
                </td>
                <td style={{ padding:"11px 16px", fontSize:"13px", color: (s.hot_leads||s.hot_count||0)>0?"#10b981":"#B0B7BC", fontWeight:600 }}>
                  {s.hot_leads ?? s.hot_count ?? s.leads_found ?? "—"}
                </td>
                <td style={{ padding:"11px 16px", fontSize:"12px", color: (s.errors||s.error_count||0)>0?"#C60C30":"#B0B7BC" }}>
                  {s.errors ?? s.error_count ?? 0}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SourcesView() {
  const [sources, setSources] = useState(MOCK_SOURCES);
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [editingId, setEditingId] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [showAddModal, setShowAddModal] = useState(false);
  const [showCsvModal, setShowCsvModal] = useState(false);
  const [stateFilter, setStateFilter] = useState("all");
  const [confirmRemove, setConfirmRemove] = useState(null); // source id
  const [showInactive, setShowInactive] = useState(false);

  async function removeSource(id) {
    setConfirmRemove(null);
    setSources(prev => prev.map(s => s.id === id ? { ...s, status: "inactive" } : s));
    if (window._db) await window._db.from("sources").update({ status: "inactive" }).eq("id", id);
  }

  async function restoreSource(id) {
    setSources(prev => prev.map(s => s.id === id ? { ...s, status: "active" } : s));
    if (window._db) await window._db.from("sources").update({ status: "active" }).eq("id", id);
  }

  const sourceStates = ["all", ...Array.from(new Set(sources.map(s=>s.state).filter(Boolean))).sort()];
  const filtered = sources.filter(s => {
    if (s.status === "inactive" && !showInactive) return false;
    const matchSearch = !search || (s.friendly_name||"").toLowerCase().includes(search.toLowerCase()) ||
      (s.url||"").toLowerCase().includes(search.toLowerCase()) || (s.state||"").toLowerCase().includes(search.toLowerCase());
    const matchState = stateFilter === "all" || s.state === stateFilter;
    return matchSearch && matchState;
  });

  const allChecked = filtered.length > 0 && filtered.every(s=>selected.has(s.id));
  const toggleAll = () => {
    if (allChecked) setSelected(new Set());
    else setSelected(new Set(filtered.map(s=>s.id)));
  };
  const toggleRow = (id) => {
    const ns = new Set(selected);
    ns.has(id) ? ns.delete(id) : ns.add(id);
    setSelected(ns);
  };

  const startEdit = (s) => { setEditingId(s.id); setEditVal(s.friendly_name); };
  const saveEdit = (id) => {
    setSources(prev=>prev.map(s=>s.id===id?{...s,friendly_name:editVal}:s));
    setEditingId(null);
  };

  return (
    <div style={{ padding:"28px", overflowY:"auto", flex:1 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"20px" }}>
        <div>
          <h1 style={{ fontSize:"22px", fontWeight:700, color:"#ffffff", margin:"0 0 4px" }}>Bid Scan Sources</h1>
          <p style={{ color:"#B0B7BC", fontSize:"13px", margin:0 }}>{sources.length} sources tracked · {sources.filter(s=>s.status==="active").length} active</p>
        </div>
        <div style={{ display:"flex", gap:"10px" }}>
          <button onClick={()=>setShowInactive(v=>!v)} style={{
            padding:"8px 16px", borderRadius:"8px", background: showInactive ? "#003875" : "transparent",
            border:"1px solid #003875", color: showInactive ? "#ffffff" : "#B0B7BC", fontSize:"13px", cursor:"pointer"
          }}>{showInactive ? "Hide removed" : "Show removed"}</button>
          <button onClick={()=>setShowCsvModal(true)} style={{
            padding:"8px 16px", borderRadius:"8px", background:"transparent",
            border:"1px solid #003875", color:"#B0B7BC", fontSize:"13px", cursor:"pointer",
            display:"flex", alignItems:"center", gap:"6px"
          }}><Upload size={13} /> Upload CSV</button>
          <button onClick={()=>setShowAddModal(true)} style={{
            padding:"8px 16px", borderRadius:"8px",
            background:"linear-gradient(135deg,#C60C30,#9a0a26)", border:"none",
            color:"#002244", fontSize:"13px", fontWeight:700, cursor:"pointer",
            display:"flex", alignItems:"center", gap:"6px"
          }}><Plus size={13} /> Add Source</button>
        </div>
      </div>

      {/* Search */}
      <div style={{ position:"relative", marginBottom:"16px", maxWidth:"400px" }}>
        <Search size={13} style={{ position:"absolute", left:"10px", top:"50%", transform:"translateY(-50%)", color:"#4a6080" }} />
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, URL, state…"
          style={{ width:"100%", padding:"8px 12px 8px 32px", background:"#003366", border:"1px solid #003875", borderRadius:"8px", color:"#B0B7BC", fontSize:"13px", outline:"none", boxSizing:"border-box" }} />
      </div>

      {/* Bulk action bar */}
      {selected.size > 0 && (
        <div style={{ padding:"10px 16px", background:"#003366", border:"1px solid #C60C30", borderRadius:"8px", marginBottom:"12px", display:"flex", alignItems:"center", gap:"12px" }}>
          <span style={{ color:"#B0B7BC", fontSize:"13px" }}>{selected.size} source{selected.size>1?"s":""} selected</span>
          <button style={{ padding:"5px 12px", background:"#C60C30", border:"none", color:"#fff", fontSize:"12px", borderRadius:"6px", cursor:"pointer" }}>
            <RefreshCw size={11} style={{ marginRight:"5px", verticalAlign:"middle" }} />Re-validate Selected
          </button>
          <button onClick={()=>setSelected(new Set())} style={{ marginLeft:"auto", background:"transparent", border:"none", color:"#B0B7BC", cursor:"pointer", display:"flex", alignItems:"center", gap:"4px", fontSize:"12px" }}>
            <X size={12} /> Clear
          </button>
        </div>
      )}

      {/* Table */}
      <div style={{ background:"#003366", border:"1px solid #003875", borderRadius:"12px", overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:"#002244" }}>
              <th style={{ padding:"11px 12px", width:"36px" }}>
                <div onClick={toggleAll} style={{ cursor:"pointer", color:"#4a6080" }}>
                  {allChecked ? <CheckSquare size={14} color="#C60C30" /> : <Square size={14} />}
                </div>
              </th>
              {["Friendly Name","URL","State","Site Type","Date Added","Last Scanned","Status","Actions"].map(h=>(
                <th key={h} style={{ padding:"11px 12px", textAlign:"left", fontSize:"11px", color:"#4a6080", fontWeight:600, letterSpacing:"0.06em" }}>{h.toUpperCase()}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((s,i)=>(
              <tr key={s.id} style={{ borderTop:"1px solid #002244", background: selected.has(s.id) ? "rgba(198,12,48,0.08)" : i%2===0?"transparent":"rgba(255,255,255,0.01)", opacity: s.status==="inactive" ? 0.4 : 1 }}>
                <td style={{ padding:"10px 12px" }}>
                  <div onClick={()=>toggleRow(s.id)} style={{ cursor:"pointer", color:"#4a6080" }}>
                    {selected.has(s.id) ? <CheckSquare size={14} color="#C60C30" /> : <Square size={14} />}
                  </div>
                </td>
                <td style={{ padding:"10px 12px", maxWidth:"200px" }}>
                  {editingId===s.id ? (
                    <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                      <input value={editVal} onChange={e=>setEditVal(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter")saveEdit(s.id);if(e.key==="Escape")setEditingId(null);}}
                        autoFocus
                        style={{ flex:1, padding:"4px 8px", background:"#002244", border:"1px solid #C60C30", borderRadius:"4px", color:"#ffffff", fontSize:"12px", outline:"none" }}
                      />
                      <button onClick={()=>saveEdit(s.id)} style={{ background:"#10b981", border:"none", borderRadius:"4px", padding:"4px 6px", cursor:"pointer" }}><Check size={11} color="#fff" /></button>
                      <button onClick={()=>setEditingId(null)} style={{ background:"transparent", border:"none", cursor:"pointer", color:"#B0B7BC" }}><X size={11} /></button>
                    </div>
                  ) : (
                    <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                      <span style={{ fontSize:"13px", color:"#ffffff", fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{s.friendly_name}</span>
                      <button onClick={()=>startEdit(s)} style={{ background:"transparent", border:"none", cursor:"pointer", color:"#003875", padding:"2px", flexShrink:0 }}>
                        <Edit2 size={11} />
                      </button>
                    </div>
                  )}
                </td>
                <td style={{ padding:"10px 12px", maxWidth:"220px" }}>
                  <a href={s.url} target="_blank" rel="noreferrer" style={{ color:"#B0B7BC", fontSize:"11px", textDecoration:"none", display:"block", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                    {s.url}
                  </a>
                </td>
                <td style={{ padding:"10px 12px" }}>
                  <span style={{ background:"#003875", color:"#B0B7BC", fontSize:"11px", fontWeight:700, padding:"2px 7px", borderRadius:"4px", fontFamily:"monospace" }}>{s.state}</span>
                </td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#B0B7BC", fontFamily:"monospace" }}>{s.site_type}</td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#4a6080", fontFamily:"monospace" }}>{s.date_added}</td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#4a6080", fontFamily:"monospace" }}>{s.last_scanned}</td>
                <td style={{ padding:"10px 12px" }}>
                  {(s.captcha_protected || s.captcha_protected === true)
                    ? <span style={{ fontSize:"11px", padding:"3px 8px", borderRadius:"99px", background:"rgba(176,183,188,0.15)", color:"#B0B7BC", border:"1px solid rgba(176,183,188,0.3)", fontWeight:600 }}>🔒 CAPTCHA</span>
                    : <StatusDot status={s.status || "active"} />
                  }
                </td>
                <td style={{ padding:"10px 12px", whiteSpace:"nowrap" }}>
                  <div style={{ display:"flex", gap:"6px", alignItems:"center", flexWrap:"wrap" }}>
                    {s.status === "inactive" ? (
                      <button onClick={()=>restoreSource(s.id)} style={{ background:"transparent", border:"1px solid #003875", color:"#B0B7BC", fontSize:"11px", padding:"3px 8px", borderRadius:"4px", cursor:"pointer" }}>
                        Restore
                      </button>
                    ) : confirmRemove === s.id ? (
                      <>
                        <span style={{ fontSize:"11px", color:"#ffffff" }}>Remove {s.friendly_name}?</span>
                        <button onClick={()=>removeSource(s.id)} style={{ background:"#C60C30", border:"none", color:"#fff", fontSize:"11px", padding:"3px 8px", borderRadius:"4px", cursor:"pointer", fontWeight:600 }}>Yes</button>
                        <button onClick={()=>setConfirmRemove(null)} style={{ background:"transparent", border:"1px solid #003875", color:"#B0B7BC", fontSize:"11px", padding:"3px 8px", borderRadius:"4px", cursor:"pointer" }}>Cancel</button>
                      </>
                    ) : (
                      <>
                        <button style={{ background:"transparent", border:"1px solid #003875", color:"#B0B7BC", fontSize:"11px", padding:"3px 8px", borderRadius:"4px", cursor:"pointer", display:"flex", alignItems:"center", gap:"4px" }}>
                          <RefreshCw size={10} />Validate
                        </button>
                        <button onClick={()=>setConfirmRemove(s.id)} style={{ background:"transparent", border:"1px solid #5c0713", color:"#ff6666", fontSize:"11px", padding:"3px 8px", borderRadius:"4px", cursor:"pointer" }}>
                          Remove
                        </button>
                      </>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Add Modal */}
      {showAddModal && <AddSourceModal onClose={()=>setShowAddModal(false)} onAdd={s=>{setSources(prev=>[...prev,{...s,id:prev.length+1,date_added:new Date().toISOString().slice(0,10),last_scanned:"never",status:"active"}]);setShowAddModal(false);}} />}
      {showCsvModal && <CsvModal onClose={()=>setShowCsvModal(false)} />}
    </div>
  );
}

      if (lp_startText) parts.push(`Scan starts just below text beginning with ${lp_startText}`);
      parts.push("Scan bid title links on this page");
      if (lp_hasExpand === "yes") parts.push("Click each heading or expand button to reveal bid document links");
      if (lp_docType) parts.push(`Bid documents are ${lp_docType}`);
      if (lp_hasPagination === "yes") parts.push("Check all pages for additional bids");
      if (lp_stopText) parts.push(`Stop scanning when you reach ${lp_stopText}`);
      parts.push("Score content against keyword pillars only");
      return parts.join(". ") + ".";
    }
    if (stype === "search_page") {
      let parts = ["Search for bids using keyword terms"];
      if (sp_inputLabel) parts.push(`Search input is labeled ${sp_inputLabel}`);
      if (sp_resultsFormat) parts.push(`Results appear as ${sp_resultsFormat}`);
      parts.push("Score each result against keyword pillars");
      return parts.join(". ") + ".";
    }
    if (stype === "generic_table") {
      let parts = ["Scan all visible bid rows in the table"];
      if (gt_titleCol) parts.push(`Bid title is in the ${gt_titleCol} column`);
      if (gt_stopText) parts.push(`Stop scanning when you reach ${gt_stopText}`);
      parts.push("Score content against keyword pillars only");
      return parts.join(". ") + ".";
    }
    return "Scan bid links on this page. Score content against keyword pillars.";
  };

  const handleNext = () => {
    if (step === 1) {
      if (!urlValid || !state || !stype || !name.trim()) {
        setError("All fields are required. URL must start with https://");
        return;
      }
      setError("");
      setStep(2);
    } else if (step === 2) {
      setStep(3);
    }
  };

  const [submitError, setSubmitError] = React.useState("");
  const [submitSuccess, setSubmitSuccess] = React.useState(false);

  const handleSubmit = async () => {
    setValidating(true);
    setSubmitError("");
    const instructions = buildInstructions();
    const newSource = {
      url,
      friendly_name: name || url,
      state,
      site_type: stype,
      scan_instructions: instructions,
      captcha_protected: false,
    };
    try {
      if (!window._db) throw new Error("Database connection not ready. Please refresh and try again.");
      console.log("Inserting source:", newSource);
      const res = await window._db.from("sources").insert([newSource]).select();
      console.log("Insert result:", JSON.stringify(res));
      if (res.error) throw new Error(res.error.message || JSON.stringify(res.error));
      if (!res.data || res.data.length === 0) throw new Error("Insert returned no data. Row may not have been created.");
      setValidating(false);
      setSubmitSuccess(true);
      setTimeout(() => {
        onAdd(res.data[0]);
      }, 1500);
    } catch(err) {
      console.error("Save error:", err);
      setValidating(false);
      setSubmitError(err.message || "Failed to save. Please try again.");
    }
  };

  const inputStyle = {
    width:"100%", padding:"9px 12px", background:"#002244",
    border:"1px solid #003875", borderRadius:"8px", color:"#ffffff",
    fontSize:"13px", outline:"none", boxSizing:"border-box"
  };
  const labelStyle = {
    fontSize:"11px", color:"#B0B7BC", fontWeight:600,
    display:"block", marginBottom:"6px", letterSpacing:"0.06em"
  };
  const fieldStyle = { marginBottom:"14px" };
  const hintStyle = { fontSize:"11px", color:"#4a6080", marginTop:"4px", lineHeight:"1.5" };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:"20px" }}>
      <div style={{ background:"#003366", border:"1px solid #003875", borderRadius:"16px", padding:"28px", width:"580px", maxWidth:"100%", maxHeight:"90vh", overflowY:"auto" }}>

        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"20px" }}>
          <div>
            <h2 style={{ margin:0, fontSize:"16px", fontWeight:700, color:"#ffffff" }}>Add New Source</h2>
            <div style={{ fontSize:"11px", color:"#4a6080", marginTop:"4px" }}>
              Step {step} of 3 — {step===1?"Basic Info":step===2?"Page Configuration":"Review & Add"}
            </div>
          </div>
          <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#B0B7BC", cursor:"pointer", fontSize:"20px" }}>×</button>
        </div>

        {/* Progress */}
        <div style={{ display:"flex", gap:"4px", marginBottom:"24px" }}>
          {[1,2,3].map(s => (
            <div key={s} style={{
              flex:1, height:"3px", borderRadius:"99px",
              background: s <= step ? "#C60C30" : "#003875",
              transition:"background 0.3s"
            }} />
          ))}
        </div>

        {/* Step 1 — Basic Info */}
        {step === 1 && (
          <div>
            <div style={fieldStyle}>
              <label style={labelStyle}>URL *</label>
              <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://example.com/bids" style={{...inputStyle, borderColor: url && !urlValid ? "#C60C30" : "#003875"}} />
              {url && !urlValid && <div style={{ fontSize:"11px", color:"#C60C30", marginTop:"4px" }}>Must be a valid HTTPS URL</div>}
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>FRIENDLY NAME *</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Lowndes County Schools - Bids" style={inputStyle} />
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"14px", marginBottom:"14px" }}>
              <div>
                <label style={labelStyle}>STATE *</label>
                <select value={state} onChange={e=>setState(e.target.value)} style={{...inputStyle, color: state?"#ffffff":"#B0B7BC"}}>
                  <option value="">Select state</option>
                  {STATES_LIST.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>PAGE TYPE *</label>
                <select value={stype} onChange={e=>setStype(e.target.value)} style={{...inputStyle, color: stype?"#ffffff":"#B0B7BC"}}>
                  <option value="">Select type</option>
                  <option value="links_page">Links Page — list of bid title links</option>
                  <option value="search_page">Search Page — has a search box</option>
                  <option value="generic_table">Table Page — bids in a table/grid</option>
                </select>
              </div>
            </div>
            {stype && (
              <div style={{ background:"#002244", borderRadius:"8px", padding:"12px", marginBottom:"14px", fontSize:"12px", color:"#B0B7BC", lineHeight:"1.6" }}>
                {stype === "links_page" && "📋 Links Page: The page shows a list of bid titles. Each title is a clickable link leading to bid details or documents."}
                {stype === "search_page" && "🔍 Search Page: The page has a search input. The scanner will type keywords and score the results."}
                {stype === "generic_table" && "📊 Table Page: Bids are displayed in a table or structured grid. The scanner reads each row directly."}
              </div>
            )}
          </div>
        )}

        {/* Step 2 — Type-specific questions */}
        {step === 2 && stype === "links_page" && (
          <div>
            <div style={{ background:"rgba(198,12,48,0.08)", border:"1px solid rgba(198,12,48,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#C60C30", lineHeight:"1.6" }}>
              <strong>Beta Note:</strong> Please answer these questions carefully. Accurate answers ensure the scanner finds the right bids.
              In a future Pro release, AI will determine this automatically.
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>STARTING SECTION HEADING</label>
              <input value={lp_startText} onChange={e=>setLpStartText(e.target.value)}
                placeholder="e.g. Current Open Bids, Active Solicitations, Purchasing"
                style={inputStyle} />
              <div style={hintStyle}>What is the exact heading text above where the bids begin? Leave blank if bids start at the top of the page.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>STOPPING SECTION HEADING</label>
              <input value={lp_stopText} onChange={e=>setLpStopText(e.target.value)}
                placeholder="e.g. Awarded Bids, Closed Solicitations, Past Bids"
                style={inputStyle} />
              <div style={hintStyle}>What heading marks where bids end? The scanner will stop here to avoid picking up awarded or closed bids. Leave blank if there is no end section.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>PRE-NAVIGATION CLICK</label>
              <input value={lp_preClick} onChange={e=>setLpPreClick(e.target.value)}
                placeholder="e.g. Open Solicitations, Current Bids, Active RFPs"
                style={inputStyle} />
              <div style={hintStyle}>Does the scanner need to click a tab, button, or link BEFORE bids appear? If yes, enter the exact text of that button/link. Leave blank if bids are visible immediately.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>DO BID TITLES EXPAND WHEN CLICKED?</label>
              <div style={{ display:"flex", gap:"8px" }}>
                {[["yes","Yes — clicking a title reveals more info or a document link"],["no","No — each title is a direct link to the bid"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setLpHasExpand(val)} style={{
                    flex:1, padding:"8px 12px", borderRadius:"8px", cursor:"pointer", fontSize:"12px",
                    background: lp_hasExpand===val ? "rgba(198,12,48,0.15)" : "#002244",
                    border: `1px solid ${lp_hasExpand===val ? "#C60C30" : "#003875"}`,
                    color: lp_hasExpand===val ? "#C60C30" : "#B0B7BC", textAlign:"left"
                  }}>{label}</button>
                ))}
              </div>
              <div style={hintStyle}>Some pages show bid titles that expand (accordion style) to reveal a "Full Bid Information" or document download button. Does this page work that way?</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>BID DOCUMENT TYPE</label>
              <select value={lp_docType} onChange={e=>setLpDocType(e.target.value)} style={{...inputStyle, color: lp_docType?"#ffffff":"#B0B7BC"}}>
                <option value="">Select document type</option>
                <option value="PDF files">PDF files (.pdf)</option>
                <option value="Google Drive documents">Google Drive documents</option>
                <option value="Word documents">Word documents (.doc/.docx)</option>
                <option value="links to a detail page">Links to a detail page</option>
                <option value="mixed types">Mixed types</option>
                <option value="unknown">Not sure</option>
              </select>
              <div style={hintStyle}>When you click a bid link, what type of document or page opens?</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>DOES THE PAGE HAVE MULTIPLE PAGES OF BIDS?</label>
              <div style={{ display:"flex", gap:"8px" }}>
                {[["yes","Yes — has Next/Previous page navigation"],["no","No — all bids on one page"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setLpHasPagination(val)} style={{
                    flex:1, padding:"8px 12px", borderRadius:"8px", cursor:"pointer", fontSize:"12px",
                    background: lp_hasPagination===val ? "rgba(198,12,48,0.15)" : "#002244",
                    border: `1px solid ${lp_hasPagination===val ? "#C60C30" : "#003875"}`,
                    color: lp_hasPagination===val ? "#C60C30" : "#B0B7BC", textAlign:"left"
                  }}>{label}</button>
                ))}
              </div>
            </div>
          </div>
        )}

        {step === 2 && stype === "search_page" && (
          <div>
            <div style={{ background:"rgba(198,12,48,0.08)", border:"1px solid rgba(198,12,48,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#C60C30" }}>
              <strong>Beta Note:</strong> The scanner will type each keyword from your active pillars into the search box and score the results.
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>SEARCH INPUT LABEL OR PLACEHOLDER</label>
              <input value={sp_inputLabel} onChange={e=>setSpInputLabel(e.target.value)}
                placeholder="e.g. Search by keyword, Search bids, Enter search term"
                style={inputStyle} />
              <div style={hintStyle}>What text appears inside or next to the search box on the page? This helps the scanner find the right input field.</div>
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>HOW DO RESULTS APPEAR?</label>
              <select value={sp_resultsFormat} onChange={e=>setSpResultsFormat(e.target.value)} style={{...inputStyle, color:sp_resultsFormat?"#ffffff":"#B0B7BC"}}>
                <option value="">Select format</option>
                <option value="a list of linked titles">A list of linked titles</option>
                <option value="a table with columns">A table with columns</option>
                <option value="cards or tiles">Cards or tiles</option>
                <option value="a numbered list">A numbered list</option>
              </select>
              <div style={hintStyle}>After you search, how are the results displayed on the page?</div>
            </div>
          </div>
        )}

        {step === 2 && stype === "generic_table" && (
          <div>
            <div style={{ background:"rgba(198,12,48,0.08)", border:"1px solid rgba(198,12,48,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#C60C30" }}>
              <strong>Beta Note:</strong> The scanner reads all visible rows. Be specific about where bids start and end.
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>WHICH COLUMN CONTAINS THE BID TITLE?</label>
              <input value={gt_titleCol} onChange={e=>setGtTitleCol(e.target.value)}
                placeholder="e.g. Description, Bid Title, Project Name, first column"
                style={inputStyle} />
              <div style={hintStyle}>What is the column header that contains the bid name or title?</div>
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>STOPPING ROW OR SECTION</label>
              <input value={gt_stopText} onChange={e=>setGtStopText(e.target.value)}
                placeholder="e.g. Awarded, Closed, Past Solicitations"
                style={inputStyle} />
              <div style={hintStyle}>Is there a row header or section title where the scanner should stop reading? This prevents picking up awarded or closed bids.</div>
            </div>
          </div>
        )}

        {/* Step 3 — Review */}
        {step === 3 && (
          <div>
            <div style={{ background:"#002244", borderRadius:"10px", padding:"16px", marginBottom:"20px" }}>
              <div style={{ fontSize:"12px", color:"#4a6080", fontWeight:600, marginBottom:"12px", letterSpacing:"0.06em" }}>REVIEW SOURCE CONFIGURATION</div>
              {[
                ["Friendly Name", name],
                ["URL", url],
                ["State", state],
                ["Page Type", stype],
              ].map(([label, val]) => (
                <div key={label} style={{ display:"flex", gap:"12px", marginBottom:"8px" }}>
                  <span style={{ fontSize:"12px", color:"#B0B7BC", minWidth:"100px" }}>{label}:</span>
                  <span style={{ fontSize:"12px", color:"#ffffff" }}>{val}</span>
                </div>
              ))}
              <div style={{ marginTop:"12px", paddingTop:"12px", borderTop:"1px solid #003366" }}>
                <div style={{ fontSize:"12px", color:"#B0B7BC", marginBottom:"6px" }}>Generated Scan Instructions:</div>
                <div style={{ fontSize:"12px", color:"#B0B7BC", lineHeight:"1.6", fontStyle:"italic" }}>{buildInstructions()}</div>
              </div>
            </div>
            <div style={{ background:"rgba(16,185,129,0.08)", border:"1px solid rgba(16,185,129,0.2)", borderRadius:"8px", padding:"12px", fontSize:"12px", color:"#10b981", lineHeight:"1.6" }}>
              Ready to save. Click "Save Source" below to add this to your database.
              The scanner will use your keyword pillars to determine what qualifies as a lead.
            </div>
          </div>
        )}

        {/* Errors */}
        {error && (
          <div style={{ color:"#C60C30", fontSize:"12px", marginBottom:"12px", padding:"8px 12px", background:"rgba(198,12,48,0.1)", borderRadius:"6px", border:"1px solid rgba(198,12,48,0.2)" }}>{error}</div>
        )}
        {submitError && (
          <div style={{ color:"#C60C30", fontSize:"12px", marginBottom:"12px", padding:"10px 14px", background:"rgba(198,12,48,0.1)", borderRadius:"6px", border:"1px solid rgba(198,12,48,0.3)" }}>
            <strong>Save failed:</strong> {submitError}
          </div>
        )}
        {submitSuccess && (
          <div style={{ color:"#10b981", fontSize:"12px", marginBottom:"12px", padding:"10px 14px", background:"rgba(16,185,129,0.1)", borderRadius:"6px", border:"1px solid rgba(16,185,129,0.3)" }}>
            ✓ Source saved successfully! It will be included in your next scan.
          </div>
        )}

        {/* Footer buttons */}
        <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end", marginTop:"20px" }}>
          {step > 1 && (
            <button onClick={()=>setStep(step-1)} style={{ padding:"9px 18px", background:"transparent", border:"1px solid #003875", borderRadius:"8px", color:"#B0B7BC", fontSize:"13px", cursor:"pointer" }}>
              ← Back
            </button>
          )}
          <button onClick={onClose} style={{ padding:"9px 18px", background:"transparent", border:"1px solid #003875", borderRadius:"8px", color:"#B0B7BC", fontSize:"13px", cursor:"pointer" }}>
            Cancel
          </button>
          {step < 3 ? (
            <button onClick={handleNext} style={{ padding:"9px 18px", background:"linear-gradient(135deg,#C60C30,#9a0a26)", border:"none", borderRadius:"8px", color:"#ffffff", fontSize:"13px", fontWeight:700, cursor:"pointer" }}>
              Next →
            </button>
          ) : (
            <button onClick={handleSubmit} disabled={validating || submitSuccess} style={{
              padding:"9px 18px",
              background: submitSuccess ? "linear-gradient(135deg,#10b981,#059669)" :
                          validating ? "#003875" : "linear-gradient(135deg,#C60C30,#9a0a26)",
              border:"none", borderRadius:"8px",
              color: validating ? "#B0B7BC" : "#002244",
              fontSize:"13px", fontWeight:700,
              cursor: validating || submitSuccess ? "not-allowed" : "pointer",
              display:"flex", alignItems:"center", gap:"6px",
              transition:"all 0.3s"
            }}>
              {submitSuccess ? "✓ Saved Successfully!" : validating ? "Saving..." : "Save Source →"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

  const [newPillarName, setNewPillarName] = useState("");

  const [savingPillar, setSavingPillar] = useState(null);
  const [savingNeg, setSavingNeg] = useState(false);

  const COLORS = ["#C60C30","#B0B7BC","#10b981","#B0B7BC","#C60C30","#B0B7BC","#C60C30","#84cc16"];

  const showToast = (msg, color="#10b981", opts={}) => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast({ msg, color, ...opts });
    if (!opts.persist) {
      const delay = color === "#C60C30" ? 5000 : 3000;
      toastTimer.current = setTimeout(() => setToast(null), delay);
    }
  };

  // Load from Supabase — raw fetch to bypass JS client cache
  const SUPA_URL  = "https://powcnxmsrxixufcqbxbw.supabase.co";
  const SUPA_ANON = "sb_publishable_P_iPFer-s3i8zV8106O_zQ_McYNHXeJ";
  const loadPillars = React.useCallback(function(attempt) {
    attempt = attempt || 0;
    console.log("[loadPillars] attempt", attempt);
    fetch(
      SUPA_URL + "/rest/v1/keywords?select=*&order=updated_at.desc",
      {
        headers: {
          "apikey":          SUPA_ANON,
          "Authorization":   "Bearer " + SUPA_ANON,
          "Cache-Control":   "no-cache",
          "Pragma":          "no-cache",
        },
      }
    )
      .then(r => r.ok ? r.json() : r.text().then(t => { throw new Error(r.status + ": " + t.slice(0,200)); }))
      .then(data => {
        console.log("[loadPillars] rows:", data.length, "first updated_at:", data[0] ? data[0].updated_at : "n/a");
        const neg = data.find(r => r.pillar_key === "negative_terms");
        const pos = data.filter(r => r.pillar_key !== "negative_terms" && r.weight >= 0);
        setNegativeTerms(neg ? (Array.isArray(neg.terms) ? neg.terms : JSON.parse(neg.terms || "[]")) : []);
        setPillars(pos.map((r, i) => ({
          key: r.pillar_key,
          name: r.pillar_name,
          terms: Array.isArray(r.terms) ? r.terms : JSON.parse(r.terms || "[]"),
          enabled: r.enabled !== false,
          color: r.color || COLORS[i % COLORS.length],
        })));
        setLoading(false);
      })
      .catch(err => { console.error("[loadPillars] error:", err); setLoading(false); });
  }, []);

  React.useEffect(() => { loadPillars(0); }, [loadPillars]);

  const togglePillar = (key) => {
    setPillars(prev => {
      const next = prev.map(p => p.key === key ? { ...p, enabled: !p.enabled } : p);
      const pillar = next.find(p => p.key === key);
      if (pillar) {
        const payload = { enabled: pillar.enabled, updated_at: new Date().toISOString() };
        console.log("[togglePillar] raw fetch — pillar_key:", key, "payload:", payload);
        // Use raw fetch with anon key — window._db's user JWT is blocked by RLS on this table
        fetch(
          SUPA_URL + "/rest/v1/keywords?pillar_key=eq." + encodeURIComponent(key),
          {
            method: "PATCH",
            headers: {
              "apikey":        SUPA_ANON,
              "Authorization": "Bearer " + SUPA_ANON,
              "Content-Type":  "application/json",
              "Prefer":        "return=representation",
              "Cache-Control": "no-cache",
            },
            body: JSON.stringify(payload),
          }
        )
          .then(r => r.json().then(d => ({ ok: r.ok, status: r.status, data: d })))
          .then(({ ok, status, data }) => {
            console.log("[togglePillar] response — status:", status, "data:", data);
            if (!ok) showToast("Failed to save pillar state", "#C60C30");
          })
          .catch(err => {
            console.error("[togglePillar] fetch error:", err);
            showToast("Failed to save pillar state", "#C60C30");
          });
      }
      return next;
    });
  };

  const addTerm = (pillarKey, term, onConfirmed=null) => {
    const t = term.trim().toLowerCase();
    if (!t) return true;
    // Exact match in negative terms — hard block
    if (negativeTerms.some(x => x.toLowerCase() === t)) {
      showToast(`"${t}" is in the Negative Terms list — remove it there first`, "#C60C30");
      return false;
    }
    // Exact match in other pillars — hard block
    const conflict = pillars.find(p => p.key !== pillarKey && p.terms.some(x => x.toLowerCase() === t));
    if (conflict) {
      showToast(`"${t}" already exists in "${conflict.name}" — remove it there first`, "#C60C30");
      return false;
    }
    // Partial match check
    let partialMsg = null;
    const negPartial = negativeTerms.find(x => { const xl = x.toLowerCase(); return xl !== t && (xl.includes(t) || t.includes(xl)); });
    if (negPartial) {
      partialMsg = `A similar term "${negPartial}" was found in Negative Terms — please review before saving`;
    } else {
      for (const p of pillars) {
        if (p.key === pillarKey) continue;
        const match = p.terms.find(x => { const xl = x.toLowerCase(); return xl !== t && (xl.includes(t) || t.includes(xl)); });
        if (match) { partialMsg = `A similar term "${match}" was found in "${p.name}" — please review before saving`; break; }
      }
    }
    const doAdd = () => {
      setPillars(prev => prev.map(p =>
        p.key === pillarKey ? { ...p, terms: [...p.terms.filter(x => x !== t), t] } : p
      ));
      setNewTermInputs(prev => ({ ...prev, [pillarKey]: "" }));
    };
    if (partialMsg) {
      if (onConfirmed) {
        // Save context: block save, ask for confirmation
        showToast(partialMsg, "#C60C30", {
          persist: true,
          confirmLabel: "Save Anyway",
          onConfirm: () => { doAdd(); setToast(null); onConfirmed(); },
        });
        return "warn";
      } else {
        // Standalone add: add immediately, show dismissable warning
        doAdd();
        showToast(partialMsg, "#C60C30", { persist: true });
        return true;
      }
    }
    doAdd();
    return true;
  };

  const removeTerm = (pillarKey, term) => {
    setPillars(prev => prev.map(p =>
      p.key === pillarKey ? { ...p, terms: p.terms.filter(t => t !== term) } : p
    ));
  };

  const doSave = (pillarKey) => {
    setSavingPillar(pillarKey);
    // Use functional update to get current state at save time
    setPillars(current => {
      const pillar = current.find(p => p.key === pillarKey);
      if (!pillar) return current;
      window._db.from("keywords").upsert({
        pillar_key: pillar.key,
        pillar_name: pillar.name,
        weight: 1,
        terms: pillar.terms,
        enabled: pillar.enabled,
        color: pillar.color,
        updated_at: new Date().toISOString(),
      }, { onConflict: "pillar_key" })
      .then(() => { showToast(`"${pillar.name}" saved!`); setSavingPillar(null); })
      .catch(() => { showToast("Save failed", "#C60C30"); setSavingPillar(null); });
      return current;
    });
  };

  const savePillar = (pillarKey) => {
    if (!window._db) return;
    const pending = (newTermInputs[pillarKey] || "").trim();
    if (pending) {
      const result = addTerm(pillarKey, pending, () => doSave(pillarKey));
      if (result === false || result === "warn") return;
    }
    doSave(pillarKey);
  };

  const deletePillar = async (key) => {
    if (!window._db) return;
    try {
      await window._db.from("keywords").delete().eq("pillar_key", key);
      setPillars(prev => prev.filter(p => p.key !== key));
      showToast("Pillar removed", "#C60C30");
    } catch(e) {
      showToast("Delete failed", "#C60C30");
    }
  };

  const saveNegatives = async () => {
    if (!window._db) return;
    setSavingNeg(true);
    try {
      await window._db.from("keywords").upsert({
        pillar_key: "negative_terms",
        pillar_name: "Negative Terms",
        weight: -999,
        terms: negativeTerms,
        enabled: true,
        color: "#C60C30",
        updated_at: new Date().toISOString(),
      }, { onConflict: "pillar_key" });
      showToast("Negative terms saved!");
    } catch(e) {
      showToast("Save failed", "#C60C30");
    }
    setSavingNeg(false);
  };

  const addPillar = async () => {
    const name = newPillarName.trim();
    if (!name || !window._db) return;
    const key = "custom_" + name.toLowerCase().replace(/\s+/g, "_") + "_" + Date.now();
    const color = COLORS[pillars.length % COLORS.length];
    const newP = { key, name, terms: [], enabled: true, color };
    try {
      await window._db.from("keywords").insert({
        pillar_key: key, pillar_name: name, weight: 1,
        terms: [], enabled: true, color,
      });
      setPillars(prev => [...prev, newP]);
      setNewPillarName("");
      setShowAddPillar(false);
      showToast(`"${name}" pillar created!`);
    } catch(e) {
      showToast("Create failed", "#C60C30");
    }
  };

  if (loading) return (
    <div style={{ padding:"28px", color:"#B0B7BC", fontSize:"14px" }}>Loading keywords...</div>
  );

  return (
    <div style={{ padding:"28px", overflowY:"auto", flex:1, position:"relative" }}>

      {toast && (
        <div style={{ position:"fixed", bottom:"28px", right:"28px", zIndex:999,
          background: toast.color, color:"#fff", padding:"12px 16px",
          borderRadius:"10px", fontSize:"13px", fontWeight:600,
          boxShadow:"0 4px 20px rgba(0,0,0,0.4)",
          display:"flex", alignItems:"flex-start", gap:"10px", maxWidth:"380px" }}>
          <span style={{ flex:1, lineHeight:"1.4" }}>{toast.msg}</span>
          {toast.onConfirm ? (
            <div style={{ display:"flex", gap:"6px", flexShrink:0 }}>
              <button onClick={toast.onConfirm} style={{
                background:"rgba(255,255,255,0.25)", border:"none", borderRadius:"6px",
                color:"#fff", padding:"3px 10px", fontSize:"12px", fontWeight:700, cursor:"pointer" }}>
                {toast.confirmLabel || "Confirm"}
              </button>
              <button onClick={() => setToast(null)} style={{
                background:"rgba(0,0,0,0.2)", border:"none", borderRadius:"6px",
                color:"#fff", padding:"3px 10px", fontSize:"12px", fontWeight:600, cursor:"pointer" }}>
                Cancel
              </button>
            </div>
          ) : toast.persist ? (
            <span onClick={() => setToast(null)}
              style={{ cursor:"pointer", fontSize:"15px", lineHeight:1, opacity:0.8, flexShrink:0 }}>✕</span>
          ) : null}
        </div>
      )}

      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"24px" }}>
        <div>
          <h1 style={{ fontSize:"22px", fontWeight:700, color:"#ffffff", margin:"0 0 4px" }}>Keywords & Pillars</h1>
          <p style={{ color:"#B0B7BC", fontSize:"13px", margin:0 }}>
            {pillars.filter(p=>p.enabled).length} of {pillars.length} pillars active · Toggle on to include in scans
          </p>
        </div>
        <button onClick={() => setShowAddPillar(!showAddPillar)} style={{
          padding:"8px 16px", borderRadius:"8px", fontSize:"13px", fontWeight:600,
          cursor:"pointer", display:"flex", alignItems:"center", gap:"7px",
          background:"linear-gradient(135deg,#C60C30,#9a0a26)", border:"none", color:"#ffffff",
          boxShadow:"0 3px 12px rgba(198,12,48,0.35)"
        }}>
          + Add Pillar
        </button>
      </div>

      {/* Add Pillar inline */}
      {showAddPillar && (
        <div style={{ background:"#003366", border:"1px solid #003875", borderRadius:"12px",
          padding:"16px 20px", marginBottom:"20px", display:"flex", gap:"10px", alignItems:"center" }}>
          <input value={newPillarName} onChange={e=>setNewPillarName(e.target.value)}
            placeholder="Pillar name e.g. Networking Gear"
            onKeyDown={e=>e.key==="Enter" && addPillar()}
            style={{ flex:1, background:"#002244", border:"1px solid #003875", color:"#ffffff",
              padding:"8px 12px", borderRadius:"8px", fontSize:"13px", outline:"none" }} />
          <button onClick={addPillar} style={{
            padding:"8px 16px", background:"#10b981", border:"none", borderRadius:"8px",
            color:"#fff", fontSize:"13px", fontWeight:600, cursor:"pointer" }}>Create</button>
          <button onClick={()=>setShowAddPillar(false)} style={{
            padding:"8px 12px", background:"transparent", border:"1px solid #003875",
            borderRadius:"8px", color:"#B0B7BC", fontSize:"13px", cursor:"pointer" }}>Cancel</button>
        </div>
      )}

      {/* Pillars grid */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"16px", marginBottom:"24px" }}>
        {[...pillars].sort((a,b) => (b.enabled?1:0)-(a.enabled?1:0)).map(pillar => (
          <div key={pillar.key} style={{
            background:"#003366",
            border:`1px solid ${pillar.enabled ? pillar.color+"40" : "#003366"}`,
            borderLeft:`3px solid ${pillar.enabled ? pillar.color : "#003875"}`,
            borderRadius:"12px", padding:"18px",
            opacity: pillar.enabled ? 1 : 0.5, transition:"all 0.2s"
          }}>
            {/* Pillar header */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px" }}>
              <div style={{ fontWeight:700, color: pillar.enabled?"#ffffff":"#4a6080", fontSize:"14px" }}>
                {pillar.name}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                {/* Toggle */}
                <div onClick={() => togglePillar(pillar.key)} style={{
                  width:"36px", height:"20px", borderRadius:"99px", cursor:"pointer",
                  background: pillar.enabled ? pillar.color : "#003875",
                  position:"relative", transition:"background 0.2s", flexShrink:0
                }}>
                  <div style={{
                    position:"absolute", top:"2px",
                    left: pillar.enabled ? "18px" : "2px",
                    width:"16px", height:"16px", borderRadius:"50%",
                    background:"#fff", transition:"left 0.2s"
                  }}/>
                </div>
              </div>
            </div>

            {/* Terms */}
            <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom:"12px", minHeight:"28px" }}>
              {pillar.terms.map(t => (
                <span key={t} style={{
                  background:"#002244", border:"1px solid #003875", color:"#B0B7BC",
                  fontSize:"11px", padding:"3px 8px", borderRadius:"4px", fontFamily:"monospace",
                  display:"flex", alignItems:"center", gap:"4px"
                }}>
                  {t}
                  <span onClick={() => removeTerm(pillar.key, t)}
                    style={{ cursor:"pointer", color:"#4a6080", fontSize:"10px", lineHeight:1 }}>✕</span>
                </span>
              ))}
              {pillar.terms.length === 0 && (
                <span style={{ fontSize:"11px", color:"#003875", fontStyle:"italic" }}>No terms yet</span>
              )}
            </div>

            {/* Add term input */}
            <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
              <input
                value={newTermInputs[pillar.key] || ""}
                onChange={e => setNewTermInputs(prev=>({...prev,[pillar.key]:e.target.value}))}
                onKeyDown={e => e.key==="Enter" && addTerm(pillar.key, newTermInputs[pillar.key]||"")}
                onBlur={e => addTerm(pillar.key, e.target.value)}
                placeholder="Add term..."
                style={{ flex:1, background:"#002244", border:"1px solid #003366", color:"#B0B7BC",
                  padding:"5px 8px", borderRadius:"6px", fontSize:"11px", outline:"none",
                  fontFamily:"monospace" }}
              />
              <button onClick={() => addTerm(pillar.key, newTermInputs[pillar.key]||"")}
                style={{ padding:"5px 10px", background:"#003366", border:"1px solid #003875",
                  borderRadius:"6px", color:"#B0B7BC", fontSize:"11px", cursor:"pointer" }}>+</button>
            </div>
            <div style={{ fontSize:"10px", color:"#4a6080", marginBottom:"8px", fontStyle:"italic" }}>
              Press Enter to add keyword before saving
            </div>

            {/* Save + Delete row */}
            <div style={{ display:"flex", justifyContent:"flex-end", gap:"6px" }}>
              <button onClick={() => deletePillar(pillar.key)} style={{
                padding:"4px 8px", background:"transparent", border:"1px solid #003875",
                borderRadius:"6px", color:"#C60C30", fontSize:"11px", cursor:"pointer"
              }}>✕ Remove</button>
              <button onClick={() => savePillar(pillar.key)} disabled={savingPillar===pillar.key} style={{
                padding:"4px 10px", background: savingPillar===pillar.key?"#003366":"#10b981",
                border:"none", borderRadius:"6px", color:"#fff", fontSize:"11px",
                fontWeight:600, cursor:"pointer"
              }}>{savingPillar===pillar.key ? "Saving..." : "💾 Save"}</button>
            </div>
          </div>
        ))}
      </div>

      {/* Negative Terms */}
      <div style={{ background:"#003366", border:"1px solid #C60C3040", borderLeft:"3px solid #C60C30",
        borderRadius:"12px", padding:"18px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px" }}>
          <div>
            <div style={{ fontWeight:700, color:"#ffffff", fontSize:"14px" }}>🚫 Negative Terms</div>
            <div style={{ fontSize:"11px", color:"#B0B7BC", marginTop:"2px" }}>
              Bids matching any of these terms will be excluded from results
            </div>
          </div>
        </div>

        <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom:"12px", minHeight:"28px" }}>
          {negativeTerms.map(t => (
            <span key={t} style={{
              background:"#002244", border:"1px solid #C60C3030", color:"#C60C30",
              fontSize:"11px", padding:"3px 8px", borderRadius:"4px", fontFamily:"monospace",
              display:"flex", alignItems:"center", gap:"4px"
            }}>
              {t}
              <span onClick={() => setNegativeTerms(prev => prev.filter(x=>x!==t))}
                style={{ cursor:"pointer", color:"#7a0a1e", fontSize:"10px" }}>✕</span>
            </span>
          ))}
          {negativeTerms.length === 0 && (
            <span style={{ fontSize:"11px", color:"#003875", fontStyle:"italic" }}>No negative terms</span>
          )}
        </div>

        <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
          <input value={newNegTerm} onChange={e=>setNewNegTerm(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter" && newNegTerm.trim()){
              const t = newNegTerm.trim().toLowerCase();
              const conflict = pillars.find(p => p.terms.includes(t));
              if (conflict) { showToast(`"${t}" exists in "${conflict.name}" pillar — remove it there first`, "#C60C30"); return; }
              setNegativeTerms(prev=>[...prev.filter(x=>x!==t),t]); setNewNegTerm(""); }}}
            placeholder="Add term to exclude..."
            style={{ flex:1, background:"#002244", border:"1px solid #003366", color:"#B0B7BC",
              padding:"5px 8px", borderRadius:"6px", fontSize:"11px", outline:"none", fontFamily:"monospace" }}
          />
          <button onClick={()=>{ if(newNegTerm.trim()){ setNegativeTerms(prev=>[...prev.filter(x=>x!==newNegTerm.trim().toLowerCase()),newNegTerm.trim().toLowerCase()]); setNewNegTerm(""); }}}
            style={{ padding:"5px 10px", background:"#003366", border:"1px solid #003875",
              borderRadius:"6px", color:"#B0B7BC", fontSize:"11px", cursor:"pointer" }}>+</button>
        </div>

        <div style={{ display:"flex", justifyContent:"flex-end" }}>
          <button onClick={saveNegatives} disabled={savingNeg} style={{
            padding:"4px 12px", background: savingNeg?"#003366":"#C60C30",
            border:"none", borderRadius:"6px", color:"#fff", fontSize:"11px",
            fontWeight:600, cursor:"pointer"
          }}>{savingNeg ? "Saving..." : "💾 Save"}</button>
        </div>
      </div>

    </div>
  );
}

function ScanHistoryView() {
  const [expanded, setExpanded] = React.useState(false);
  const rows = expanded ? MOCK_SCAN_HISTORY : MOCK_SCAN_HISTORY.slice(0,3);
  return (
    <div style={{ padding:"28px", overflowY:"auto", flex:1 }}>
      <div style={{ marginBottom:"24px" }}>
        <h1 style={{ fontSize:"22px", fontWeight:700, color:"#ffffff", margin:"0 0 4px" }}>Scan History</h1>
        <p style={{ color:"#B0B7BC", fontSize:"13px", margin:0 }}>All past scan runs and their results</p>
      </div>

      <div style={{ background:"#003366", border:"1px solid #003875", borderRadius:"12px", overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:"#002244" }}>
              {["Date","Time","Status","Duration","Hot Leads Found","Sources","Errors","Log"].map(h=>(
                <th key={h} style={{ padding:"11px 16px", textAlign:"left", fontSize:"11px", color:"#4a6080", fontWeight:600, letterSpacing:"0.06em" }}>{h.toUpperCase()}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((s,i)=>(
              <tr key={s.id} style={{ borderTop:"1px solid #002244", background:i%2===0?"transparent":"rgba(255,255,255,0.01)" }}>
                <td style={{ padding:"14px 16px", fontSize:"13px", color:"#ffffff", fontFamily:"monospace" }}>{s.date || (s.started_at ? new Date(s.started_at.endsWith("Z") ? s.started_at : s.started_at + "Z").toLocaleDateString("en-CA",{timeZone:"America/New_York"}) : "—")}</td>
                <td style={{ padding:"14px 16px", fontSize:"12px", color:"#B0B7BC", fontFamily:"monospace" }}>{s.time || (s.started_at ? new Date(s.started_at.endsWith("Z") ? s.started_at : s.started_at + "Z").toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true,timeZone:"America/New_York"}) : "—")}</td>
                <td style={{ padding:"14px 16px" }}><StatusDot status={s.status} /></td>
                <td style={{ padding:"14px 16px", fontSize:"12px", color:"#B0B7BC", fontFamily:"monospace" }}>
                  {s.duration ||
                   (s.finished_at && s.started_at ? Math.floor((new Date(s.finished_at)-new Date(s.started_at))/60000)+"m "+Math.floor(((new Date(s.finished_at)-new Date(s.started_at))%60000)/1000)+"s" :
                   (s.duration_seconds ? Math.floor(s.duration_seconds/60)+"m "+s.duration_seconds%60+"s" : "—"))}
                </td>
                <td style={{ padding:"14px 16px" }}>
                  <span style={{ fontSize:"14px", fontWeight:700, color: (s.hot_leads||s.hot_count||0)>10?"#10b981":(s.hot_leads||s.hot_count||0)>0?"#C60C30":"#4a6080", fontFamily:"monospace" }}>
                    {s.hot_leads ?? s.hot_count ?? s.leads_found ?? "—"}
                  </span>
                </td>
                <td style={{ padding:"14px 16px", fontSize:"12px", color:"#B0B7BC" }}>{s.sources ?? s.sources_scanned ?? "—"}</td>
                <td style={{ padding:"14px 16px", fontSize:"12px", color: (s.errors||0)>0?"#C60C30":"#B0B7BC" }}>{s.errors ?? s.error_count ?? 0}</td>
                <td style={{ padding:"14px 16px" }}>
                  <button style={{ background:"transparent", border:"1px solid #003875", color:"#B0B7BC", fontSize:"11px", padding:"4px 10px", borderRadius:"6px", cursor:"pointer" }}>
                    <FileText size={11} style={{ marginRight:"4px", verticalAlign:"middle" }} />View Log
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {MOCK_SCAN_HISTORY.length > 3 && (
          <div style={{ padding:"12px 16px", borderTop:"1px solid #002244", textAlign:"center" }}>
            <button onClick={()=>setExpanded(!expanded)} style={{
              background:"transparent", border:"1px solid #003875", color:"#B0B7BC",
              fontSize:"12px", padding:"6px 18px", borderRadius:"6px", cursor:"pointer"
            }}>
              {expanded ? "▲ Show Less" : `▼ Show All ${MOCK_SCAN_HISTORY.length} Scans`}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsView() {

  // ── CSV parser ──────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    if (lines.length < 2) return [];
    const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
    const results = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const fields = [];
      let cur = "", inQ = false;
      for (let c = 0; c < line.length; c++) {
        if (line[c] === '"') { inQ = !inQ; }
        else if (line[c] === ',' && !inQ) { fields.push(cur); cur = ""; }
        else { cur += line[c]; }
      }
      fields.push(cur);
      const obj = {};
      headers.forEach((h, idx) => { obj[h] = (fields[idx] || "").trim(); });
      results.push(obj);
    }
    return results;
  }

  // ── Box doc availability check (mirrors scanner.py logic via Jina Reader) ────
  async function checkBoxAvailability(url) {
    const jinaUrl = "https://r.jina.ai/" + url;
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const resp = await fetch(jinaUrl, { signal: AbortSignal.timeout(15000) });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        if (text.includes("Currently Unavailable") || text.includes("Bid Document Currently Unavailable")) return false;
        return true;
      } catch (e) {
        console.warn(`[box-check] attempt ${attempt + 1} error for ${url}:`, e);
      }
    }
    return null;
  }

  // ── Upsert CSV rows to rfp_bids ─────────────────────────────────────────────
  async function upsertRfpRows(parsed, fDate) {
    if (!parsed.length) return { saved: 0, duplicates: 0 };
    const _orgId = (window._currentUser && window._currentUser.org_id) || '';
    const allRecords = parsed.map(r => ({
      bid_url:        (r["Bid URL"]        || r["bid_url"]        || "").slice(0, 2000),
      title:          (r["Title"]          || r["title"]          || "").slice(0, 500),
      document_url:   (r["Doc URL"]        || r["doc_url"]        || r["Document URL"] || "").slice(0, 2000),
      bid_documents:  (r["Bid Documents"]  || r["bid_documents"]  || "").slice(0, 2000),
      publish_date:   r["Publish Date"]    || r["publish_date"]   || null,
      pre_bid_date:   r["Pre-bid Date"]    || r["pre_bid_date"]   || null,
      due_date:       r["Due Date"]        || r["due_date"]       || null,
      memo:           (r["Memo"]           || r["memo"]           || "").slice(0, 1000),
      bid_type:       (r["Bid Type"]       || r["bid_type"]       || "").slice(0, 200),
      institution:    (r["Institution"]    || r["institution"]    || "").slice(0, 300),
      state:          (r["State"]          || r["state"]          || "").slice(0, 10),
      market_sectors: (r["Market Sectors"] || r["market_sectors"] || "").slice(0, 500),
      file_date:      fDate || null,
      doc_id:         (r["Doc ID"]         || r["doc_id"]         || "").slice(0, 200),
      org_id:         _orgId,
    })).filter(r => r.bid_url);
    if (!allRecords.length) return { saved: 0, duplicates: 0 };

    // Deduplicate within the CSV itself (title+institution, case-insensitive, keep first)
    let csvDuplicates = 0;
    const csvSeen = new Set();
    const records = [];
    for (const rec of allRecords) {
      const key = (rec.title || "").toLowerCase() + "||" + (rec.institution || "").toLowerCase();
      if (csvSeen.has(key)) { csvDuplicates++; continue; }
      csvSeen.add(key);
      records.push(rec);
    }

    // Check existing rows in rfp_bids for matching title+institution
    const titles      = [...new Set(records.map(r => r.title).filter(Boolean))];
    const institutions = [...new Set(records.map(r => r.institution).filter(Boolean))];
    let existingKeys = new Set();
    if (titles.length) {
      const { data: existing } = await window._db
        .from("rfp_bids")
        .select("title, institution")
        .in("title", titles);
      if (existing) {
        for (const row of existing) {
          existingKeys.add((row.title || "").toLowerCase() + "||" + (row.institution || "").toLowerCase());
        }
      }
    }

    let dbDuplicates = 0;
    const toInsert = [];
    for (const rec of records) {
      const key = (rec.title || "").toLowerCase() + "||" + (rec.institution || "").toLowerCase();
      if (existingKeys.has(key)) { dbDuplicates++; continue; }
      toInsert.push(rec);
    }

    const totalDuplicates = csvDuplicates + dbDuplicates;
    if (!toInsert.length) return { saved: 0, duplicates: totalDuplicates };

    const { data: upsertData, error: upsertErr } = await window._db.from("rfp_bids").upsert(toInsert, { onConflict: "doc_id" });
    if (upsertErr) console.error("upsertRfpRows error:", JSON.stringify(upsertErr), upsertErr);
    else console.log("upsertRfpRows: saved", toInsert.length, "rows, skipped", totalDuplicates, "duplicates");

    // ── Box availability check for newly imported rows ────────────────────────
    const boxRows = toInsert.filter(r => r.doc_id && r.bid_documents && r.bid_documents.toLowerCase().includes("box.com"));
    if (boxRows.length) {
      console.log(`[box-check] checking ${boxRows.length} newly imported box.com rows`);
      for (const row of boxRows) {
        const available = await checkBoxAvailability(row.bid_documents);
        console.log(`[box-check] ${row.bid_documents.slice(0, 80)} -> ${available}`);

          const { error: updateErr } = await window._db.from("rfp_bids").update({ doc_available: available }).eq("doc_id", row.doc_id);
          if (updateErr) console.warn("[box-check] update failed:", updateErr);
        }
      }
    }

    return { saved: toInsert.length, duplicates: totalDuplicates };
  }

    return u.includes(".pdf") || u.match(/\.docx?(\?|$)/) || u.includes(".docx") || u.includes(".doc") ||
