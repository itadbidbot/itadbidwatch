// ─── BIDPRIME VIEW ────────────────────────────────────────────────────────────
function BidPrimeView() {
  const [rows, setRows] = useState([]);
  const [alertDate, setAlertDate] = useState(null);
  const [filter, setFilter] = useState("");
  const [stateFilter, setStateFilter] = useState("");
  const [alertDateFilter, setAlertDateFilter] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [showRemoved, setShowRemoved] = useState(false);
  const [sourceStatus, setSourceStatus] = useState({});
  const [toast, setToast] = useState(null);
  const toastTimer = React.useRef(null);
  const [uploadSuccess, setUploadSuccess] = useState(null);
  const [sortCol, setSortCol] = useState("Alert Date");
  const [sortDir, setSortDir] = useState("desc");
  const fileInputRef = useRef(null);
  const [colWidths, setColWidths] = useState({
    Title: 200, State: 60, Agency: 160, "Due Date": 100,
    "View Link": 70, "Doc Link": 80, Assignee: 90, Status: 110, Hubspot: 68, "Add to Sources": 110,
  });

  // ── Parse EML subject ──────────────────────────────────────────────────────
  function parseEmlSubject(emlText) {
    const m = emlText.match(/^Subject:\s*(.+?)(?:\r?\n(?!\s))/m);
    return m ? m[1].trim() : "";
  }

  // ── Extract HTML body from EML ─────────────────────────────────────────────
  function emlToHtml(emlText) {
    console.log("[BidPrime] EML length:", emlText.length, "| first 300:", emlText.slice(0, 300));
    const encMatches = [...emlText.matchAll(/Content-Transfer-Encoding:\s*(\S+)/gi)];
    console.log("[BidPrime] Encodings in EML:", encMatches.map(m => m[1]));

    // Split on blank lines to walk MIME parts
    const sections = emlText.split(/\r?\n\r?\n/);
    for (let i = 0; i < sections.length - 1; i++) {
      const hdr = sections[i];
      if (!/Content-Type:\s*text\/html/i.test(hdr)) continue;
      const enc = ((hdr.match(/Content-Transfer-Encoding:\s*(\S+)/i) || [])[1] || "7bit").toLowerCase();
      console.log("[BidPrime] Found text/html part at section", i, "encoding:", enc);
      const body = sections[i + 1];
      console.log("[BidPrime] Body section start (200):", body.slice(0, 200));

      if (enc === "base64") {
        const b64 = body.replace(/\s/g, "");
        try {
          const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
          const decoded = new TextDecoder("utf-8").decode(bytes);
          console.log("[BidPrime] Base64 decoded length:", decoded.length, "| starts:", decoded.slice(0, 100));
          return decoded;
        } catch(e) { console.error("[BidPrime] atob error:", e); }
      } else if (enc === "quoted-printable") {
        const decoded = body
          .replace(/=\r?\n/g, "")
          .replace(/=([0-9A-Fa-f]{2})/g, (_, h) => String.fromCharCode(parseInt(h, 16)));
        console.log("[BidPrime] QP decoded length:", decoded.length, "| starts:", decoded.slice(0, 100));
        return decoded;
      } else {
        if (body.includes('<')) { console.log("[BidPrime] Returning plain HTML body"); return body; }
      }
    }
    console.warn("[BidPrime] Could not find text/html MIME part");
    return "";
  }

  // ── Extract bids from HTML ─────────────────────────────────────────────────
  function extractBids(html, aDate) {
    html = html.replace(/\r\n|\r|\n/g, ' ');
    console.log("[BidPrime] extractBids: html after newline cleanup (first 500):", html.slice(0, 500));
    console.log("[BidPrime] extractBids: html length:", html.length);

    // Find UUID comment positions in the raw HTML string (DOMParser strips comments)
    const commentRe = /<!--\s*([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\s*-->/gi;
    const positions = [];
    let cm;
    while ((cm = commentRe.exec(html)) !== null) {
      positions.push({ uuid: cm[1], index: cm.index });
    }
    console.log("[BidPrime] UUID comments found:", positions.length, positions.slice(0, 3).map(p => p.uuid));
    if (!positions.length) {
      console.warn("[BidPrime] No UUIDs. HTML sample:", html.slice(0, 1000));
      return [];
    }

    const parser = new DOMParser();
    const bids = [];

    for (let i = 0; i < positions.length; i++) {
      const { uuid, index } = positions[i];
      // Include up to the next comment or end of HTML — capture all 3 sibling divs
      const nextIndex = i < positions.length - 1 ? positions[i + 1].index : html.length;
      const blockHtml = html.slice(index, nextIndex);

      // Parse into a div wrapper — siblings land as direct children
      const blockDoc = parser.parseFromString(`<div>${blockHtml}</div>`, "text/html");
      const wrapper = blockDoc.body.firstElementChild;
      if (!wrapper) continue;

      // The three sibling divs (comment is stripped by DOMParser, divs remain)
      const divs = Array.from(wrapper.children);
      const isFirst = i === 0;
      if (isFirst) {
        console.log("[BidPrime] Block child count:", divs.length);
        divs.forEach((d, idx) => console.log(`[BidPrime] div[${idx}] HTML:`, d.outerHTML.slice(0, 300)));
      }

      // div0: title + view link
      const div0 = divs[0];
      if (!div0) continue;
      const titleEl = div0.querySelector('a');
      const title = titleEl ? titleEl.textContent.replace(/[\r\n]+/g, ' ').replace(/\s{2,}/g, ' ').trim() : "";
      if (isFirst) console.log("[BidPrime] extracted title:", JSON.stringify(title));
      if (!title) { if (isFirst) console.log("[BidPrime] No title in div0"); continue; }
      const viewEl = div0.querySelector('a[href*="member/inbox"]');
      const view_link = viewEl ? (viewEl.getAttribute('href') || "") : "";

      // div1: state/agency + due date
      const div1 = div0.nextElementSibling;
      let state = "", agency = "", due_date = "";
      if (div1) {
        for (const b of div1.querySelectorAll('b, strong')) {
          const m = b.textContent.trim().match(/^([A-Z]{2})\s*-\s*(.+)$/);
          if (m) { state = m[1]; agency = m[2].trim(); break; }
        }
        if (!state) {
          const m = div1.textContent.match(/\b([A-Z]{2})\s+-\s+([A-Z][A-Z\s,./]+)/);
          if (m) { state = m[1]; agency = m[2].trim(); }
        }
        for (const d of div1.querySelectorAll('div[style]')) {
          if (!(d.getAttribute('style') || "").includes('90px')) continue;
          const m = d.textContent.trim().match(/(\d{1,2}\/\d{1,2}\/\d{4})/);
          if (m) { due_date = m[1]; break; }
        }
        if (!due_date) {
          const m = div1.textContent.match(/(\d{1,2}\/\d{1,2}\/\d{4})/);
          if (m) due_date = m[1];
        }
        if (isFirst) console.log("[BidPrime] div1 text:", div1.textContent.trim().slice(0, 200));
      }

      // div2: doc link
      const div2 = div1 ? div1.nextElementSibling : null;
      let doc_link = "";
      if (div2) {
        const docEl = div2.querySelector('a[href*="/api/v2/document/download"]') ||
                      div2.querySelector('a[href*="request-documents"]') ||
                      div2.querySelector('a[href*="document"]');
        doc_link = docEl ? (docEl.getAttribute('href') || "") : "";
        if (isFirst) console.log("[BidPrime] div2 links:", Array.from(div2.querySelectorAll('a[href]')).map(a => a.getAttribute('href')));
      }

      if (isFirst) console.log("[BidPrime] Extracted:", { uuid, title, state, agency, due_date, view_link, doc_link });

      bids.push({ id: uuid, title, view_link, doc_link, state, agency, due_date, alert_date: aDate });
    }

    return bids;
  }

  // ── Subject dedup helpers ──────────────────────────────────────────────────
  const BP_SEEN_KEY = "bidprime_uploaded_subjects";
  function getUploadedSubjects() {
    try { return new Set(JSON.parse(localStorage.getItem(BP_SEEN_KEY) || "[]")); }
    catch { return new Set(); }
  }
  function recordUploadedSubject(subject) {
    const seen = getUploadedSubjects();
    seen.add(subject);
    localStorage.setItem(BP_SEEN_KEY, JSON.stringify([...seen]));
  }

  // ── Handle .eml file upload ────────────────────────────────────────────────
  function handleFile(e) {
    console.log("[BidPrime:handleFile] triggered, files:", e.target.files.length);
    const file = e.target.files[0];
    if (!file) { console.log("[BidPrime:handleFile] no file selected"); return; }
    console.log("[BidPrime:handleFile] file name:", file.name, "size:", file.size, "type:", file.type);
    const reader = new FileReader();
    reader.onerror = err => console.error("[BidPrime:handleFile] FileReader error:", err);
    reader.onload = async ev => {
      console.log("[BidPrime:handleFile] FileReader onload fired, result length:", ev.target.result ? ev.target.result.length : 0);
      const emlText = ev.target.result;
      const subject = parseEmlSubject(emlText);
      console.log("[BidPrime:handleFile] parsed subject:", JSON.stringify(subject));

      if (!subject) { showToast("Could not read email subject line", "#C60C30"); e.target.value = ""; return; }

      const alreadySeen = getUploadedSubjects().has(subject);
      console.log("[BidPrime:handleFile] duplicate check — already uploaded:", alreadySeen);
      if (alreadySeen) {
        showToast(`Already uploaded: "${subject}"`, "#C60C30");
        e.target.value = "";
        return;
      }

      let aDate = null;
      const dateMatch = subject.match(/\((\d{1,2})\/(\d{1,2})\/(\d{4})\)/);
      if (dateMatch) {
        aDate = `${dateMatch[3]}-${String(dateMatch[1]).padStart(2,'0')}-${String(dateMatch[2]).padStart(2,'0')}`;
      }
      console.log("[BidPrime:handleFile] alert date:", aDate);
      setAlertDate(aDate);

      console.log("[BidPrime:handleFile] calling emlToHtml...");
      const html = emlToHtml(emlText);
      console.log("[BidPrime:handleFile] emlToHtml returned length:", html ? html.length : 0, "| starts:", html ? html.slice(0, 80) : "(empty)");
      if (!html) { showToast("Could not parse HTML from .eml file", "#C60C30"); return; }

      console.log("[BidPrime:handleFile] calling extractBids...");
      const parsed = extractBids(html, aDate);
      console.log("[BidPrime:handleFile] extractBids returned:", parsed.length, "bids | first:", parsed[0]);

      if (!parsed.length) { showToast("No bids found in this email", "#C60C30"); return; }

      console.log("[BidPrime:handleFile] calling upsertBids...");
      const { saved, duplicates } = await upsertBids(parsed);
      console.log("[BidPrime:handleFile] upsertBids done — saved:", saved, "duplicates:", duplicates);

      recordUploadedSubject(subject);
      console.log("[BidPrime:handleFile] subject recorded, calling loadAllRows...");
      await loadAllRows();
      console.log("[BidPrime:handleFile] loadAllRows done, showing success modal");
      setUploadSuccess({ rows: saved });
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ── Upsert to bidprime_bids ────────────────────────────────────────────────
  async function upsertBids(parsed) {
    if (!parsed.length) return { saved: 0, duplicates: 0 };

    // Deduplicate within the parsed set by UUID
    let csvDups = 0;
    const seen = new Set();
    const records = [];
    for (const r of parsed) {
      if (!r.id || seen.has(r.id)) { csvDups++; continue; }
      seen.add(r.id);
      records.push(r);
    }

    // Check existing rows in DB by UUID
    const ids = records.map(r => r.id).filter(Boolean);
    let existingIds = new Set();
    if (ids.length) {
      const { data: existing } = await window._db
        .from("bidprime_bids")
        .select("id")
        .in("id", ids);
      if (existing) existing.forEach(row => existingIds.add(row.id));
    }

    const _orgId = (window._currentUser && window._currentUser.org_id) || '';
    let dbDups = 0;
    const toInsert = [];
    for (const r of records) {
      if (existingIds.has(r.id)) { dbDups++; continue; }
      toInsert.push({
        id:         r.id,
        title:      (r.title||"").slice(0, 500),
        state:      (r.state||"").slice(0, 10),
        agency:     (r.agency||"").slice(0, 300),
        due_date:   (r.due_date||""),
        view_link:  (r.view_link||"").slice(0, 2000),
        doc_link:   (r.doc_link||"").slice(0, 2000),
        alert_date: r.alert_date || null,
        org_id:     _orgId,
      });
    }

    const totalDups = csvDups + dbDups;
    if (!toInsert.length) return { saved: 0, duplicates: totalDups };

    const { error } = await window._db.from("bidprime_bids").insert(toInsert);
    if (error) console.error("upsertBids error:", error);
    return { saved: toInsert.length, duplicates: totalDups };
  }

  // ── Load from Supabase ──────────────────────────────────────────────────────
  const loadAllRows = React.useCallback(async function(attempt=0) {
    if (!window._db) {
      if (attempt < 5) setTimeout(() => loadAllRows(attempt + 1), 1000);
      return;
    }
    const _role = (window._currentUser && window._currentUser.role) || 'user';
    const _email = (window._currentUser && window._currentUser.email) || '';
    const _firstName = _email.split('@')[0].split('.')[0];
    let bpQuery = window._db.from("bidprime_bids").select("*").order("alert_date", { ascending: false }).limit(2000);
    if (_role !== 'admin' && _firstName) bpQuery = bpQuery.or(`assignee.ilike.%${_firstName}%,assignee.ilike.%${_email}%`);
    const { data, error } = await bpQuery;
    if (error) { console.error("BidPrime load error:", error); return; }
    if (!data || !data.length) return;
    setRows(data.map((r, i) => ({
      _id: i,
      _dbid: r.id,
      _assignee: r.assignee || "",
      _status: r.status || "pending",
      _hubspot: !!(r.hubspot_added),
      _added_to_sources: !!(r.added_to_sources),
      _removed: !!(r.removed),
      Title: r.title || "",
      State: r.state || "",
      Agency: r.agency || "",
      "State/Agency": r.state_agency || "",
      "Due Date": r.due_date || "",
      "View Link": r.view_link || "",
      "Doc Link": r.doc_link || "",
      "Alert Date": r.alert_date || "",
    })));
    const latest = data.find(r => r.alert_date);
    if (latest) setAlertDate(latest.alert_date);
  }, []);

  useEffect(() => { loadAllRows(); }, [loadAllRows]);

  // ── Save meta ──────────────────────────────────────────────────────────────
  async function saveMeta(dbid, field, value) {
    if (!dbid) return;
    const update = {};
    if (field === "assignee")         update.assignee         = value;
    if (field === "status")           update.status           = value;
    if (field === "hubspot")          update.hubspot_added    = value;
    if (field === "added_to_sources") update.added_to_sources = value;
    if (field === "removed")          update.removed          = value;
    if (!Object.keys(update).length) return;
    await window._db.from("bidprime_bids").update(update).eq("id", dbid);
  }

  function updateRow(id, field, value) {
    setRows(prev => prev.map(r => r._id === id ? { ...r, [field]: value } : r));
    const row = rows.find(r => r._id === id);
    if (row) saveMeta(row._dbid, field.replace(/^_/, ""), value);
  }

  function removeRow(id) {
    setRows(prev => prev.map(r => r._id === id ? { ...r, _removed: true } : r));
    const row = rows.find(r => r._id === id);
    if (row) saveMeta(row._dbid, "removed", true);
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  function showToast(msg, color="#10b981") {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast({ msg, color });
    toastTimer.current = setTimeout(() => setToast(null), color === "#C60C30" ? 4000 : 3000);
  }

  // ── Add to Sources ─────────────────────────────────────────────────────────
  async function addToSources(row) {
    const id = row._id;
    const link = (row["View Link"] || "").slice(0, 1000);
    if (!link) return;
    setSourceStatus(s => ({ ...s, [id]: "adding" }));
    const { data: existing } = await window._db.from("sources").select("id").eq("url", link).limit(1);
    if (existing && existing.length > 0) {
      setSourceStatus(s => ({ ...s, [id]: "idle" }));
      showToast("Already a source", "#C60C30");
      return;
    }
    const record = {
      friendly_name: (row.Agency || row["State/Agency"] || "BidPrime Opportunity").slice(0, 300),
      url: link,
      state: (row.State || "").slice(0, 10) || null,
      site_type: "links_page",
      captcha_protected: false,
      status: "active",
      date_added: new Date().toISOString().slice(0, 10),
    };
    const { error } = await window._db.from("sources").insert(record);
    if (error) {
      setSourceStatus(s => ({ ...s, [id]: "idle" }));
      showToast("Error adding source: " + (error.message || "unknown"), "#C60C30");
    } else {
      setSourceStatus(s => ({ ...s, [id]: "added" }));
      setRows(prev => prev.map(r => r._id === id ? { ...r, _added_to_sources: true } : r));
      saveMeta(row._dbid, "added_to_sources", true);
      showToast("Added to scanner: " + (row.Agency || ""));
    }
  }

  // ── Column resize ──────────────────────────────────────────────────────────
  function makeResizer(col) {
    return function(e) {
      e.preventDefault();
      const startX = e.clientX;
      const startW = colWidths[col];
      function onMove(ev) { setColWidths(w => ({ ...w, [col]: Math.max(50, startW + ev.clientX - startX) })); }
      function onUp() { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); }
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
    };
  }

  // ── Derived data ───────────────────────────────────────────────────────────
  const stateOptions = [...new Set(rows.map(r => r.State || "").filter(Boolean))].sort();
  const alertDateOptions = [...new Set(rows.map(r => r["Alert Date"] || "").filter(Boolean))].sort().reverse();

  const COL_KEY = {
    "Title": "Title", "State": "State", "Agency": "Agency",
    "Due Date": "Due Date", "Alert Date": "Alert Date",
    "Assignee": "_assignee", "Status": "_status",
  };

  const cols = ["Title", "State", "Agency", "Due Date", "View Link", "Doc Link", "Assignee", "Status", "Hubspot", "Add to Sources"];

  const displayed = rows
    .filter(r => {
      if (r._removed && !showRemoved) return false;
      const q = filter.toLowerCase();
      const matchText = !q || (
        (r.Title || "").toLowerCase().includes(q) ||
        (r.Agency || "").toLowerCase().includes(q) ||
        (r.State || "").toLowerCase().includes(q)
      );
      const matchState = !stateFilter || (r.State || "") === stateFilter;
      const matchDate = !alertDateFilter || (r["Alert Date"] || "") === alertDateFilter;
      const matchStatus = !statusFilter || (r._status || "pending").toLowerCase() === statusFilter.toLowerCase();
      return matchText && matchState && matchDate && matchStatus;
    })
    .slice()
    .sort((a, b) => {
      const key = COL_KEY[sortCol] || sortCol;
      const va = (a[key] || "").toString().toLowerCase();
      const vb = (b[key] || "").toString().toLowerCase();
      return sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
    });

  const colStyle = { padding:"8px 10px", borderBottom:"1px solid #003366", color:"#B0B7BC", fontSize:"12px", verticalAlign:"middle", overflow:"visible", whiteSpace:"normal", wordBreak:"break-word" };
  const thBase = { padding:"8px 10px", borderBottom:"1px solid #003366", background:"#002244", color:"#B0B7BC", fontWeight:700, fontSize:"11px", textTransform:"uppercase", letterSpacing:"0.06em", position:"sticky", top:0, zIndex:2, overflow:"hidden" };

  const resizeHandle = (col) => (
    <span onMouseDown={e => { e.stopPropagation(); makeResizer(col)(e); }} style={{ cursor:"col-resize", marginLeft:"4px", color:"#003875", userSelect:"none", fontSize:"12px", flexShrink:0 }} title="Drag to resize">⇔</span>
  );

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", padding:"24px" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px", flexShrink:0 }}>
        <div>
          <h2 style={{ color:"#ffffff", fontSize:"20px", fontWeight:700, margin:0 }}>BidPrime</h2>
          {alertDate && <div style={{ color:"#C60C30", fontSize:"13px", marginTop:"4px" }}>Alert date: {alertDate}</div>}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
          <input ref={fileInputRef} type="file" accept=".eml" onChange={handleFile} style={{ display:"none" }} />
          <button onClick={() => fileInputRef.current && fileInputRef.current.click()}
            style={{ padding:"8px 16px", borderRadius:"8px", background:"linear-gradient(135deg,#C60C30,#9a0a26)", border:"none", color:"#ffffff", fontSize:"12px", fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:"6px" }}>
            <Upload size={13} /> Upload .eml
          </button>
        </div>
      </div>

      {/* Filter bar */}
      <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"12px", flexShrink:0, flexWrap:"wrap" }}>
        <div style={{ position:"relative" }}>
          <Search size={13} color="#B0B7BC" style={{ position:"absolute", left:"10px", top:"50%", transform:"translateY(-50%)" }} />
          <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Search title, agency…"
            style={{ background:"#003366", border:"1px solid #003875", color:"#ffffff", padding:"6px 12px 6px 30px", borderRadius:"8px", fontSize:"12px", outline:"none", width:"200px" }} />
        </div>
        <select value={stateFilter} onChange={e => setStateFilter(e.target.value)}
          style={{ background:"#003366", border:"1px solid #003875", color:"#B0B7BC", fontSize:"12px", padding:"6px 10px", borderRadius:"8px", outline:"none" }}>
          <option value="">All States</option>
          {stateOptions.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <select value={alertDateFilter} onChange={e => setAlertDateFilter(e.target.value)}
          style={{ background:"#003366", border:"1px solid #003875", color:"#B0B7BC", fontSize:"12px", padding:"6px 10px", borderRadius:"8px", outline:"none" }}>
          <option value="">All Alert Dates</option>
          {alertDateOptions.map(d => <option key={d} value={d}>{d}</option>)}
        </select>
        <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
          style={{ background:"#003366", border:"1px solid #003875", color:"#B0B7BC", fontSize:"12px", padding:"6px 10px", borderRadius:"8px", outline:"none" }}>
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="working">Working</option>
          <option value="completed">Completed</option>
          <option value="dead">Dead</option>
        </select>
        <button onClick={() => setShowRemoved(v => !v)}
          style={{ padding:"6px 12px", borderRadius:"8px", background: showRemoved ? "#003875" : "#003366", border:"1px solid #003875", color: showRemoved ? "#ffffff" : "#B0B7BC", fontSize:"12px", cursor:"pointer" }}>
          {showRemoved ? "Hide removed" : "Show removed"}
        </button>
        {rows.length > 0 && <span style={{ color:"#B0B7BC", fontSize:"12px", marginLeft:"auto" }}>{displayed.length} of {rows.length} rows</span>}
      </div>

      {rows.length === 0 && (
        <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", color:"#4a6080", fontSize:"14px" }}>
          Loading… or upload a BidPrime .eml file to get started.
        </div>
      )}

      {rows.length > 0 && (
        <div style={{ flex:1, overflow:"auto", borderRadius:"10px", border:"1px solid #003366" }}>
          <table style={{ borderCollapse:"collapse", tableLayout:"fixed" }}>
            <colgroup>
              {cols.map(c => <col key={c} style={{ width: colWidths[c] + "px" }} />)}
            </colgroup>
            <thead>
              <tr>
                {cols.map(col => (
                  <th key={col} style={{ ...thBase, cursor: COL_KEY[col] ? "pointer" : "default" }}
                    onClick={() => { if (!COL_KEY[col]) return; if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc"); else { setSortCol(col); setSortDir("asc"); } }}>
                    <div style={{ display:"flex", alignItems:"center" }}>
                      <span style={{ overflow:"hidden", textOverflow:"ellipsis", flex:1 }}>{col}{sortCol === col ? (sortDir === "asc" ? " ▲" : " ▼") : ""}</span>
                      {resizeHandle(col)}
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {displayed.map((row, idx) => {
                const srcSt = sourceStatus[row._id];
                const isRemoved = row._removed;
                return (
                  <tr key={row._id} style={{ background:"#001a33", opacity: isRemoved ? 0.45 : 1 }}>
                    <td style={colStyle} title={row.Title}>{row.Title}</td>
                    <td style={colStyle}>{row.State}</td>
                    <td style={colStyle} title={row.Agency}>{row.Agency}</td>
                    <td style={colStyle}>{row["Due Date"]}</td>
                    <td style={colStyle}>{bidUrlCell(row["View Link"])}</td>
                    <td style={colStyle}>{docUrlCell(row["Doc Link"], null)}</td>
                    <td style={{ ...colStyle, whiteSpace:"normal" }}>
                      <select value={row._assignee} onChange={e => updateRow(row._id, "_assignee", e.target.value)}
                        style={{ background:"#003366", border:"1px solid #003875", color:"#B0B7BC", fontSize:"11px", padding:"3px 4px", borderRadius:"4px", width:"100%" }}>
                        <option value="">—</option>
                        <option value="Bruce">Bruce</option>
                        <option value="Mike">Mike</option>
                      </select>
                    </td>
                    <td style={{ ...colStyle, whiteSpace:"normal" }}>
                      <select value={row._status} onChange={e => updateRow(row._id, "_status", e.target.value)}
                        style={{ background:"#003366", border:"1px solid #003875", color:"#B0B7BC", fontSize:"11px", padding:"3px 4px", borderRadius:"4px", width:"100%" }}>
                        <option value="pending">Pending</option>
                        <option value="working">Working</option>
                        <option value="completed">Completed</option>
                        <option value="dead">Dead</option>
                      </select>
                    </td>
                    <td style={{ ...colStyle, textAlign:"center" }}>
                      <input type="checkbox" checked={row._hubspot} onChange={e => updateRow(row._id, "_hubspot", e.target.checked)}
                        style={{ cursor:"pointer", accentColor:"#C60C30" }} />
                    </td>
                    <td style={{ ...colStyle, whiteSpace:"normal" }}>
                      <div style={{ display:"flex", flexDirection:"column", gap:"4px" }}>
                        {(row._added_to_sources || srcSt === "added") ? (
                          <span style={{ color:"#10b981", fontSize:"11px" }}>✓ Source</span>
                        ) : (
                          <button onClick={() => addToSources(row)} disabled={srcSt === "adding" || !row["View Link"]}
                            style={{ padding:"3px 10px", borderRadius:"5px", background: (!row["View Link"] || srcSt==="adding") ? "#003366" : "#C60C30", border:"none", color: (!row["View Link"] || srcSt==="adding") ? "#4a6080" : "#fff", fontSize:"11px", fontWeight:600, cursor: (!row["View Link"] || srcSt==="adding") ? "not-allowed" : "pointer" }}>
                            {srcSt === "adding" ? "…" : "Add to Sources"}
                          </button>
                        )}
                        {!isRemoved ? (
                          <button onClick={() => removeRow(row._id)}
                            style={{ padding:"3px 10px", borderRadius:"5px", background:"#003366", border:"1px solid #003875", color:"#B0B7BC", fontSize:"11px", cursor:"pointer" }}>
                            Remove
                          </button>
                        ) : (
                          <button onClick={() => { setRows(prev => prev.map(r => r._id === row._id ? { ...r, _removed: false } : r)); saveMeta(row._dbid, "removed", false); }}
                            style={{ padding:"3px 10px", borderRadius:"5px", background:"#003366", border:"1px solid #003875", color:"#B0B7BC", fontSize:"11px", cursor:"pointer" }}>
                            Restore
                          </button>
                        )}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {uploadSuccess && <UploadSuccessModal rows={uploadSuccess.rows} onOk={() => setUploadSuccess(null)} />}

      {toast && (
        <div style={{ position:"fixed", bottom:"24px", right:"24px", zIndex:9999, background: toast.color === "#C60C30" ? "rgba(198,12,48,0.15)" : "rgba(16,185,129,0.15)", border:`1px solid ${toast.color}`, borderRadius:"10px", padding:"12px 20px", color:"#ffffff", fontSize:"13px", fontWeight:600, boxShadow:"0 8px 32px rgba(0,0,0,0.4)", maxWidth:"340px" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

      _removed: !!(r.removed),
      "Title": r.title || "",
      "Notice Type": r.notice_type || "",
      "Posted Date": r.posted_date || "",
      "Due Date": r.response_deadline || "",
      "Institution": r.department || "",
      "State": r.state || "Federal",
      "Link": r.link || "",
    })));
  }, []);

  useEffect(() => { loadRows(); }, [loadRows]);

  // ── Save meta to Supabase ───────────────────────────────────────────────────
  async function saveMeta(noticeId, field, value) {
    if (!noticeId) return;
    const update = {};
    if (field === "assignee")         update.assignee         = value;
    if (field === "status")           update.status           = value;
    if (field === "hubspot")          update.hubspot_added    = value;
    if (field === "added_to_sources") update.added_to_sources = value;
    if (field === "removed")          update.removed          = value;
    if (!Object.keys(update).length) return;
    await window._db.from("sam_gov_bids").update(update).eq("notice_id", noticeId);
  }

  function updateRow(id, field, value) {
    setRows(prev => prev.map(r => r._id === id ? { ...r, [field]: value } : r));
    const row = rows.find(r => r._id === id);
    if (row) saveMeta(row._notice_id, field.replace(/^_/, ""), value);
  }

  function removeRow(id) {
    setRows(prev => prev.map(r => r._id === id ? { ...r, _removed: true } : r));
    const row = rows.find(r => r._id === id);
    if (row) saveMeta(row._notice_id, "removed", true);
  }

  // ── Fetch from SAM.gov API ───────────────────────────────────────────────────
  async function fetchSamGov(key) {
    setFetching(true);
    setFetchMsg("Fetching from SAM.gov…");
    try {
      const today = new Date();
      const from  = new Date(today); from.setDate(from.getDate() - 30);
      const pad = n => String(n).padStart(2, "0");
      const fmt = d => `${pad(d.getMonth()+1)}/${pad(d.getDate())}/${d.getFullYear()}`;
      const postedFrom = fmt(from);
      const postedTo   = fmt(today);
      const url = `https://api.sam.gov/opportunities/v2/search?api_key=${encodeURIComponent(key)}&keywords=chromebook+ipad+apple+surplus+laptop&postedFrom=${postedFrom}&postedTo=${postedTo}&limit=100&active=true`;
      const res = await fetch(url);
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`SAM.gov API error ${res.status}: ${txt.slice(0,200)}`);
      }
      const json = await res.json();
      const opps = json.opportunitiesData || [];
      setFetchMsg(`Got ${opps.length} results — saving…`);
      if (!opps.length) { showToast("No results returned", "#C60C30"); setFetching(false); return; }

      const _orgId = (window._currentUser && window._currentUser.org_id) || '';
      const records = opps.map(o => ({
        notice_id:          (o.noticeId || o.solicitationNumber || o.id || "").slice(0, 200),
        title:              (o.title || "").slice(0, 500),
        notice_type:        (o.type || o.baseType || "").slice(0, 100),
        posted_date:        (o.postedDate || "").slice(0, 30),
        response_deadline:  (o.responseDeadLine || o.archiveDate || "").slice(0, 30),
        department:         (o.fullParentPathName || o.departmentName || o.organizationName || "").slice(0, 500),
        link:               (o.uiLink || "").slice(0, 2000),
        org_id:             _orgId,
      })).filter(r => r.notice_id);

      const { error: upsertErr } = await window._db.from("sam_gov_bids").upsert(records, { onConflict: "notice_id" });
      if (upsertErr) throw new Error("Supabase upsert error: " + (upsertErr.message || JSON.stringify(upsertErr)));
      showToast(`Saved ${records.length} SAM.gov bids`);
      await loadRows();
    } catch(err) {
      console.error("SAM.gov fetch error:", err);
      showToast("Error: " + err.message, "#C60C30");
    }
    setFetchMsg("");
    setFetching(false);
  }

  function handleFetchClick() {
    if (!apiKey) { setShowKeyPrompt(true); setKeyInput(""); return; }
    fetchSamGov(apiKey);
  }

  function handleKeySave() {
    const k = keyInput.trim();
    if (!k) return;
    localStorage.setItem("sam_gov_api_key", k);
    setApiKey(k);
    setShowKeyPrompt(false);
    fetchSamGov(k);
  }

  // ── ITAD Search ──────────────────────────────────────────────────────────────
  const ITAD_TITLE_TERMS = ["chromebook","macbook","laptop","computer surplus","itad","it asset","apple computer"];

  async function fetchItadSearch(key) {
    setItadFetching(true);
    setItadResults([]);
    setItadTotal(0);
    try {
      const today = new Date();
      const from  = new Date(today); from.setDate(from.getDate() - 90);
      const pad = n => String(n).padStart(2, "0");
      const fmt = d => `${pad(d.getMonth()+1)}/${pad(d.getDate())}/${d.getFullYear()}`;
      const url = `https://api.sam.gov/opportunities/v2/search?api_key=${encodeURIComponent(key)}&keywords=chromebook+OR+macbook+OR+laptop+OR+surplus+computer+OR+ITAD&postedFrom=${fmt(from)}&postedTo=${fmt(today)}&limit=100&active=true`;
      const res = await fetch(url);
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`SAM.gov API error ${res.status}: ${txt.slice(0, 200)}`);
      }
      const json = await res.json();
      const opps = json.opportunitiesData || [];
      if (!opps.length) { showToast("No results returned from SAM.gov", "#C60C30"); setItadFetching(false); return; }
      const matched = opps.filter(o => {
        const t = (o.title || "").toLowerCase();
        return ITAD_TITLE_TERMS.some(term => t.includes(term));
      });
      setItadTotal(opps.length);
      setItadResults(matched.map(o => ({
        title:      o.title || "",
        postedDate: (o.postedDate || "").slice(0, 10),
        dueDate:    (o.responseDeadLine || o.archiveDate || "").slice(0, 10),
        link:       o.uiLink || "",
      })));
      if (!matched.length) showToast(`0 of ${opps.length} matched ITAD terms`, "#C60C30");
      else showToast(`${matched.length} of ${opps.length} matched`);
    } catch(err) {
      console.error("ITAD search error:", err);
      showToast("Error: " + err.message, "#C60C30");
    }
    setItadFetching(false);
  }

  function handleItadSearch() {
    if (!apiKey) { setShowKeyPrompt(true); setKeyInput(""); return; }
    fetchItadSearch(apiKey);
  }

  // ── Add to Sources ───────────────────────────────────────────────────────────
  async function addToSources(row) {
    const id = row._id;
    const link = (row["Link"] || "").slice(0, 1000);
    if (!link) return;
    setSourceStatus(s => ({ ...s, [id]: "adding" }));
    const { data: existing } = await window._db.from("sources").select("id").eq("url", link).limit(1);
    if (existing && existing.length > 0) {
      setSourceStatus(s => ({ ...s, [id]: "idle" }));
      showToast("Already a source", "#C60C30");
      return;
    }
    const record = {
      friendly_name: (row["Institution"] || "SAM.gov Opportunity").slice(0, 300),
      url: link,
      state: "DC",
      site_type: "links_page",
      captcha_protected: false,
      status: "active",
      date_added: new Date().toISOString().slice(0, 10),
    };
    const { error } = await window._db.from("sources").insert(record);
    if (error) {
      setSourceStatus(s => ({ ...s, [id]: "idle" }));
      showToast("Error adding source: " + (error.message || "unknown"), "#C60C30");
    } else {
      setSourceStatus(s => ({ ...s, [id]: "added" }));
      setRows(prev => prev.map(r => r._id === id ? { ...r, _added_to_sources: true } : r));
      saveMeta(row._notice_id, "added_to_sources", true);
      showToast("Added to scanner: " + (row["Institution"] || ""));
    }
  }

  // ── Column resize ────────────────────────────────────────────────────────────
  function makeResizer(col) {
    return function(e) {
      e.preventDefault();
      const startX = e.clientX;
      const startW = colWidths[col];
      function onMove(ev) { setColWidths(w => ({ ...w, [col]: Math.max(50, startW + ev.clientX - startX) })); }
      function onUp() { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); }
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
    };
  }

                Save & Fetch
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState(() => {
    const h = window.location.hash.replace("#", "");
    if (!h || h === "dashboard" || h.includes("access_token")) return "dashboard";
    const valid = ["hot_leads","all_bids","sources","keywords","history","rfp_bids","bidprime","samgov","settings"];
    return valid.includes(h) ? h : "dashboard";
  });
  const [stateFilter, setStateFilter] = useState("all");
  const [entityFilter, setEntityFilter] = useState("all");
  const [scanning, setScanning] = useState(false);
  const [toast, setToast] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // ── AUTH ────────────────────────────────────────────────────────────────────
  const [currentUser, setCurrentUser] = useState(null);
  const [userRole, setUserRole] = useState('user');
  const [authLoading, setAuthLoading] = useState(true);
  const [dataVersion, setDataVersion] = useState(0);

  async function _loadAppData(enriched) {
    if (!window._db || !enriched) {
      console.warn("[loadAppData] aborted — _db:", !!window._db, "enriched:", !!enriched);
      return;
    }
    const role = enriched.role || 'user';
    const email = (enriched.email || '').toLowerCase();
    const firstName = email.split('@')[0].split('.')[0];

    // 1. Confirm session is live at query time
    const { data: { session: activeSession } } = await window._db.auth.getSession();
    console.log("[loadAppData] user=", email, "role=", role, "activeSession=", !!activeSession, activeSession ? ("uid=" + activeSession.user.id) : "NO SESSION");

    let leadsQ = window._db.from("leads").select("*").order("scan_date",{ascending:false}).limit(500);
    if (role !== 'admin' && firstName) leadsQ = leadsQ.or(`assignee.ilike.%${firstName}%,assignee.ilike.%${email}%`);

    const [dateRes, leadsRes, sourcesRes, scansRes] = await Promise.all([
      window._db.from("leads").select("scan_date").order("scan_date",{ascending:false}).limit(1),
      leadsQ,
      window._db.from("sources").select("*"),
      window._db.from("scans").select("*").order("started_at",{ascending:false}).limit(30),
    ]);

    // 2. Log leads query result
    console.log("[loadAppData] leads query — count:", (leadsRes.data||[]).length, "error:", leadsRes.error || null);
    console.log("[loadAppData] leads date query — latest:", dateRes.data?.[0]?.scan_date || null, "error:", dateRes.error || null);

    // 3. Log sources query result
    console.log("[loadAppData] sources query — count:", (sourcesRes.data||[]).length, "error:", sourcesRes.error || null);
    console.log("[loadAppData] scans query  — count:", (scansRes.data||[]).length,   "error:", scansRes.error  || null);

    const allLeads = leadsRes.data || [];
    const latestDate = dateRes.data?.[0]?.scan_date || null;
    if (latestDate && allLeads.length) {
      window._LIVE_HOT = allLeads.filter(l => l.scan_date === latestDate && l.tier === "HOT");
      window._LATEST_SCAN_DATE = latestDate;
    }
    window._LIVE_LEADS = allLeads;
    window._ALL_LEADS  = allLeads;
    if (sourcesRes.data?.length) {
      window._LIVE_SOURCES = sourcesRes.data;
      MOCK_SOURCES.length = 0; sourcesRes.data.forEach(x => MOCK_SOURCES.push(x));
    }
    if (scansRes.data?.length) {
      window._LIVE_SCANS = scansRes.data;
      MOCK_SCAN_HISTORY.length = 0; scansRes.data.forEach(x => MOCK_SCAN_HISTORY.push(x));
    }
    if (allLeads.length) {
      MOCK_HOT_LEADS.length = 0; (window._LIVE_HOT || []).forEach(x => MOCK_HOT_LEADS.push(x));
    }
    console.log("[loadAppData] done — latest=", latestDate, "hot=", (window._LIVE_HOT||[]).length, "leads=", allLeads.length, "sources=", (sourcesRes.data||[]).length);
    setDataVersion(v => v + 1);
  }

  async function resolveProfile(session) {
    if (!session || !session.user) {
      window._currentUser = null;
      setCurrentUser(null);
      setUserRole('user');
      setAuthLoading(false);
      return;
    }
    const user = session.user;
    const emailDomain = (user.email || '').split('@')[1] || 'unknown';
    try {
      const { data: profile } = await window._db
        .from('profiles')
        .select('role, org_id')
        .eq('id', user.id)
        .single();
      const isAdminEmail = user.email === 'itadbidbot@gmail.com';
      let role = 'user';
      let org_id = emailDomain;
      if (!profile) {
        role = isAdminEmail ? 'admin' : 'user';
        await window._db.from('profiles').insert({ id: user.id, email: user.email, role, org_id: emailDomain });
      } else {
        role = isAdminEmail ? 'admin' : (profile.role || 'user');
        org_id = profile.org_id || emailDomain;
      }
      const enriched = { ...user, role, org_id };
      window._currentUser = enriched;
      setCurrentUser(enriched);
      setUserRole(role);
      _loadAppData(enriched);
    } catch(e) {
      // Fallback: still let user in with basic info
      const fallbackRole = user.email === 'itadbidbot@gmail.com' ? 'admin' : 'user';
      const enriched = { ...user, role: fallbackRole, org_id: emailDomain };
      window._currentUser = enriched;
      setCurrentUser(enriched);
      setUserRole(fallbackRole);
      _loadAppData(enriched);
    }
    setAuthLoading(false);
  }

  React.useEffect(() => {
    // Check existing session on mount
    window._db.auth.getSession().then(({ data: { session } }) => {
      resolveProfile(session);
    });
    // Listen for auth state changes
    const { data: { subscription } } = window._db.auth.onAuthStateChange((_event, session) => {
      resolveProfile(session);
    });
    return () => subscription.unsubscribe();
  }, []);

  async function handleSignOut() {
    await window._db.auth.signOut();
    window._currentUser = null;
    setCurrentUser(null);
    setUserRole('user');
  }

  React.useEffect(() => { window._bidbotSetPage = setPage; }, []);
  React.useEffect(() => { window._bidbotRefresh = () => setDataVersion(v => v + 1); }, []);
  // Sync hash for non-dashboard pages so refresh restores position; dashboard keeps clean URL
  React.useEffect(() => {
    if (window.location.hash.includes("access_token")) return;
    if (page === "dashboard") {
      history.replaceState(null, "", window.location.pathname + window.location.search);
    } else {
      window.location.hash = page;
    }
  }, [page]);


  const [scanProgress, setScanProgress] = React.useState(0);
  const [scanStatus, setScanStatus] = React.useState("");
  const [scanComplete, setScanComplete] = React.useState(null); // { newLeads: 0 }
  const scanStartRef = React.useRef(null);
  const pollRef = React.useRef(null);
  const progressRef = React.useRef(null);

  const runScan = async () => {
    setScanning(true);
    setScanProgress(0);
    setScanComplete(null);
    setScanStatus("Connecting to scanner...");
    scanStartRef.current = Date.now();

    // Trigger real scan
    try {
      await fetch("https://bidbot-api-378239271278.us-central1.run.app/scan/run",
        { method:"POST", headers:{ "Content-Type":"application/json" } });
      setScanStatus("Scan started — scanning sources...");
    } catch(e) {
      setScanStatus("Scan triggered — monitoring for completion...");
    }

    // Real-time progress bar based on elapsed time (avg 15 min = 900s)
    const AVG_SCAN_MS = 900000;
    const statusMessages = [
      [0,    "Scan started — loading sources..."],
      [5,    "Scanning Georgia districts..."],
      [20,   "Scanning Forsyth, Franklin, Marietta..."],
      [35,   "Scanning Effingham, Wilkes, Warren..."],
      [50,   "Scanning Jefferson, Walton, Lowndes..."],
      [65,   "Scoring and filtering leads..."],
      [75,   "Checking for duplicates..."],
      [85,   "Saving leads to database..."],
      [92,   "Sending email summary..."],
      [97,   "Finishing up..."],
    ];

    progressRef.current = setInterval(() => {
      const elapsed = Date.now() - scanStartRef.current;
      const pct = Math.min(97, Math.floor((elapsed / AVG_SCAN_MS) * 100));
      setScanProgress(pct);
      // Pick status message based on progress
      const msg = statusMessages.reduce((acc, [threshold, text]) =>
        pct >= threshold ? text : acc, statusMessages[0][1]);
      setScanStatus(msg);
    }, 2000);

    // Poll Supabase every 12 seconds for scan completion
    const preLeadCount = (window._LIVE_LEADS || []).length;
    pollRef.current = setInterval(async () => {
      try {
        const res = await window._db.from("scans")
          .select("id, started_at, hot_count, leads_found")
          .order("started_at", { ascending: false })
          .limit(1);

        if (res.data && res.data.length > 0) {
          const latestScan = res.data[0];
          const scanTime = new Date(latestScan.started_at).getTime();
          // If latest scan started after we triggered
          if (scanTime >= scanStartRef.current - 30000) {
            // Check if new leads were added
            const leadsRes = await window._db.from("leads")
              .select("id", { count: "exact" })
              .gte("scan_date", new Date(scanStartRef.current - 60000).toISOString().slice(0,10));

            const newCount = leadsRes.count || latestScan.hot_count || 0;

            clearInterval(pollRef.current);
            clearInterval(progressRef.current);
            setScanProgress(100);
            setScanStatus("Scan complete!");
            setScanComplete({ newLeads: newCount });
          }
        }
      } catch(e) { console.log("Poll error:", e); }
    }, 12000);

    // Safety timeout after 25 minutes
    setTimeout(() => {
      if (pollRef.current) {
        clearInterval(pollRef.current);
        clearInterval(progressRef.current);
        setScanProgress(100);
        setScanStatus("Scan complete!");
        setScanComplete({ newLeads: 0 });
      }
    }, 1500000);

    // Also poll more aggressively in first 2 minutes
    const quickPoll = setInterval(async () => {
      try {
        const r = await window._db.from("scans").select("id,started_at,hot_count")
          .order("started_at",{ascending:false}).limit(1);
        if (r.data && r.data[0]) {
          const t = new Date(r.data[0].started_at.endsWith("Z") ? r.data[0].started_at : r.data[0].started_at+"Z").getTime();
          if (t >= scanStartRef.current - 60000) {
            clearInterval(quickPoll);
            clearInterval(pollRef.current);
            clearInterval(progressRef.current);
            setScanProgress(100);
            setScanStatus("Scan complete!");
            setScanComplete({ newLeads: r.data[0].hot_count || 0 });
          }
        }
      } catch(e) {}
    }, 5000);
    setTimeout(() => clearInterval(quickPoll), 120000);
  };

  const handleRefreshAfterScan = () => {
    setScanning(false);
    setScanComplete(null);
    setScanProgress(0);
    setScanStatus("");
    // Reload live data from Supabase
    _loadAppData(window._currentUser).then(() => {
      window._bidbotSetPage && window._bidbotSetPage("dashboard");
    });
  };

  // Auth guard
  if (authLoading) {
    return (
      <div style={{ position:"fixed", inset:0, background:"#001a33", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"16px" }}>
          <RefreshCw size={32} color="#C60C30" style={{ animation:"spin 1s linear infinite" }} />
          <span style={{ color:"#B0B7BC", fontSize:"14px" }}>Loading…</span>
        </div>
      </div>
    );
  }
  if (!currentUser) return <LoginScreen />;

  return (
    <div style={{
      display:"flex", flexDirection:"column", height:"100vh", width:"100%",
      background:"#001a33", color:"#ffffff",
      fontFamily:"'Segoe UI', system-ui, -apple-system, sans-serif"
    }}>
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { box-shadow: 0 4px 15px rgba(16,185,129,0.4); } 50% { box-shadow: 0 4px 25px rgba(16,185,129,0.8); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #002244; }
        ::-webkit-scrollbar-thumb { background: #003875; border-radius: 3px; }
        select option { background: #003366; color: #ffffff; }
      `}</style>

      <TopBar stateFilter={stateFilter} setStateFilter={setStateFilter} entityFilter={entityFilter} setEntityFilter={setEntityFilter} onRunScan={runScan} scanning={scanning} scanProgress={scanProgress} onHamburger={() => setSidebarOpen(true)} currentUser={currentUser} onSignOut={handleSignOut} />

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
        <Sidebar active={page} setActive={(p) => { setPage(p); setSidebarOpen(false); }} onRunScan={runScan} scanning={scanning} isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} userRole={userRole} />

        <main style={{ flex:1, display:"flex", overflow:"hidden", background:"#001a33" }}>
          {page==="dashboard"  && <DashboardView onNavigate={setPage} onRunScan={runScan} scanning={scanning} />}
          {page==="hot_leads"  && <HotLeadsView stateFilter={stateFilter} />}
          {page==="all_bids"   && <HotLeadsView stateFilter={stateFilter} allBids />}
          {page==="sources"    && <SourcesView />}
          {page==="keywords"   && <KeywordsView />}
          {page==="history"    && <ScanHistoryView />}
          {page==="rfp_bids"   && <RFPBidsView />}
          {page==="bidprime"   && <BidPrimeView />}
          {page==="samgov"     && <SamGovView />}
          {page==="settings"   && <SettingsView />}
        </main>
      </div>

      {/* Toast */}
      {toast && (
        <div style={{
          position:"fixed", bottom:"24px", right:"24px",
          background: toast.type==="success" ? "#10b981" : "#C60C30",
          color:"#fff", padding:"12px 20px", borderRadius:"10px",
          fontSize:"13px", fontWeight:600, boxShadow:"0 8px 24px rgba(0,0,0,0.4)",
          display:"flex", alignItems:"center", gap:"8px", zIndex:9999,
          animation:"slideIn 0.3s ease"
        }}>
          <CheckCircle size={15} /> {toast.msg}
        </div>
      )}
    </div>
  );
}


var _bidbotRoot = null;
function _mountBidBot() {
  var hot=window._LIVE_HOT, all=window._LIVE_LEADS, src=window._LIVE_SOURCES, scn=window._LIVE_SCANS;
  if (hot) { MOCK_HOT_LEADS.length=0; hot.forEach(function(x){MOCK_HOT_LEADS.push(x);}); }
  if (all) { window._ALL_LEADS=all; }
  if (src) { MOCK_SOURCES.length=0; src.forEach(function(x){MOCK_SOURCES.push(x);}); }
  if (scn) { MOCK_SCAN_HISTORY.length=0; scn.forEach(function(x){MOCK_SCAN_HISTORY.push(x);}); }
  if (!_bidbotRoot) {
    _bidbotRoot = ReactDOM.createRoot(document.getElementById("root"));
  }
  _bidbotRoot.render(React.createElement(App));
}
if (window._bidbotData && window._bidbotData.ready) { _mountBidBot(); }
else {
  window._bidbotData.onReady = _mountBidBot;
  setTimeout(function(){ if(window._bidbotData.onReady){window._bidbotData.onReady=null;_mountBidBot();} }, 8000);
}
</script>
