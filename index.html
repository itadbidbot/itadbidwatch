function RFPBidsView() {
  const [rows, setRows] = useState([]);
  const [fileDate, setFileDate] = useState(null);
  const [filter, setFilter] = useState("");
  const [stateFilter, setStateFilter] = useState("");
  const [sectorFilter, setSectorFilter] = useState("");
  const [showRemoved, setShowRemoved] = useState(false);
  const [sourceStatus, setSourceStatus] = useState({});
  const [rfpToast, setRfpToast] = useState(null);
  const rfpToastTimer = React.useRef(null);
  const ANTHROPIC_KEY = ["sk-ant-","api03-4Hf-a69pSKHEb","BAboHpW0UXU7v-J4hPWw","6LuwAXIHe0XfHI6rG53n","RvFAIM5_n4aPNAvRjzCbw","OgIsxqWLffqg-1O9RFQAA"].join("");
  const [colWidths, setColWidths] = useState({
    Title: 180, "Scan Date": 100, "Bid Type": 110, "Due Date": 100,
    Institution: 160, "Bid URL": 70, "Doc URL": 100, "Bid Doc": 80,
    Assignee: 90, Status: 110, Hubspot: 68, "Add to Sources": 110,
  });
  const [extractModal, setExtractModal] = useState({ open: false, loading: false, row: null, contact: null, error: null });
  const fileInputRef = useRef(null);

  // ── CSV parser ──────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    if (lines.length < 2) return [];
    const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
    const results = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const fields = [];
      let cur = "", inQ = false;
      for (let c = 0; c < line.length; c++) {
        if (line[c] === '"') { inQ = !inQ; }
        else if (line[c] === ',' && !inQ) { fields.push(cur); cur = ""; }
        else { cur += line[c]; }
      }
      fields.push(cur);
      const obj = {};
      headers.forEach((h, idx) => { obj[h] = (fields[idx] || "").trim(); });
      results.push(obj);
    }
    return results;
  }

  // ── Upsert CSV rows to rfp_bids ─────────────────────────────────────────────
  async function upsertRfpRows(parsed, fDate) {
    if (!parsed.length) return;
    const records = parsed.map(r => ({
      bid_url:        (r["Bid URL"]        || r["bid_url"]        || "").slice(0, 2000),
      title:          (r["Title"]          || r["title"]          || "").slice(0, 500),
      document_url:   (r["Doc URL"]        || r["doc_url"]        || r["Document URL"] || "").slice(0, 2000),
      bid_documents:  (r["Bid Documents"]  || r["bid_documents"]  || "").slice(0, 2000),
      publish_date:   r["Publish Date"]    || r["publish_date"]   || null,
      pre_bid_date:   r["Pre-bid Date"]    || r["pre_bid_date"]   || null,
      due_date:       r["Due Date"]        || r["due_date"]       || null,
      memo:           (r["Memo"]           || r["memo"]           || "").slice(0, 1000),
      bid_type:       (r["Bid Type"]       || r["bid_type"]       || "").slice(0, 200),
      institution:    (r["Institution"]    || r["institution"]    || "").slice(0, 300),
      state:          (r["State"]          || r["state"]          || "").slice(0, 10),
      market_sectors: (r["Market Sectors"] || r["market_sectors"] || "").slice(0, 500),
      file_date:      fDate || null,
      doc_id:         (r["Doc ID"]         || r["doc_id"]         || "").slice(0, 200),
    })).filter(r => r.bid_url);
    if (!records.length) return;
    const { data: upsertData, error: upsertErr } = await window._db.from("rfp_bids").upsert(records, { onConflict: "doc_id" });
    if (upsertErr) console.error("upsertRfpRows error:", JSON.stringify(upsertErr), upsertErr);
    else console.log("upsertRfpRows: saved", records.length, "rows to rfp_bids", upsertData);
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    let fDate = null;
    const match = file.name.match(/(\d{8})/);
    if (match) {
      const raw = match[1];
      fDate = `${raw.slice(0,4)}-${raw.slice(4,6)}-${raw.slice(6,8)}`;
      setFileDate(fDate);
    } else {
      setFileDate(null);
    }
    const reader = new FileReader();
    reader.onload = ev => {
      const parsed = parseCSV(ev.target.result);
      console.log("CSV parsed, total rows:", parsed.length, "first row:", parsed[0]);
      upsertRfpRows(parsed, fDate);
      const withMeta = parsed.map((r, i) => ({
        ...r, _id: i, _assignee: "", _status: "pending", _hubspot: false, _removed: false,
      }));
      setRows(withMeta);
      setDbStatus({});
      setDbErrors({});
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ── Load all rows from rfp_bids on mount ────────────────────────────────────
  useEffect(() => {
    async function loadFromDB(attempt) {
      console.log("Loading RFP bids, _db ready:", !!window._db, "attempt:", attempt);
      if (!window._db) {
        if (attempt < 5) setTimeout(() => loadFromDB(attempt + 1), 1000);
        else console.warn("RFP load: window._db never became available after 5 retries");
        return;
      }
      const { data, error } = await window._db
        .from("rfp_bids")
        .select("*")
        .order("file_date", { ascending: false })
        .limit(2000);
      if (error) { console.error("RFP load error:", error); return; }
      console.log("RFP bids loaded from Supabase:", data ? data.length : 0, "rows");
      if (data && data.length > 0) console.log("RFP first raw row from Supabase:", data[0]);
      if (!data || !data.length) return;
      const withMeta = data.map((r, i) => ({
        _id: i,
        _assignee:         r.assignee         || "",
        _status:           r.status           || "pending",
        _hubspot:          !!(r.hubspot_added),
        _added_to_sources: !!(r.added_to_sources),
        _removed:          false,
        "Doc ID":         r.doc_id         || "",
        "Title":          r.title          || "",
        "Bid URL":        r.bid_url        || "",
        "Doc URL":        r.document_url   || "",
        "Bid Documents":  r.bid_documents  || "",
        "Publish Date":   r.publish_date   || "",
        "Pre-bid Date":   r.pre_bid_date   || "",
        "Due Date":       r.due_date       || "",
        "Memo":           r.memo           || "",
        "Bid Type":       r.bid_type       || "",
        "Institution":    r.institution    || "",
        "State":          r.state          || "",
        "Market Sectors": r.market_sectors || "",
        "Scan Date":      r.file_date      || "",
      }));
      setRows(withMeta);
      const latest = data.find(r => r.file_date);
      if (latest) setFileDate(latest.file_date);
    }
    loadFromDB(0);
  }, []);

  async function saveMeta(row, field, value) {
    const bidUrl = row["Bid URL"] || row["bid_url"] || "";
    if (!bidUrl) return;
    const update = { bid_url: bidUrl };
    if (field === "assignee")          update.assignee          = value;
    if (field === "status")            update.status            = value;
    if (field === "hubspot")           update.hubspot_added     = value;
    if (field === "added_to_sources")  update.added_to_sources  = value;
    await window._db.from("rfp_bids").upsert(update, { onConflict: "doc_id" });
  }

  function updateRow(id, field, value) {
    setRows(prev => prev.map(r => r._id === id ? { ...r, [field]: value } : r));
    const row = rows.find(r => r._id === id);
    if (row) saveMeta({ ...row, [field]: value }, field.replace(/^_/, ""), value);
  }

  function removeRow(id) {
    setRows(prev => prev.map(r => r._id === id ? { ...r, _removed: true } : r));
  }

  // ── Show toast ──────────────────────────────────────────────────────────────
  function showRfpToast(msg, color="#10b981") {
    if (rfpToastTimer.current) clearTimeout(rfpToastTimer.current);
    setRfpToast({ msg, color });
    rfpToastTimer.current = setTimeout(() => setRfpToast(null), color === "#f59e0b" ? 4000 : 3000);
  }

  // ── State name → 2-letter code map ─────────────────────────────────────────
  const STATE_MAP = {
    "Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA",
    "Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA",
    "Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA",
    "Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD",
    "Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO",
    "Montana":"MT","Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ",
    "New Mexico":"NM","New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH",
    "Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC",
    "South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT",
    "Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY",
    "District of Columbia":"DC","Washington DC":"DC","Washington D.C.":"DC",
  };

  // ── Add to Sources ──────────────────────────────────────────────────────────
  async function addToSources(row) {
    const id = row._id;
    const tr = s => (s || "").trim();
    const bidUrl = tr(row["Bid URL"] || row["bid_url"]).slice(0, 1000);
    if (!bidUrl) return;
    setSourceStatus(s => ({ ...s, [id]: "adding" }));
    const { data: existing } = await window._db.from("sources").select("id").eq("url", bidUrl).limit(1);
    if (existing && existing.length > 0) {
      setSourceStatus(s => ({ ...s, [id]: "idle" }));
      showRfpToast("Already a source", "#f59e0b");
      return;
    }
    const institution = tr(row["Institution"] || row["institution"]).slice(0, 300);
    const rawState = tr(row["State"] || row["state"]);
    const state = STATE_MAP[rawState] || rawState.slice(0, 2).toUpperCase() || null;
    const record = {
      friendly_name:     institution,
      url:               bidUrl,
      state:             state,
      site_type:         "other",
      captcha_protected: false,
      status:            "active",
      date_added:        new Date().toISOString().slice(0, 10),
    };
    const { error } = await window._db.from("sources").insert(record);
    if (error) {
      console.error("Add to sources error:", error);
      setSourceStatus(s => ({ ...s, [id]: "idle" }));
      showRfpToast("Error adding source: " + (error.message || "unknown"), "#ef4444");
    } else {
      setSourceStatus(s => ({ ...s, [id]: "added" }));
      setRows(prev => prev.map(r => r._id === id ? { ...r, _added_to_sources: true } : r));
      saveMeta(row, "added_to_sources", true);
      showRfpToast("Added to scanner: " + institution);
    }
  }

  // ── Column resize ───────────────────────────────────────────────────────────
  function makeResizer(col) {
    return function(e) {
      e.preventDefault();
      const startX = e.clientX;
      const startW = colWidths[col];
      function onMove(ev) {
        setColWidths(w => ({ ...w, [col]: Math.max(50, startW + ev.clientX - startX) }));
      }
      function onUp() {
        window.removeEventListener("mousemove", onMove);
        window.removeEventListener("mouseup", onUp);
      }
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
    };
  }

  // ── PDF contact extraction ──────────────────────────────────────────────────
  async function extractContact(row) {
    const docUrl = row["Doc URL"] || row["doc_url"] || row["Document URL"] || "";
    if (!docUrl) return;
    setExtractModal({ open: true, loading: true, row, contact: null, error: null });
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": ANTHROPIC_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 512,
          messages: [{
            role: "user",
            content: [
              { type: "document", source: { type: "url", url: docUrl } },
              { type: "text", text: 'Extract contact information from this document. Return JSON only with these exact keys: {"name":"","title":"","email":"","phone":"","organization":"","address":""}' },
            ],
          }],
        }),
      });
      if (!res.ok) { const t = await res.text(); throw new Error(t); }
      const data = await res.json();
      const text = (data.content?.[0]?.text || "").trim();
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("No JSON returned: " + text.slice(0, 200));
      const contact = JSON.parse(match[0]);
      setExtractModal(m => ({ ...m, loading: false, contact }));
    } catch(err) {
      console.error("Extract contact error:", err);
      setExtractModal(m => ({ ...m, loading: false, error: err.message }));
    }
  }

  // ── Derived data ────────────────────────────────────────────────────────────
  const stateOptions = [...new Set(rows.map(r => r["State"] || r["state"] || "").filter(Boolean))].sort();
  const sectorOptions = [...new Set(rows.map(r => r["Market Sectors"] || r["market_sectors"] || "").filter(Boolean))].sort();

  const displayed = rows
    .filter(r => {
      if (r._removed && !showRemoved) return false;
      const q = filter.toLowerCase();
      const matchText = !q || (
        (r["Title"] || "").toLowerCase().includes(q) ||
        (r["Institution"] || "").toLowerCase().includes(q) ||
        (r["State"] || "").toLowerCase().includes(q)
      );
      const matchState = !stateFilter || (r["State"] || r["state"] || "") === stateFilter;
      const matchSector = !sectorFilter || (r["Market Sectors"] || r["market_sectors"] || "") === sectorFilter;
      return matchText && matchState && matchSector;
    })
    .slice()
    .sort((a, b) => {
      const da = a["Scan Date"] || a["scan_date"] || a["Publish Date"] || "";
      const db2 = b["Scan Date"] || b["scan_date"] || b["Publish Date"] || "";
      return db2.localeCompare(da);
    });

  // ── Doc type badge helper ────────────────────────────────────────────────────
  function docBadge(url) {
    if (!url) return null;
    const u = url.toLowerCase();
    let label = null;
    if (u.includes(".pdf"))  label = "PDF";
    else if (u.includes(".docx") || u.includes(".doc")) label = "DOC";
    else if (u.includes(".xlsx") || u.includes(".xls")) label = "XLS";
    else if (u.includes("document") || u.includes("filedownload") || u.includes("download")) label = "DOC";
    if (!label) return null;
    return <span style={{ display:"inline-block", background:"rgba(245,158,11,0.15)", border:"1px solid rgba(245,158,11,0.35)", color:"#f59e0b", fontSize:"9px", fontWeight:700, padding:"1px 5px", borderRadius:"3px", letterSpacing:"0.05em", marginLeft:"5px", verticalAlign:"middle" }}>{label}</span>;
  }

  // ── Styles ──────────────────────────────────────────────────────────────────
  const colStyle = { padding:"8px 10px", borderBottom:"1px solid #1e293b", color:"#cbd5e1", fontSize:"12px", verticalAlign:"middle", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:0 };
  const thBase = { padding:"8px 10px", borderBottom:"1px solid #1e293b", background:"#0f172a", color:"#94a3b8", fontWeight:700, fontSize:"11px", textTransform:"uppercase", letterSpacing:"0.06em", position:"sticky", top:0, zIndex:2, overflow:"hidden" };

  const cols = ["Title","Scan Date","Bid Type","Due Date","Institution","Bid URL","Doc URL","Bid Doc","Assignee","Status","Hubspot","Add to Sources"];

  const resizeHandle = (col) => (
    <span onMouseDown={makeResizer(col)} style={{ cursor:"col-resize", marginLeft:"4px", color:"#334155", userSelect:"none", fontSize:"12px", flexShrink:0 }} title="Drag to resize">⇔</span>
  );

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", padding:"24px" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px", flexShrink:0 }}>
        <div>
          <h2 style={{ color:"#f8fafc", fontSize:"20px", fontWeight:700, margin:0 }}>RFP School Watch</h2>
          {fileDate && <div style={{ color:"#f59e0b", fontSize:"13px", marginTop:"4px" }}>File date: {fileDate}</div>}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
          <input ref={fileInputRef} type="file" accept=".csv" onChange={handleFile} style={{ display:"none" }} />
          <button onClick={() => fileInputRef.current && fileInputRef.current.click()}
            style={{ padding:"8px 16px", borderRadius:"8px", background:"linear-gradient(135deg,#f59e0b,#f97316)", border:"none", color:"#0f172a", fontSize:"12px", fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:"6px" }}>
            <Upload size={13} /> Upload CSV
          </button>
        </div>
      </div>

      {/* Filter bar */}
      <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"12px", flexShrink:0, flexWrap:"wrap" }}>
        <div style={{ position:"relative" }}>
          <Search size={13} color="#64748b" style={{ position:"absolute", left:"10px", top:"50%", transform:"translateY(-50%)" }} />
          <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Search title, institution…"
            style={{ background:"#1e293b", border:"1px solid #334155", color:"#f8fafc", padding:"6px 12px 6px 30px", borderRadius:"8px", fontSize:"12px", outline:"none", width:"200px" }} />
        </div>
        <select value={stateFilter} onChange={e => setStateFilter(e.target.value)}
          style={{ background:"#1e293b", border:"1px solid #334155", color:"#cbd5e1", fontSize:"12px", padding:"6px 10px", borderRadius:"8px", outline:"none" }}>
          <option value="">All States</option>
          {stateOptions.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <select value={sectorFilter} onChange={e => setSectorFilter(e.target.value)}
          style={{ background:"#1e293b", border:"1px solid #334155", color:"#cbd5e1", fontSize:"12px", padding:"6px 10px", borderRadius:"8px", outline:"none", maxWidth:"200px" }}>
          <option value="">All Market Sectors</option>
          {sectorOptions.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <button onClick={() => setShowRemoved(v => !v)}
          style={{ padding:"6px 12px", borderRadius:"8px", background: showRemoved ? "#334155" : "#1e293b", border:"1px solid #334155", color: showRemoved ? "#f8fafc" : "#64748b", fontSize:"12px", cursor:"pointer" }}>
          {showRemoved ? "Hide removed" : "Show removed"}
        </button>
        {rows.length > 0 && <span style={{ color:"#64748b", fontSize:"12px", marginLeft:"auto" }}>{displayed.length} of {rows.length} rows</span>}
      </div>

      {rows.length === 0 && (
        <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", color:"#475569", fontSize:"14px" }}>
          Loading… or upload a RFPSchoolwatch CSV file to get started.
        </div>
      )}

      {rows.length > 0 && (
        <div style={{ flex:1, overflow:"auto", borderRadius:"10px", border:"1px solid #1e293b" }}>
          <table style={{ borderCollapse:"collapse", tableLayout:"fixed" }}>
            <colgroup>
              {cols.map(c => <col key={c} style={{ width: colWidths[c] + "px" }} />)}
            </colgroup>
            <thead>
              <tr>
                {cols.map(col => (
                  <th key={col} style={thBase}>
                    <div style={{ display:"flex", alignItems:"center" }}>
                      <span style={{ overflow:"hidden", textOverflow:"ellipsis", flex:1 }}>{col}</span>
                      {resizeHandle(col)}
                    </div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {displayed.map((row, idx) => {
                const bidUrl = row["Bid URL"] || row["bid_url"] || "";
                const docUrl = row["Doc URL"] || row["doc_url"] || row["Document URL"] || "";
                const bidDocUrl = row["Bid Documents"] || row["bid_documents"] || row["Bid Doc"] || "";
                const scanDate = row["Scan Date"] || row["scan_date"] || fileDate || "";
                const srcSt = sourceStatus[row._id];
                const isRemoved = row._removed;
                return (
                  <tr key={row._id} style={{ background: isRemoved ? "#0f1a2e" : idx % 2 === 0 ? "#0a0f1e" : "#0d1424", opacity: isRemoved ? 0.45 : 1 }}>
                    <td style={colStyle} title={row["Title"] || ""}>{row["Title"] || ""}</td>
                    <td style={colStyle} title={scanDate}>{scanDate}</td>
                    <td style={colStyle} title={row["Bid Type"] || ""}>{row["Bid Type"] || ""}</td>
                    <td style={colStyle} title={row["Due Date"] || ""}>{row["Due Date"] || ""}</td>
                    <td style={colStyle} title={row["Institution"] || ""}>
                      <span>{row["Institution"] || ""}</span>
                      {docBadge(docUrl || bidDocUrl)}
                    </td>
                    <td style={colStyle} title={bidUrl}>{bidUrl ? <a href={bidUrl} target="_blank" rel="noreferrer" style={{ color:"#3b82f6", fontSize:"11px" }}>View</a> : "—"}</td>
                    <td style={{ ...colStyle, whiteSpace:"normal" }} title={docUrl}>
                      <div style={{ display:"flex", flexDirection:"column", gap:"4px" }}>
                        {docUrl ? <a href={docUrl} target="_blank" rel="noreferrer" style={{ color:"#3b82f6", fontSize:"11px" }}>Doc</a> : <span style={{ color:"#475569" }}>—</span>}
                        {docUrl && (
                          <button onClick={() => extractContact(row)}
                            style={{ padding:"2px 7px", borderRadius:"4px", background:"#1e3a5f", border:"1px solid #1d4ed8", color:"#93c5fd", fontSize:"10px", cursor:"pointer", fontWeight:600 }}>
                            Extract
                          </button>
                        )}
                      </div>
                    </td>
                    <td style={colStyle} title={bidDocUrl}>{bidDocUrl ? <a href={bidDocUrl} target="_blank" rel="noreferrer" style={{ color:"#3b82f6", fontSize:"11px" }}>Docs →</a> : "—"}</td>
                    <td style={{ ...colStyle, whiteSpace:"normal" }}>
                      <select value={row._assignee} onChange={e => updateRow(row._id, "_assignee", e.target.value)}
                        style={{ background:"#1e293b", border:"1px solid #334155", color:"#cbd5e1", fontSize:"11px", padding:"3px 4px", borderRadius:"4px", width:"100%" }}>
                        <option value="">—</option>
                        <option value="Bruce">Bruce</option>
                        <option value="Mike">Mike</option>
                      </select>
                    </td>
                    <td style={{ ...colStyle, whiteSpace:"normal" }}>
                      <select value={row._status} onChange={e => updateRow(row._id, "_status", e.target.value)}
                        style={{ background:"#1e293b", border:"1px solid #334155", color:"#cbd5e1", fontSize:"11px", padding:"3px 4px", borderRadius:"4px", width:"100%" }}>
                        <option value="pending">Pending</option>
                        <option value="working">Working</option>
                        <option value="completed">Completed</option>
                        <option value="dead">Dead</option>
                      </select>
                    </td>
                    <td style={{ ...colStyle, textAlign:"center", whiteSpace:"normal" }}>
                      <input type="checkbox" checked={row._hubspot} onChange={e => updateRow(row._id, "_hubspot", e.target.checked)}
                        style={{ cursor:"pointer", accentColor:"#f59e0b" }} />
                    </td>
                    <td style={{ ...colStyle, whiteSpace:"normal" }}>
                      <div style={{ display:"flex", flexDirection:"column", gap:"4px" }}>
                        {(row._added_to_sources || srcSt === "added") ? (
                          <span style={{ color:"#10b981", fontSize:"11px" }}>✓ Source</span>
                        ) : (
                          <button onClick={() => addToSources(row)} disabled={srcSt === "adding" || !bidUrl}
                            style={{ padding:"3px 10px", borderRadius:"5px", background: (!bidUrl || srcSt==="adding") ? "#1e293b" : "#1d4ed8", border:"none", color: (!bidUrl || srcSt==="adding") ? "#475569" : "#fff", fontSize:"11px", fontWeight:600, cursor: (!bidUrl || srcSt==="adding") ? "not-allowed" : "pointer" }}>
                            {srcSt === "adding" ? "…" : "Add to Sources"}
                          </button>
                        )}
                        {!isRemoved ? (
                          <button onClick={() => removeRow(row._id)}
                            style={{ padding:"3px 10px", borderRadius:"5px", background:"#1e293b", border:"1px solid #334155", color:"#64748b", fontSize:"11px", cursor:"pointer" }}>
                            Remove
                          </button>
                        ) : (
                          <button onClick={() => setRows(prev => prev.map(r => r._id === row._id ? { ...r, _removed: false } : r))}
                            style={{ padding:"3px 10px", borderRadius:"5px", background:"#1e293b", border:"1px solid #334155", color:"#94a3b8", fontSize:"11px", cursor:"pointer" }}>
                            Restore
                          </button>
                        )}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* ── Toast ────────────────────────────────────────────────────────── */}
      {rfpToast && (
        <div style={{ position:"fixed", bottom:"24px", right:"24px", zIndex:9999, background: rfpToast.color === "#f59e0b" ? "rgba(245,158,11,0.15)" : rfpToast.color === "#ef4444" ? "rgba(239,68,68,0.15)" : "rgba(16,185,129,0.15)", border:`1px solid ${rfpToast.color}`, borderRadius:"10px", padding:"12px 20px", color:"#f8fafc", fontSize:"13px", fontWeight:600, boxShadow:"0 8px 32px rgba(0,0,0,0.4)", maxWidth:"340px" }}>
          {rfpToast.msg}
        </div>
      )}

      {/* ── Extract Contact Modal ─────────────────────────────────────────── */}
      {extractModal.open && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:9000, display:"flex", alignItems:"center", justifyContent:"center" }}
          onClick={e => { if (e.target === e.currentTarget) setExtractModal(m => ({ ...m, open: false })); }}>
          <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"14px", padding:"28px", width:"420px", maxWidth:"95vw", boxShadow:"0 24px 60px rgba(0,0,0,0.6)", position:"relative" }}>
            {/* Close */}
            <button onClick={() => setExtractModal(m => ({ ...m, open: false }))}
              style={{ position:"absolute", top:"14px", right:"14px", background:"transparent", border:"none", color:"#64748b", cursor:"pointer", fontSize:"18px", lineHeight:1 }}>✕</button>

            <div style={{ fontWeight:700, fontSize:"15px", color:"#f8fafc", marginBottom:"4px", display:"flex", alignItems:"center", gap:"8px" }}>
              <FileText size={15} color="#3b82f6" /> Contact Extraction
            </div>
            <div style={{ fontSize:"11px", color:"#64748b", marginBottom:"20px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {extractModal.row && (extractModal.row["Doc URL"] || extractModal.row["doc_url"] || "")}
            </div>

            {extractModal.loading && (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"14px", padding:"20px 0" }}>
                <RefreshCw size={28} color="#3b82f6" style={{ animation:"spin 1s linear infinite" }} />
                <span style={{ color:"#94a3b8", fontSize:"13px" }}>Analyzing document…</span>
              </div>
            )}

            {extractModal.error && !extractModal.loading && (
              <div style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:"8px", padding:"12px", color:"#fca5a5", fontSize:"12px" }}>
                {extractModal.error}
              </div>
            )}

            {extractModal.contact && !extractModal.loading && (
              <div>
                <div style={{ background:"#0f172a", borderRadius:"10px", padding:"16px", display:"flex", flexDirection:"column", gap:"10px", marginBottom:"16px" }}>
                  {[
                    { label:"Name", key:"name" },
                    { label:"Title", key:"title" },
                    { label:"Email", key:"email" },
                    { label:"Phone", key:"phone" },
                    { label:"Organization", key:"organization" },
                    { label:"Address", key:"address" },
                  ].map(({ label, key }) => (
                    <div key={key} style={{ display:"flex", gap:"10px", alignItems:"flex-start" }}>
                      <span style={{ fontSize:"10px", color:"#64748b", fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", minWidth:"82px", paddingTop:"1px" }}>{label}</span>
                      <span style={{ fontSize:"13px", color: extractModal.contact[key] ? "#f8fafc" : "#475569", wordBreak:"break-word" }}>
                        {extractModal.contact[key] || "—"}
                      </span>
                    </div>
                  ))}
                </div>
                <div style={{ position:"relative", display:"inline-block" }}>
                  <button disabled title="Coming Soon"
                    style={{ padding:"8px 18px", borderRadius:"8px", background:"#1e293b", border:"1px solid #334155", color:"#475569", fontSize:"12px", fontWeight:600, cursor:"not-allowed" }}>
                    Add to HubSpot
                  </button>
                  <span style={{ position:"absolute", top:"-22px", left:"50%", transform:"translateX(-50%)", background:"#0f172a", border:"1px solid #334155", color:"#94a3b8", fontSize:"10px", padding:"2px 8px", borderRadius:"4px", whiteSpace:"nowrap" }}>Coming Soon</span>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState(() => {
    const hash = window.location.hash.replace("#", "");
    const valid = ["dashboard","hot_leads","all_bids","sources","keywords","history","rfp_bids","settings"];
    return valid.includes(hash) ? hash : "dashboard";
  });
  const [stateFilter, setStateFilter] = useState("all");
  const [entityFilter, setEntityFilter] = useState("all");
  const [scanning, setScanning] = useState(false);
  const [toast, setToast] = useState(null);

  React.useEffect(() => { window._bidbotSetPage = setPage; }, []);

  // Sync page to URL hash so refresh stays on same page
  React.useEffect(() => { window.location.hash = page; }, [page]);

  const [scanProgress, setScanProgress] = React.useState(0);
  const [scanStatus, setScanStatus] = React.useState("");
  const [scanComplete, setScanComplete] = React.useState(null); // { newLeads: 0 }
  const scanStartRef = React.useRef(null);
  const pollRef = React.useRef(null);
  const progressRef = React.useRef(null);

  const runScan = async () => {
    setScanning(true);
    setScanProgress(0);
    setScanComplete(null);
    setScanStatus("Connecting to scanner...");
    scanStartRef.current = Date.now();

    // Trigger real scan
    try {
      await fetch("https://bidbot-api-378239271278.us-central1.run.app/scan/run",
        { method:"POST", headers:{ "Content-Type":"application/json" } });
      setScanStatus("Scan started — scanning sources...");
    } catch(e) {
      setScanStatus("Scan triggered — monitoring for completion...");
    }

    // Real-time progress bar based on elapsed time (avg 15 min = 900s)
    const AVG_SCAN_MS = 900000;
    const statusMessages = [
      [0,    "Scan started — loading sources..."],
      [5,    "Scanning Georgia districts..."],
      [20,   "Scanning Forsyth, Franklin, Marietta..."],
      [35,   "Scanning Effingham, Wilkes, Warren..."],
      [50,   "Scanning Jefferson, Walton, Lowndes..."],
      [65,   "Scoring and filtering leads..."],
      [75,   "Checking for duplicates..."],
      [85,   "Saving leads to database..."],
      [92,   "Sending email summary..."],
      [97,   "Finishing up..."],
    ];

    progressRef.current = setInterval(() => {
      const elapsed = Date.now() - scanStartRef.current;
      const pct = Math.min(97, Math.floor((elapsed / AVG_SCAN_MS) * 100));
      setScanProgress(pct);
      // Pick status message based on progress
      const msg = statusMessages.reduce((acc, [threshold, text]) =>
        pct >= threshold ? text : acc, statusMessages[0][1]);
      setScanStatus(msg);
    }, 2000);

    // Poll Supabase every 12 seconds for scan completion
    const preLeadCount = (window._LIVE_LEADS || []).length;
    pollRef.current = setInterval(async () => {
      try {
        const res = await window._db.from("scans")
          .select("id, started_at, hot_count, leads_found")
          .order("started_at", { ascending: false })
          .limit(1);

        if (res.data && res.data.length > 0) {
          const latestScan = res.data[0];
          const scanTime = new Date(latestScan.started_at).getTime();
          // If latest scan started after we triggered
          if (scanTime >= scanStartRef.current - 30000) {
            // Check if new leads were added
            const leadsRes = await window._db.from("leads")
              .select("id", { count: "exact" })
              .gte("scan_date", new Date(scanStartRef.current - 60000).toISOString().slice(0,10));

            const newCount = leadsRes.count || latestScan.hot_count || 0;

            clearInterval(pollRef.current);
            clearInterval(progressRef.current);
            setScanProgress(100);
            setScanStatus("Scan complete!");
            setScanComplete({ newLeads: newCount });
          }
        }
      } catch(e) { console.log("Poll error:", e); }
    }, 12000);

    // Safety timeout after 25 minutes
    setTimeout(() => {
      if (pollRef.current) {
        clearInterval(pollRef.current);
        clearInterval(progressRef.current);
        setScanProgress(100);
        setScanStatus("Scan complete!");
        setScanComplete({ newLeads: 0 });
      }
    }, 1500000);

    // Also poll more aggressively in first 2 minutes
    const quickPoll = setInterval(async () => {
      try {
        const r = await window._db.from("scans").select("id,started_at,hot_count")
          .order("started_at",{ascending:false}).limit(1);
        if (r.data && r.data[0]) {
          const t = new Date(r.data[0].started_at.endsWith("Z") ? r.data[0].started_at : r.data[0].started_at+"Z").getTime();
          if (t >= scanStartRef.current - 60000) {
            clearInterval(quickPoll);
            clearInterval(pollRef.current);
            clearInterval(progressRef.current);
            setScanProgress(100);
            setScanStatus("Scan complete!");
            setScanComplete({ newLeads: r.data[0].hot_count || 0 });
          }
        }
      } catch(e) {}
    }, 5000);
    setTimeout(() => clearInterval(quickPoll), 120000);
  };

  const handleRefreshAfterScan = () => {
    setScanning(false);
    setScanComplete(null);
    setScanProgress(0);
    setScanStatus("");
    // Reload live data from Supabase
    if (window._db) {
      Promise.all([
        window._db.from("leads").select("scan_date").order("scan_date",{ascending:false}).limit(1),
        window._db.from("leads").select("*").order("scan_date",{ascending:false}).limit(500),
        window._db.from("scans").select("*").order("started_at",{ascending:false}).limit(30)
      ]).then(([dateRes, leadsRes, scansRes]) => {
        const latestDate = dateRes.data?.[0]?.scan_date || null;
        if (latestDate && leadsRes.data) {
          window._LIVE_HOT = leadsRes.data.filter(l => l.scan_date === latestDate && l.tier === "HOT");
          window._LATEST_SCAN_DATE = latestDate;
          window._LIVE_LEADS = leadsRes.data;
          window._ALL_LEADS = leadsRes.data;
        }
        if (scansRes.data) window._LIVE_SCANS = scansRes.data;
        // Force re-render
        window._bidbotSetPage && window._bidbotSetPage("dashboard");
      });
    }
  };

  return (
    <div style={{
      display:"flex", flexDirection:"column", height:"100vh", width:"100%",
      background:"#0a0f1e", color:"#f8fafc",
      fontFamily:"'Segoe UI', system-ui, -apple-system, sans-serif"
    }}>
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { box-shadow: 0 4px 15px rgba(16,185,129,0.4); } 50% { box-shadow: 0 4px 25px rgba(16,185,129,0.8); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        select option { background: #1e293b; color: #f8fafc; }
      `}</style>

      <TopBar stateFilter={stateFilter} setStateFilter={setStateFilter} entityFilter={entityFilter} setEntityFilter={setEntityFilter} onRunScan={runScan} scanning={scanning} scanProgress={scanProgress} />

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
        <Sidebar active={page} setActive={setPage} onRunScan={runScan} scanning={scanning} />

        <main style={{ flex:1, display:"flex", overflow:"hidden", background:"#0a0f1e" }}>
          {page==="dashboard"  && <DashboardView onNavigate={setPage} onRunScan={runScan} scanning={scanning} />}
          {page==="hot_leads"  && <HotLeadsView stateFilter={stateFilter} />}
          {page==="all_bids"   && <HotLeadsView stateFilter={stateFilter} allBids />}
          {page==="sources"    && <SourcesView />}
          {page==="keywords"   && <KeywordsView />}
          {page==="history"    && <ScanHistoryView />}
          {page==="rfp_bids"   && <RFPBidsView />}
          {page==="settings"   && <SettingsView />}
        </main>
      </div>

      {/* Toast */}
      {toast && (
        <div style={{
          position:"fixed", bottom:"24px", right:"24px",
          background: toast.type==="success" ? "#10b981" : "#ef4444",
          color:"#fff", padding:"12px 20px", borderRadius:"10px",
          fontSize:"13px", fontWeight:600, boxShadow:"0 8px 24px rgba(0,0,0,0.4)",
          display:"flex", alignItems:"center", gap:"8px", zIndex:9999,
          animation:"slideIn 0.3s ease"
        }}>
          <CheckCircle size={15} /> {toast.msg}
        </div>
      )}
    </div>
  );
}


var _bidbotRoot = null;
function _mountBidBot() {
  var hot=window._LIVE_HOT, all=window._LIVE_LEADS, src=window._LIVE_SOURCES, scn=window._LIVE_SCANS;
  if (hot) { MOCK_HOT_LEADS.length=0; hot.forEach(function(x){MOCK_HOT_LEADS.push(x);}); }
  if (all) { window._ALL_LEADS=all; }
  if (src) { MOCK_SOURCES.length=0; src.forEach(function(x){MOCK_SOURCES.push(x);}); }
  if (scn) { MOCK_SCAN_HISTORY.length=0; scn.forEach(function(x){MOCK_SCAN_HISTORY.push(x);}); }
  if (!_bidbotRoot) {
    _bidbotRoot = ReactDOM.createRoot(document.getElementById("root"));
  }
  _bidbotRoot.render(React.createElement(App));
}
if (window._bidbotData && window._bidbotData.ready) { _mountBidBot(); }
else {
  window._bidbotData.onReady = _mountBidBot;
  setTimeout(function(){ if(window._bidbotData.onReady){window._bidbotData.onReady=null;_mountBidBot();} }, 8000);
}
</script>
