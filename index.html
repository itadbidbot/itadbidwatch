<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window._bidbotData = { ready: false, onReady: null };
const _db = supabase.createClient(
  "https://powcnxmsrxixufcqbxbw.supabase.co",
  "sb_publishable_P_iPFer-s3i8zV8106O_zQ_McYNHXeJ"
);
window._db = _db;
Promise.all([
  _db.from("leads").select("scan_date").order("scan_date",{ascending:false}).limit(1),
  _db.from("leads").select("*").order("scan_date",{ascending:false}).limit(500),
  _db.from("sources").select("*").order("date_added",{ascending:false}),
  _db.from("scans").select("*").order("started_at",{ascending:false}).limit(30)
]).then(function(r) {
  var allLeads = r[1].data;
  var latestDate = r[0].data && r[0].data.length ? r[0].data[0].scan_date : null;
  if (latestDate && allLeads) {
    window._LIVE_HOT = allLeads.filter(function(l){ return l.scan_date === latestDate && l.tier === "HOT"; });
    window._LATEST_SCAN_DATE = latestDate;
  }
  if (allLeads && allLeads.length)   window._LIVE_LEADS   = allLeads;
  if (r[2].data && r[2].data.length) window._LIVE_SOURCES = r[2].data;
  if (r[3].data && r[3].data.length) window._LIVE_SCANS   = r[3].data;
  console.log("ITAD Bid Watch: latest=", latestDate, "hot=", (window._LIVE_HOT||[]).length);
}).catch(function(e){ console.warn("Supabase error", e); })
.finally(function(){
  window._bidbotData.ready = true;
  if (window._bidbotData.onReady) window._bidbotData.onReady();
});
</script>

            display:"flex", alignItems:"center", gap:"10px",

                marginLeft:"auto", background:"#ef4444", color:"#fff",

            width:"100%", padding:"11px 16px", borderRadius:"10px",
            background: scanning ? "#1e293b" : "linear-gradient(135deg,#f59e0b,#f97316)",
            border:"none", color: scanning ? "#64748b" : "#0f172a",
            fontSize:"13px", fontWeight:700, cursor: scanning ? "not-allowed" : "pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:"8px",
            transition:"all 0.2s", letterSpacing:"0.03em",
            boxShadow: scanning ? "none" : "0 4px 15px rgba(245,158,11,0.3)"
          }}>
          {scanning ? <><RefreshCw size={14} style={{ animation:"spin 1s linear infinite" }} /> Scanning...</> : <><Play size={14} /> Scan Now</>}
        </button>
      </div>
    </nav>
  );
}

function ScoreBadge({ score }) {
  const color = score >= 70 ? "#10b981" : score >= 50 ? "#f59e0b" : "#64748b";
  return (
    <span style={{
      background:`${color}18`, border:`1px solid ${color}40`,
      color, fontSize:"11px", fontWeight:700, padding:"2px 8px", borderRadius:"99px",
      fontFamily:"'Courier New',monospace"
    }}>{score}</span>
  );
}

function TierBadge({ tier }) {
  return (
    <span style={{
      background: tier==="HOT" ? "rgba(239,68,68,0.15)" : "rgba(245,158,11,0.15)",
      border: tier==="HOT" ? "1px solid rgba(239,68,68,0.3)" : "1px solid rgba(245,158,11,0.3)",
      color: tier==="HOT" ? "#ef4444" : "#f59e0b",
      fontSize:"10px", fontWeight:700, padding:"2px 8px", borderRadius:"4px", letterSpacing:"0.05em"
    }}>{tier}</span>
  );
}

function StatusDot({ status }) {
  const colors = { active:"#10b981", error:"#ef4444", skipped:"#64748b", success:"#10b981", failed:"#ef4444" };
  const labels = { active:"Active", error:"Error", skipped:"Skipped", success:"Success", failed:"Failed" };
  return (
    <span style={{ display:"flex", alignItems:"center", gap:"5px" }}>
      <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:colors[status]||"#64748b", display:"inline-block" }} />
      <span style={{ color:colors[status]||"#64748b", fontSize:"12px" }}>{labels[status]||status}</span>
    </span>
  );
}

                    <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                      <input value={editVal} onChange={e=>setEditVal(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter")saveEdit(s.id);if(e.key==="Escape")setEditingId(null);}}
                        autoFocus
                        style={{ flex:1, padding:"4px 8px", background:"#0f172a", border:"1px solid #f59e0b", borderRadius:"4px", color:"#f8fafc", fontSize:"12px", outline:"none" }}
                      />
                      <button onClick={()=>saveEdit(s.id)} style={{ background:"#10b981", border:"none", borderRadius:"4px", padding:"4px 6px", cursor:"pointer" }}><Check size={11} color="#fff" /></button>
                      <button onClick={()=>setEditingId(null)} style={{ background:"transparent", border:"none", cursor:"pointer", color:"#64748b" }}><X size={11} /></button>
                    </div>
                  ) : (
                    <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                      <span style={{ fontSize:"13px", color:"#e2e8f0", fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{s.friendly_name}</span>
                      <button onClick={()=>startEdit(s)} style={{ background:"transparent", border:"none", cursor:"pointer", color:"#334155", padding:"2px", flexShrink:0 }}>
                        <Edit2 size={11} />
                      </button>
                    </div>
                  )}
                </td>
                <td style={{ padding:"10px 12px", maxWidth:"220px" }}>
                  <a href={s.url} target="_blank" rel="noreferrer" style={{ color:"#3b82f6", fontSize:"11px", textDecoration:"none", display:"block", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                    {s.url}
                  </a>
                </td>
                <td style={{ padding:"10px 12px" }}>
                  <span style={{ background:"#334155", color:"#94a3b8", fontSize:"11px", fontWeight:700, padding:"2px 7px", borderRadius:"4px", fontFamily:"monospace" }}>{s.state}</span>
                </td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#64748b", fontFamily:"monospace" }}>{s.site_type}</td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#475569", fontFamily:"monospace" }}>{s.date_added}</td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#475569", fontFamily:"monospace" }}>{s.last_scanned}</td>
                <td style={{ padding:"10px 12px" }}>
                  {(s.captcha_protected || s.captcha_protected === true)
                    ? <span style={{ fontSize:"11px", padding:"3px 8px", borderRadius:"99px", background:"rgba(124,58,237,0.15)", color:"#a78bfa", border:"1px solid rgba(124,58,237,0.3)", fontWeight:600 }}>🔒 CAPTCHA</span>
                    : <StatusDot status={s.status || "active"} />
                  }
                </td>
                <td style={{ padding:"10px 12px" }}>
                  <button style={{ background:"transparent", border:"1px solid #334155", color:"#64748b", fontSize:"11px", padding:"3px 8px", borderRadius:"4px", cursor:"pointer", display:"flex", alignItems:"center", gap:"4px" }}>
                    <RefreshCw size={10} />Validate
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Add Modal */}
      {showAddModal && <AddSourceModal onClose={()=>setShowAddModal(false)} onAdd={s=>{setSources(prev=>[...prev,{...s,id:prev.length+1,date_added:new Date().toISOString().slice(0,10),last_scanned:"never",status:"active"}]);setShowAddModal(false);}} />}
      {showCsvModal && <CsvModal onClose={()=>setShowCsvModal(false)} />}
    </div>
  );
}

function AddSourceModal({ onClose, onAdd }) {
  const [step, setStep] = React.useState(1); // 1=basics, 2=type-specific questions, 3=confirm
  const [url, setUrl] = React.useState("");
  const [name, setName] = React.useState("");
  const [state, setState] = React.useState("");
  const [stype, setStype] = React.useState("");
  const [validating, setValidating] = React.useState(false);
  const [error, setError] = React.useState("");

  // Links Page questions
  const [lp_startText, setLpStartText] = React.useState("");
  const [lp_stopText, setLpStopText] = React.useState("");
  const [lp_preClick, setLpPreClick] = React.useState("");
  const [lp_hasExpand, setLpHasExpand] = React.useState("");
  const [lp_docType, setLpDocType] = React.useState("");
  const [lp_hasPagination, setLpHasPagination] = React.useState("");

  // Search Page questions
  const [sp_inputLabel, setSpInputLabel] = React.useState("");
  const [sp_resultsFormat, setSpResultsFormat] = React.useState("");

  // Generic Table questions
  const [gt_titleCol, setGtTitleCol] = React.useState("");
  const [gt_stopText, setGtStopText] = React.useState("");

  const urlValid = url.startsWith("https://") && url.length > 12;

  const buildInstructions = () => {
    if (stype === "links_page") {
      let parts = [];
      if (lp_preClick) parts.push(`Click link containing ${lp_preClick} first`);
      if (lp_startText) parts.push(`Scan starts just below text beginning with ${lp_startText}`);
      parts.push("Scan bid title links on this page");
      if (lp_hasExpand === "yes") parts.push("Click each heading or expand button to reveal bid document links");
      if (lp_docType) parts.push(`Bid documents are ${lp_docType}`);
      if (lp_hasPagination === "yes") parts.push("Check all pages for additional bids");
      if (lp_stopText) parts.push(`Stop scanning when you reach ${lp_stopText}`);
      parts.push("Score content against keyword pillars only");
      return parts.join(". ") + ".";
    }
    if (stype === "search_page") {
      let parts = ["Search for bids using keyword terms"];
      if (sp_inputLabel) parts.push(`Search input is labeled ${sp_inputLabel}`);
      if (sp_resultsFormat) parts.push(`Results appear as ${sp_resultsFormat}`);
      parts.push("Score each result against keyword pillars");
      return parts.join(". ") + ".";
    }
    if (stype === "generic_table") {
      let parts = ["Scan all visible bid rows in the table"];
      if (gt_titleCol) parts.push(`Bid title is in the ${gt_titleCol} column`);
      if (gt_stopText) parts.push(`Stop scanning when you reach ${gt_stopText}`);
      parts.push("Score content against keyword pillars only");
      return parts.join(". ") + ".";
    }
    return "Scan bid links on this page. Score content against keyword pillars.";
  };

  const handleNext = () => {
    if (step === 1) {
      if (!urlValid || !state || !stype || !name.trim()) {
        setError("All fields are required. URL must start with https://");
        return;
      }
      setError("");
      setStep(2);
    } else if (step === 2) {
      setStep(3);
    }
  };

  const [submitError, setSubmitError] = React.useState("");
  const [submitSuccess, setSubmitSuccess] = React.useState(false);

  const handleSubmit = async () => {
    setValidating(true);
    setSubmitError("");
    const instructions = buildInstructions();
    const newSource = {
      url,
      friendly_name: name || url,
      state,
      site_type: stype,
      scan_instructions: instructions,
      captcha_protected: false,
    };
    try {
      if (!window._db) throw new Error("Database connection not ready. Please refresh and try again.");
      console.log("Inserting source:", newSource);
      const res = await window._db.from("sources").insert([newSource]).select();
      console.log("Insert result:", JSON.stringify(res));
      if (res.error) throw new Error(res.error.message || JSON.stringify(res.error));
      if (!res.data || res.data.length === 0) throw new Error("Insert returned no data. Row may not have been created.");
      setValidating(false);
      setSubmitSuccess(true);
      setTimeout(() => {
        onAdd(res.data[0]);
      }, 1500);
    } catch(err) {
      console.error("Save error:", err);
      setValidating(false);
      setSubmitError(err.message || "Failed to save. Please try again.");
    }
  };

  const inputStyle = {
    width:"100%", padding:"9px 12px", background:"#0f172a",
    border:"1px solid #334155", borderRadius:"8px", color:"#f8fafc",
    fontSize:"13px", outline:"none", boxSizing:"border-box"
  };
  const labelStyle = {
    fontSize:"11px", color:"#94a3b8", fontWeight:600,
    display:"block", marginBottom:"6px", letterSpacing:"0.06em"
  };
  const fieldStyle = { marginBottom:"14px" };
  const hintStyle = { fontSize:"11px", color:"#475569", marginTop:"4px", lineHeight:"1.5" };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:"20px" }}>
      <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"16px", padding:"28px", width:"580px", maxWidth:"100%", maxHeight:"90vh", overflowY:"auto" }}>

        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"20px" }}>
          <div>
            <h2 style={{ margin:0, fontSize:"16px", fontWeight:700, color:"#f8fafc" }}>Add New Source</h2>
            <div style={{ fontSize:"11px", color:"#475569", marginTop:"4px" }}>
              Step {step} of 3 — {step===1?"Basic Info":step===2?"Page Configuration":"Review & Add"}
            </div>
          </div>
          <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#64748b", cursor:"pointer", fontSize:"20px" }}>×</button>
        </div>

        {/* Progress */}
        <div style={{ display:"flex", gap:"4px", marginBottom:"24px" }}>
          {[1,2,3].map(s => (
            <div key={s} style={{
              flex:1, height:"3px", borderRadius:"99px",
              background: s <= step ? "#f59e0b" : "#334155",
              transition:"background 0.3s"
            }} />
          ))}
        </div>

        {/* Step 1 — Basic Info */}
        {step === 1 && (
          <div>
            <div style={fieldStyle}>
              <label style={labelStyle}>URL *</label>
              <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://example.com/bids" style={{...inputStyle, borderColor: url && !urlValid ? "#ef4444" : "#334155"}} />
              {url && !urlValid && <div style={{ fontSize:"11px", color:"#ef4444", marginTop:"4px" }}>Must be a valid HTTPS URL</div>}
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>FRIENDLY NAME *</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Lowndes County Schools - Bids" style={inputStyle} />
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"14px", marginBottom:"14px" }}>
              <div>
                <label style={labelStyle}>STATE *</label>
                <select value={state} onChange={e=>setState(e.target.value)} style={{...inputStyle, color: state?"#f8fafc":"#64748b"}}>
                  <option value="">Select state</option>
                  {STATES_LIST.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>PAGE TYPE *</label>
                <select value={stype} onChange={e=>setStype(e.target.value)} style={{...inputStyle, color: stype?"#f8fafc":"#64748b"}}>
                  <option value="">Select type</option>
                  <option value="links_page">Links Page — list of bid title links</option>
                  <option value="search_page">Search Page — has a search box</option>
                  <option value="generic_table">Table Page — bids in a table/grid</option>
                </select>
              </div>
            </div>
            {stype && (
              <div style={{ background:"#0f172a", borderRadius:"8px", padding:"12px", marginBottom:"14px", fontSize:"12px", color:"#64748b", lineHeight:"1.6" }}>
                {stype === "links_page" && "📋 Links Page: The page shows a list of bid titles. Each title is a clickable link leading to bid details or documents."}
                {stype === "search_page" && "🔍 Search Page: The page has a search input. The scanner will type keywords and score the results."}
                {stype === "generic_table" && "📊 Table Page: Bids are displayed in a table or structured grid. The scanner reads each row directly."}
              </div>
            )}
          </div>
        )}

        {/* Step 2 — Type-specific questions */}
        {step === 2 && stype === "links_page" && (
          <div>
            <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#f59e0b", lineHeight:"1.6" }}>
              <strong>Beta Note:</strong> Please answer these questions carefully. Accurate answers ensure the scanner finds the right bids.
              In a future Pro release, AI will determine this automatically.
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>STARTING SECTION HEADING</label>
              <input value={lp_startText} onChange={e=>setLpStartText(e.target.value)}
                placeholder="e.g. Current Open Bids, Active Solicitations, Purchasing"
                style={inputStyle} />
              <div style={hintStyle}>What is the exact heading text above where the bids begin? Leave blank if bids start at the top of the page.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>STOPPING SECTION HEADING</label>
              <input value={lp_stopText} onChange={e=>setLpStopText(e.target.value)}
                placeholder="e.g. Awarded Bids, Closed Solicitations, Past Bids"
                style={inputStyle} />
              <div style={hintStyle}>What heading marks where bids end? The scanner will stop here to avoid picking up awarded or closed bids. Leave blank if there is no end section.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>PRE-NAVIGATION CLICK</label>
              <input value={lp_preClick} onChange={e=>setLpPreClick(e.target.value)}
                placeholder="e.g. Open Solicitations, Current Bids, Active RFPs"
                style={inputStyle} />
              <div style={hintStyle}>Does the scanner need to click a tab, button, or link BEFORE bids appear? If yes, enter the exact text of that button/link. Leave blank if bids are visible immediately.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>DO BID TITLES EXPAND WHEN CLICKED?</label>
              <div style={{ display:"flex", gap:"8px" }}>
                {[["yes","Yes — clicking a title reveals more info or a document link"],["no","No — each title is a direct link to the bid"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setLpHasExpand(val)} style={{
                    flex:1, padding:"8px 12px", borderRadius:"8px", cursor:"pointer", fontSize:"12px",
                    background: lp_hasExpand===val ? "rgba(245,158,11,0.15)" : "#0f172a",
                    border: `1px solid ${lp_hasExpand===val ? "#f59e0b" : "#334155"}`,
                    color: lp_hasExpand===val ? "#f59e0b" : "#64748b", textAlign:"left"
                  }}>{label}</button>
                ))}
              </div>
              <div style={hintStyle}>Some pages show bid titles that expand (accordion style) to reveal a "Full Bid Information" or document download button. Does this page work that way?</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>BID DOCUMENT TYPE</label>
              <select value={lp_docType} onChange={e=>setLpDocType(e.target.value)} style={{...inputStyle, color: lp_docType?"#f8fafc":"#64748b"}}>
                <option value="">Select document type</option>
                <option value="PDF files">PDF files (.pdf)</option>
                <option value="Google Drive documents">Google Drive documents</option>
                <option value="Word documents">Word documents (.doc/.docx)</option>
                <option value="links to a detail page">Links to a detail page</option>
                <option value="mixed types">Mixed types</option>
                <option value="unknown">Not sure</option>
              </select>
              <div style={hintStyle}>When you click a bid link, what type of document or page opens?</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>DOES THE PAGE HAVE MULTIPLE PAGES OF BIDS?</label>
              <div style={{ display:"flex", gap:"8px" }}>
                {[["yes","Yes — has Next/Previous page navigation"],["no","No — all bids on one page"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setLpHasPagination(val)} style={{
                    flex:1, padding:"8px 12px", borderRadius:"8px", cursor:"pointer", fontSize:"12px",
                    background: lp_hasPagination===val ? "rgba(245,158,11,0.15)" : "#0f172a",
                    border: `1px solid ${lp_hasPagination===val ? "#f59e0b" : "#334155"}`,
                    color: lp_hasPagination===val ? "#f59e0b" : "#64748b", textAlign:"left"
                  }}>{label}</button>
                ))}
              </div>
            </div>
          </div>
        )}

        {step === 2 && stype === "search_page" && (
          <div>
            <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#f59e0b" }}>
              <strong>Beta Note:</strong> The scanner will type each keyword from your active pillars into the search box and score the results.
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>SEARCH INPUT LABEL OR PLACEHOLDER</label>
              <input value={sp_inputLabel} onChange={e=>setSpInputLabel(e.target.value)}
                placeholder="e.g. Search by keyword, Search bids, Enter search term"
                style={inputStyle} />
              <div style={hintStyle}>What text appears inside or next to the search box on the page? This helps the scanner find the right input field.</div>
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>HOW DO RESULTS APPEAR?</label>
              <select value={sp_resultsFormat} onChange={e=>setSpResultsFormat(e.target.value)} style={{...inputStyle, color:sp_resultsFormat?"#f8fafc":"#64748b"}}>
                <option value="">Select format</option>
                <option value="a list of linked titles">A list of linked titles</option>
                <option value="a table with columns">A table with columns</option>
                <option value="cards or tiles">Cards or tiles</option>
                <option value="a numbered list">A numbered list</option>
              </select>
              <div style={hintStyle}>After you search, how are the results displayed on the page?</div>
            </div>
          </div>
        )}

        {step === 2 && stype === "generic_table" && (
          <div>
            <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#f59e0b" }}>
              <strong>Beta Note:</strong> The scanner reads all visible rows. Be specific about where bids start and end.
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>WHICH COLUMN CONTAINS THE BID TITLE?</label>
              <input value={gt_titleCol} onChange={e=>setGtTitleCol(e.target.value)}
                placeholder="e.g. Description, Bid Title, Project Name, first column"
                style={inputStyle} />
              <div style={hintStyle}>What is the column header that contains the bid name or title?</div>
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>STOPPING ROW OR SECTION</label>
              <input value={gt_stopText} onChange={e=>setGtStopText(e.target.value)}
                placeholder="e.g. Awarded, Closed, Past Solicitations"
                style={inputStyle} />
              <div style={hintStyle}>Is there a row header or section title where the scanner should stop reading? This prevents picking up awarded or closed bids.</div>
            </div>
          </div>
        )}

        {/* Step 3 — Review */}
        {step === 3 && (
          <div>
            <div style={{ background:"#0f172a", borderRadius:"10px", padding:"16px", marginBottom:"20px" }}>
              <div style={{ fontSize:"12px", color:"#475569", fontWeight:600, marginBottom:"12px", letterSpacing:"0.06em" }}>REVIEW SOURCE CONFIGURATION</div>
              {[
                ["Friendly Name", name],
                ["URL", url],
                ["State", state],
                ["Page Type", stype],
              ].map(([label, val]) => (
                <div key={label} style={{ display:"flex", gap:"12px", marginBottom:"8px" }}>
                  <span style={{ fontSize:"12px", color:"#64748b", minWidth:"100px" }}>{label}:</span>
                  <span style={{ fontSize:"12px", color:"#e2e8f0" }}>{val}</span>
                </div>
              ))}
              <div style={{ marginTop:"12px", paddingTop:"12px", borderTop:"1px solid #1e293b" }}>
                <div style={{ fontSize:"12px", color:"#64748b", marginBottom:"6px" }}>Generated Scan Instructions:</div>
                <div style={{ fontSize:"12px", color:"#94a3b8", lineHeight:"1.6", fontStyle:"italic" }}>{buildInstructions()}</div>
              </div>
            </div>
            <div style={{ background:"rgba(16,185,129,0.08)", border:"1px solid rgba(16,185,129,0.2)", borderRadius:"8px", padding:"12px", fontSize:"12px", color:"#10b981", lineHeight:"1.6" }}>
              ✓ This source will be added to your database and included in the next scan automatically.
              The scanner will use your keyword pillars to determine what qualifies as a lead.
            </div>
          </div>
        )}

        {/* Errors */}
        {error && (
          <div style={{ color:"#ef4444", fontSize:"12px", marginBottom:"12px", padding:"8px 12px", background:"rgba(239,68,68,0.1)", borderRadius:"6px", border:"1px solid rgba(239,68,68,0.2)" }}>{error}</div>
        )}
        {submitError && (
          <div style={{ color:"#ef4444", fontSize:"12px", marginBottom:"12px", padding:"10px 14px", background:"rgba(239,68,68,0.1)", borderRadius:"6px", border:"1px solid rgba(239,68,68,0.3)" }}>
            <strong>Save failed:</strong> {submitError}
          </div>
        )}
        {submitSuccess && (
          <div style={{ color:"#10b981", fontSize:"12px", marginBottom:"12px", padding:"10px 14px", background:"rgba(16,185,129,0.1)", borderRadius:"6px", border:"1px solid rgba(16,185,129,0.3)" }}>
            ✓ Source saved successfully! It will be included in your next scan.
          </div>
        )}

        {/* Footer buttons */}
        <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end", marginTop:"20px" }}>
          {step > 1 && (
            <button onClick={()=>setStep(step-1)} style={{ padding:"9px 18px", background:"transparent", border:"1px solid #334155", borderRadius:"8px", color:"#94a3b8", fontSize:"13px", cursor:"pointer" }}>
              ← Back
            </button>
          )}
          <button onClick={onClose} style={{ padding:"9px 18px", background:"transparent", border:"1px solid #334155", borderRadius:"8px", color:"#94a3b8", fontSize:"13px", cursor:"pointer" }}>
            Cancel
          </button>
          {step < 3 ? (
            <button onClick={handleNext} style={{ padding:"9px 18px", background:"linear-gradient(135deg,#f59e0b,#f97316)", border:"none", borderRadius:"8px", color:"#0f172a", fontSize:"13px", fontWeight:700, cursor:"pointer" }}>
              Next →
            </button>
          ) : (
            <button onClick={handleSubmit} disabled={validating || submitSuccess} style={{
              padding:"9px 18px",
              background: submitSuccess ? "linear-gradient(135deg,#10b981,#059669)" :
                          validating ? "#334155" : "linear-gradient(135deg,#f59e0b,#f97316)",
              border:"none", borderRadius:"8px",
              color: validating ? "#64748b" : "#0f172a",
              fontSize:"13px", fontWeight:700,
              cursor: validating || submitSuccess ? "not-allowed" : "pointer",
              display:"flex", alignItems:"center", gap:"6px",
              transition:"all 0.3s"
            }}>
              {submitSuccess ? "✓ Saved Successfully!" : validating ? "Saving..." : "✓ Add Source"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}


function CsvModal({ onClose }) {
  const headers = "url,friendly_name,state,site_type,scan_instructions";
  const example = `https://www.goochlandschools.org/page/bids-and-proposals,Goochland County Schools,VA,links_page,Scan bid title links. Stop when you reach Awarded Bids
https://vendornet.wi.gov/Bids.aspx,Wisconsin VendorNet,WI,search_page,Search for bids using keyword terms`;
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999 }}>
      <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"16px", padding:"28px", width:"640px", maxWidth:"95vw" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"20px" }}>
          <h2 style={{ margin:0, fontSize:"16px", fontWeight:700, color:"#f8fafc" }}>Upload Sources via CSV</h2>
          <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#64748b", cursor:"pointer" }}><X size={18} /></button>
        </div>
        <div style={{ marginBottom:"16px" }}>
          <p style={{ color:"#94a3b8", fontSize:"13px", margin:"0 0 12px" }}>All 5 columns are required. CSV must use these exact headers:</p>
          <div style={{ background:"#0f172a", border:"1px solid #334155", borderRadius:"8px", padding:"12px 14px", fontFamily:"'Courier New',monospace", fontSize:"12px", color:"#10b981", marginBottom:"12px" }}>{headers}</div>
          <p style={{ color:"#64748b", fontSize:"12px", margin:"0 0 6px" }}>Example rows:</p>
          <div style={{ background:"#0f172a", border:"1px solid #334155", borderRadius:"8px", padding:"12px 14px", fontFamily:"'Courier New',monospace", fontSize:"11px", color:"#94a3b8", whiteSpace:"pre-wrap", lineHeight:1.6 }}>{example}</div>
        </div>
        <div style={{ border:"2px dashed #334155", borderRadius:"10px", padding:"32px", textAlign:"center", marginBottom:"16px", cursor:"pointer" }}
          onDragOver={e=>e.preventDefault()}>
          <Upload size={24} color="#475569" style={{ marginBottom:"8px" }} />
          <div style={{ color:"#64748b", fontSize:"13px" }}>Drag & drop your CSV here, or</div>
          <button style={{ marginTop:"8px", padding:"7px 16px", background:"#334155", border:"none", borderRadius:"6px", color:"#94a3b8", fontSize:"12px", cursor:"pointer" }}>Browse File</button>
        </div>
        <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:"8px", padding:"10px 14px", fontSize:"12px", color:"#f59e0b", marginBottom:"16px" }}>
          <strong>Validation rules:</strong> url must start with https:// · state must be 2 uppercase letters · site_type must be links_page, search_page, or generic_table · all fields required
        </div>
        <div style={{ display:"flex", justifyContent:"flex-end" }}>
          <button onClick={onClose} style={{ padding:"9px 18px", background:"transparent", border:"1px solid #334155", borderRadius:"8px", color:"#94a3b8", fontSize:"13px", cursor:"pointer" }}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ─── PRICING PLANS ────────────────────────────────────────────────────────────
const PLANS = [
  { key:"starter", label:"Starter", price:"$9.99", period:"/mo", maxCustom:3,  color:"#64748b", desc:"Up to 3 custom pillars" },
  { key:"pro",     label:"Pro",     price:"$19.99", period:"/mo", maxCustom:10, color:"#3b82f6", desc:"Up to 10 custom pillars" },
  { key:"unlimited",label:"Unlimited",price:"$49", period:"/mo", maxCustom:Infinity, color:"#f59e0b", desc:"Unlimited custom pillars" },
];

const PILLAR_COLORS = ["#f59e0b","#3b82f6","#8b5cf6","#10b981","#ec4899","#06b6d4","#f97316","#84cc16"];

function Toggle({ enabled, onChange }) {
  return (
    <div onClick={onChange} style={{
      width:"40px", height:"22px", borderRadius:"99px", cursor:"pointer",
      background: enabled ? "#f59e0b" : "#334155",
      position:"relative", transition:"background 0.2s", flexShrink:0
    }}>
      <div style={{
        position:"absolute", top:"3px",
        left: enabled ? "21px" : "3px",
        width:"16px", height:"16px", borderRadius:"50%",
        background:"#fff", transition:"left 0.2s",
        boxShadow:"0 1px 3px rgba(0,0,0,0.3)"
      }} />
    </div>
  );
}

function KeywordsView() {
  const [pillars, setPillars] = useState(() =>
    KEYWORD_PILLARS.map(p => ({ ...p, enabled: true, custom: false }))
  );
  const [currentPlan, setCurrentPlan] = useState("starter");
  const [showUpgrade, setShowUpgrade] = useState(false);
  const [showAddPillar, setShowAddPillar] = useState(false);
  const [showPricingModal, setShowPricingModal] = useState(false);
  const [newPillar, setNewPillar] = useState({ name:"", weight:10, terms:"", color:"#06b6d4", negative: false });
  const [addTermInput, setAddTermInput] = useState({});
  const [editingTerms, setEditingTerms] = useState(null);
  const [toast, setToast] = useState(null);

  const plan = PLANS.find(p => p.key === currentPlan);
  const customPillars = pillars.filter(p => p.custom);
  const atLimit = customPillars.length >= plan.maxCustom;

  const showToast = (msg, color="#10b981") => {
    setToast({ msg, color });
    setTimeout(() => setToast(null), 3000);
  };

  const togglePillar = (key) => {
    setPillars(prev => prev.map(p => p.key === key ? { ...p, enabled: !p.enabled } : p));
  };

  const deletePillar = (key) => {
    setPillars(prev => prev.filter(p => p.key !== key));
    showToast("Pillar removed", "#ef4444");
  };

  const addTerm = (pillarKey, term) => {
    const t = term.trim().toLowerCase();
    if (!t) return;
    setPillars(prev => prev.map(p =>
      p.key === pillarKey ? { ...p, terms: [...p.terms.filter(x=>x!==t), t] } : p
    ));
    setAddTermInput(prev => ({ ...prev, [pillarKey]: "" }));
  };

  const removeTerm = (pillarKey, term) => {
    setPillars(prev => prev.map(p =>
      p.key === pillarKey ? { ...p, terms: p.terms.filter(t => t !== term) } : p
    ));
  };

  const handleAddPillar = () => {
    if (!newPillar.name.trim()) return;
    const terms = newPillar.terms.split(",").map(t=>t.trim().toLowerCase()).filter(Boolean);
    const key = "custom_" + newPillar.name.toLowerCase().replace(/\s+/g,"_") + "_" + Date.now();
    const weight = newPillar.negative ? -Math.abs(newPillar.weight) : Math.abs(newPillar.weight);
    setPillars(prev => [...prev, {
      name: newPillar.name.trim(), key, weight,
      color: newPillar.color, terms, enabled: true, custom: true
    }]);
    setNewPillar({ name:"", weight:10, terms:"", color:"#06b6d4", negative:false });
    setShowAddPillar(false);
    showToast(`"${newPillar.name.trim()}" pillar added!`);
  };

  const enabledCount = pillars.filter(p => p.enabled).length;

  return (
    <div style={{ padding:"28px", overflowY:"auto", flex:1, position:"relative" }}>

      {/* Toast */}
      {toast && (
        <div style={{
          position:"fixed", bottom:"28px", right:"28px", zIndex:999,
          background: toast.color, color:"#fff", padding:"12px 20px",
          borderRadius:"10px", fontSize:"13px", fontWeight:600,
          boxShadow:"0 4px 20px rgba(0,0,0,0.4)"
        }}>{toast.msg}</div>
      )}

      {/* Header */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:"24px" }}>
        <div>
          <h1 style={{ fontSize:"22px", fontWeight:700, color:"#f8fafc", margin:"0 0 4px" }}>Keywords & Scoring</h1>
          <p style={{ color:"#64748b", fontSize:"13px", margin:0 }}>
            {enabledCount} of {pillars.length} pillars active
          </p>
        </div>
        <div style={{ display:"flex", gap:"10px", alignItems:"center" }}>
          <button onClick={() => setShowPricingModal(true)} style={{
            padding:"8px 14px", background:"transparent", border:"1px solid #334155",
            borderRadius:"8px", color:"#94a3b8", fontSize:"12px", cursor:"pointer",
            display:"flex", alignItems:"center", gap:"6px"
          }}>
            <span style={{ fontSize:"10px" }}>⭐</span> {plan.label} Plan
          </button>
          <button
            onClick={() => { if (atLimit) { setShowUpgrade(true); } else { setShowAddPillar(true); } }}
            style={{
              padding:"8px 16px", borderRadius:"8px", fontSize:"13px", fontWeight:600,
              cursor:"pointer", display:"flex", alignItems:"center", gap:"7px",
              background:"linear-gradient(135deg,#f59e0b,#f97316)", border:"none", color:"#0f172a",
              boxShadow:"0 3px 12px rgba(245,158,11,0.35)"
            }}>
            <Plus size={14} /> Add Custom Pillar
          </button>
        </div>
      </div>

      {/* Plan usage bar */}
      <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"12px", padding:"16px 20px", marginBottom:"20px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"10px" }}>
          <div style={{ fontSize:"12px", color:"#94a3b8", fontWeight:600 }}>
            CUSTOM PILLAR USAGE — <span style={{ color: plan.color }}>{plan.label.toUpperCase()} PLAN</span>
          </div>
          <span style={{ fontSize:"12px", color:"#64748b" }}>
            {customPillars.length} / {plan.maxCustom === Infinity ? "∞" : plan.maxCustom} custom pillars
          </span>
        </div>
        <div style={{ height:"6px", background:"#0f172a", borderRadius:"99px", overflow:"hidden" }}>
          <div style={{
            height:"100%", borderRadius:"99px", transition:"width 0.4s",
            background: atLimit ? "#ef4444" : plan.color,
            width: plan.maxCustom === Infinity ? "30%" : `${Math.min(100, (customPillars.length / plan.maxCustom) * 100)}%`
          }} />
        </div>
        {atLimit && (
          <div style={{ marginTop:"10px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontSize:"12px", color:"#ef4444" }}>⚠ Pillar limit reached on {plan.label} plan</span>
            <button onClick={() => setShowPricingModal(true)} style={{
              padding:"5px 12px", background:"#3b82f6", border:"none", borderRadius:"6px",
              color:"#fff", fontSize:"12px", fontWeight:600, cursor:"pointer"
            }}>Upgrade Plan →</button>
          </div>
        )}
      </div>

      {/* Pillars grid */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"16px" }}>
        {pillars.map(pillar => (
          <div key={pillar.key} style={{
            background:"#1e293b",
            border:`1px solid ${pillar.enabled ? pillar.color + "40" : "#1e293b"}`,
            borderLeft:`3px solid ${pillar.enabled ? pillar.color : "#334155"}`,
            borderRadius:"12px", padding:"18px",
            opacity: pillar.enabled ? 1 : 0.5,
            transition:"all 0.2s"
          }}>
            {/* Pillar header */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px" }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <div style={{ fontWeight:700, color: pillar.enabled ? "#f8fafc" : "#475569", fontSize:"14px" }}>{pillar.name}</div>
                  {pillar.custom && (
                    <span style={{ fontSize:"9px", padding:"1px 6px", borderRadius:"99px", background:"#f59e0b20", color:"#f59e0b", border:"1px solid #f59e0b30", fontWeight:700, letterSpacing:"0.05em" }}>CUSTOM</span>
                  )}
                </div>
                <div style={{ fontSize:"11px", color:"#475569", marginTop:"2px", fontFamily:"monospace" }}>{pillar.key}</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:"10px", flexShrink:0 }}>
                <div style={{
                  padding:"3px 10px", borderRadius:"99px", fontSize:"11px", fontWeight:700, fontFamily:"monospace",
                  background: pillar.enabled ? `${pillar.color}18` : "#0f172a",
                  color: pillar.enabled ? pillar.color : "#475569",
                  border:`1px solid ${pillar.enabled ? pillar.color + "30" : "#334155"}`
                }}>
                  {pillar.weight > 0 ? `+${pillar.weight}` : pillar.weight} pts
                </div>
                <Toggle enabled={pillar.enabled} onChange={() => togglePillar(pillar.key)} />
              </div>
            </div>

            {/* Terms */}
            <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom: editingTerms === pillar.key ? "10px" : "0" }}>
              {pillar.terms.map(t => (
                <span key={t} style={{
                  background:"#0f172a", border:"1px solid #334155", color:"#94a3b8",
                  fontSize:"11px", padding:"3px 8px", borderRadius:"4px", fontFamily:"monospace",
                  display:"flex", alignItems:"center", gap:"4px", cursor: editingTerms === pillar.key ? "pointer" : "default"
                }}>
                  {t}
                  {editingTerms === pillar.key && (
                    <span onClick={() => removeTerm(pillar.key, t)} style={{ color:"#ef4444", fontWeight:700, lineHeight:1, marginLeft:"2px" }}>×</span>
                  )}
                </span>
              ))}
            </div>

            {/* Edit terms mode */}
            {editingTerms === pillar.key && (
              <div style={{ marginTop:"10px", display:"flex", gap:"6px" }}>
                <input
                  placeholder="add term, press Enter"
                  value={addTermInput[pillar.key] || ""}
                  onChange={e => setAddTermInput(prev => ({ ...prev, [pillar.key]: e.target.value }))}
                  onKeyDown={e => { if (e.key === "Enter") addTerm(pillar.key, addTermInput[pillar.key] || ""); }}
                  style={{
                    flex:1, background:"#0f172a", border:"1px solid #334155", borderRadius:"6px",
                    color:"#f8fafc", fontSize:"12px", padding:"6px 10px", outline:"none", fontFamily:"monospace"
                  }}
                  autoFocus
                />
                <button onClick={() => addTerm(pillar.key, addTermInput[pillar.key] || "")} style={{
                  padding:"6px 12px", background:"#10b981", border:"none", borderRadius:"6px",
                  color:"#fff", fontSize:"12px", fontWeight:600, cursor:"pointer"
                }}>Add</button>
              </div>
            )}

            {/* Footer actions */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:"12px", paddingTop:"10px", borderTop:"1px solid #0f172a" }}>
              <button
                onClick={() => setEditingTerms(editingTerms === pillar.key ? null : pillar.key)}
                style={{
                  padding:"4px 10px", background:"transparent", border:"1px solid #334155",
                  borderRadius:"6px", color:"#64748b", fontSize:"11px", cursor:"pointer"
                }}>
                {editingTerms === pillar.key ? "✓ Done editing" : "✏ Edit terms"}
              </button>
              {pillar.custom && (
                <button onClick={() => deletePillar(pillar.key)} style={{
                  padding:"4px 10px", background:"transparent", border:"1px solid #ef444430",
                  borderRadius:"6px", color:"#ef4444", fontSize:"11px", cursor:"pointer"
                }}>🗑 Remove</button>
              )}
            </div>
          </div>
        ))}

        {/* Add pillar placeholder */}
        <div
          onClick={() => { if (atLimit) setShowUpgrade(true); else setShowAddPillar(true); }}
          style={{
            background:"transparent", border:"2px dashed #334155", borderRadius:"12px",
            padding:"18px", display:"flex", flexDirection:"column", alignItems:"center",
            justifyContent:"center", gap:"8px", cursor:"pointer", minHeight:"120px",
            transition:"all 0.15s"
          }}
          onMouseEnter={e => e.currentTarget.style.borderColor="#f59e0b"}
          onMouseLeave={e => e.currentTarget.style.borderColor="#334155"}
        >
          <div style={{ width:"36px", height:"36px", borderRadius:"50%", background:"#1e293b", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <Plus size={18} color="#64748b" />
          </div>
          <div style={{ fontSize:"13px", color:"#64748b", fontWeight:600 }}>Add Custom Pillar</div>
          <div style={{ fontSize:"11px", color:"#475569", textAlign:"center" }}>
            {atLimit ? `Upgrade to add more (${plan.label} limit: ${plan.maxCustom})` : `${plan.maxCustom === Infinity ? "Unlimited" : plan.maxCustom - customPillars.length + " more"} available on ${plan.label}`}
          </div>
        </div>
      </div>

      {/* Scoring rules */}
      <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"12px", padding:"20px", marginTop:"20px" }}>
        <div style={{ fontWeight:700, color:"#f8fafc", fontSize:"14px", marginBottom:"12px" }}>Scoring Rules</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"12px" }}>
          <div style={{ background:"#0f172a", borderRadius:"8px", padding:"14px" }}>
            <div style={{ color:"#10b981", fontSize:"11px", fontWeight:700, letterSpacing:"0.08em", marginBottom:"6px" }}>GATE (must match one)</div>
            <div style={{ fontFamily:"monospace", fontSize:"12px", color:"#94a3b8" }}>apple_terms<br/>chromebook_terms<br/>disposition_terms</div>
          </div>
          <div style={{ background:"#0f172a", borderRadius:"8px", padding:"14px" }}>
            <div style={{ color:"#ef4444", fontSize:"11px", fontWeight:700, letterSpacing:"0.08em", marginBottom:"6px" }}>DROP (any match = drop)</div>
            <div style={{ fontFamily:"monospace", fontSize:"12px", color:"#94a3b8" }}>hard_negative_terms</div>
          </div>
          <div style={{ background:"#0f172a", borderRadius:"8px", padding:"14px" }}>
            <div style={{ color:"#f59e0b", fontSize:"11px", fontWeight:700, letterSpacing:"0.08em", marginBottom:"6px" }}>TIER LOGIC</div>
            <div style={{ fontFamily:"monospace", fontSize:"12px", color:"#94a3b8" }}>HOT: gate pass, no soft neg<br/>WARM: soft neg present</div>
          </div>
        </div>
      </div>

      {/* ── ADD PILLAR MODAL ── */}
      {showAddPillar && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"16px", padding:"28px", width:"480px", maxWidth:"95vw" }}>
            <div style={{ fontSize:"18px", fontWeight:700, color:"#f8fafc", marginBottom:"20px" }}>Create Custom Pillar</div>

            <div style={{ display:"grid", gap:"14px" }}>
              <div>
                <label style={{ fontSize:"11px", color:"#64748b", fontWeight:600, letterSpacing:"0.08em", display:"block", marginBottom:"6px" }}>PILLAR NAME *</label>
                <input value={newPillar.name} onChange={e => setNewPillar(p=>({...p,name:e.target.value}))}
                  placeholder="e.g. Network Equipment"
                  style={{ width:"100%", background:"#0f172a", border:"1px solid #334155", borderRadius:"8px", color:"#f8fafc", fontSize:"13px", padding:"9px 12px", outline:"none", boxSizing:"border-box" }} />
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px" }}>
                <div>
                  <label style={{ fontSize:"11px", color:"#64748b", fontWeight:600, letterSpacing:"0.08em", display:"block", marginBottom:"6px" }}>SCORE WEIGHT</label>
                  <input type="number" value={newPillar.weight} onChange={e => setNewPillar(p=>({...p,weight:Number(e.target.value)}))}
                    style={{ width:"100%", background:"#0f172a", border:"1px solid #334155", borderRadius:"8px", color:"#f8fafc", fontSize:"13px", padding:"9px 12px", outline:"none", boxSizing:"border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize:"11px", color:"#64748b", fontWeight:600, letterSpacing:"0.08em", display:"block", marginBottom:"6px" }}>PILLAR COLOR</label>
                  <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                    {PILLAR_COLORS.map(c => (
                      <div key={c} onClick={() => setNewPillar(p=>({...p,color:c}))} style={{
                        width:"22px", height:"22px", borderRadius:"50%", background:c, cursor:"pointer",
                        outline: newPillar.color === c ? `2px solid #fff` : "none", outlineOffset:"2px"
                      }} />
                    ))}
                  </div>
                </div>
              </div>

              <div>
                <label style={{ fontSize:"11px", color:"#64748b", fontWeight:600, letterSpacing:"0.08em", display:"block", marginBottom:"6px" }}>PILLAR TYPE</label>
                <div style={{ display:"flex", gap:"8px" }}>
                  {[{val:false,label:"✅ Positive (adds score)"},{val:true,label:"🚫 Negative (reduces score)"}].map(opt => (
                    <button key={String(opt.val)} onClick={() => setNewPillar(p=>({...p,negative:opt.val}))} style={{
                      flex:1, padding:"8px", borderRadius:"8px", cursor:"pointer", fontSize:"12px", fontWeight:600,
                      background: newPillar.negative === opt.val ? (opt.val ? "#ef444420" : "#10b98120") : "#0f172a",
                      border: `1px solid ${newPillar.negative === opt.val ? (opt.val ? "#ef4444" : "#10b981") : "#334155"}`,
                      color: newPillar.negative === opt.val ? (opt.val ? "#ef4444" : "#10b981") : "#64748b"
                    }}>{opt.label}</button>
                  ))}
                </div>
              </div>

              <div>
                <label style={{ fontSize:"11px", color:"#64748b", fontWeight:600, letterSpacing:"0.08em", display:"block", marginBottom:"6px" }}>KEYWORDS (comma-separated) *</label>
                <textarea value={newPillar.terms} onChange={e => setNewPillar(p=>({...p,terms:e.target.value}))}
                  placeholder="e.g. switch, router, access point, network, networking, wifi"
                  rows={3}
                  style={{ width:"100%", background:"#0f172a", border:"1px solid #334155", borderRadius:"8px", color:"#f8fafc", fontSize:"12px", padding:"9px 12px", outline:"none", resize:"vertical", fontFamily:"monospace", boxSizing:"border-box" }} />
                <div style={{ fontSize:"11px", color:"#475569", marginTop:"4px" }}>
                  {newPillar.terms.split(",").filter(t=>t.trim()).length} terms entered
                </div>
              </div>
            </div>

            {/* Preview */}
            {(newPillar.name || newPillar.terms) && (
              <div style={{ marginTop:"14px", background:"#0f172a", borderRadius:"8px", padding:"12px", borderLeft:`3px solid ${newPillar.color}` }}>
                <div style={{ fontSize:"11px", color:"#475569", marginBottom:"6px", fontWeight:600 }}>PREVIEW</div>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"8px" }}>
                  <span style={{ fontWeight:700, color:"#f8fafc", fontSize:"13px" }}>{newPillar.name || "Untitled"}</span>
                  <span style={{ fontSize:"11px", padding:"2px 8px", borderRadius:"99px", background:`${newPillar.color}18`, color:newPillar.color, border:`1px solid ${newPillar.color}30`, fontFamily:"monospace" }}>
                    {newPillar.negative ? "-" : "+"}{newPillar.weight} pts
                  </span>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"4px" }}>
                  {newPillar.terms.split(",").filter(t=>t.trim()).slice(0,8).map((t,i)=>(
                    <span key={i} style={{ background:"#1e293b", border:"1px solid #334155", color:"#94a3b8", fontSize:"10px", padding:"2px 7px", borderRadius:"4px", fontFamily:"monospace" }}>{t.trim()}</span>
                  ))}
                  {newPillar.terms.split(",").filter(t=>t.trim()).length > 8 && <span style={{ color:"#475569", fontSize:"10px" }}>+{newPillar.terms.split(",").filter(t=>t.trim()).length - 8} more</span>}
                </div>
              </div>
            )}

            <div style={{ display:"flex", gap:"10px", marginTop:"20px" }}>
              <button onClick={() => setShowAddPillar(false)} style={{ flex:1, padding:"10px", background:"transparent", border:"1px solid #334155", borderRadius:"8px", color:"#94a3b8", fontSize:"13px", cursor:"pointer" }}>Cancel</button>
              <button
                onClick={handleAddPillar}
                disabled={!newPillar.name.trim() || !newPillar.terms.trim()}
                style={{
                  flex:2, padding:"10px", borderRadius:"8px", fontSize:"13px", fontWeight:700, cursor:"pointer", border:"none",
                  background: newPillar.name && newPillar.terms ? "linear-gradient(135deg,#f59e0b,#f97316)" : "#334155",
                  color: newPillar.name && newPillar.terms ? "#0f172a" : "#475569"
                }}>
                ✓ Create Pillar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── PRICING MODAL ── */}
      {(showPricingModal || showUpgrade) && (

// ─── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("dashboard");
  const [stateFilter, setStateFilter] = useState("all");
  const [entityFilter, setEntityFilter] = useState("all");
  const [scanning, setScanning] = useState(false);
  const [toast, setToast] = useState(null);

  React.useEffect(() => { window._bidbotSetPage = setPage; }, []);

  const [scanProgress, setScanProgress] = React.useState(0);
  const [scanStatus, setScanStatus] = React.useState("");
  const [scanComplete, setScanComplete] = React.useState(null); // { newLeads: 0 }
  const scanStartRef = React.useRef(null);
  const pollRef = React.useRef(null);
  const progressRef = React.useRef(null);

  const runScan = async () => {
    setScanning(true);
    setScanProgress(0);
    setScanComplete(null);
    setScanStatus("Connecting to scanner...");
    scanStartRef.current = Date.now();

    // Trigger real scan
    try {
      await fetch("https://bidbot-api-378239271278.us-central1.run.app/scan/run",
        { method:"POST", headers:{ "Content-Type":"application/json" } });
      setScanStatus("Scan started — scanning sources...");
    } catch(e) {
      setScanStatus("Scan triggered — monitoring for completion...");
    }

    // Real-time progress bar based on elapsed time (avg 15 min = 900s)
    const AVG_SCAN_MS = 900000;
    const statusMessages = [
      [0,    "Scan started — loading sources..."],
      [5,    "Scanning Georgia districts..."],
      [20,   "Scanning Forsyth, Franklin, Marietta..."],
      [35,   "Scanning Effingham, Wilkes, Warren..."],
      [50,   "Scanning Jefferson, Walton, Lowndes..."],
      [65,   "Scoring and filtering leads..."],
      [75,   "Checking for duplicates..."],
      [85,   "Saving leads to database..."],
      [92,   "Sending email summary..."],
      [97,   "Finishing up..."],
    ];

    progressRef.current = setInterval(() => {
      const elapsed = Date.now() - scanStartRef.current;
      const pct = Math.min(97, Math.floor((elapsed / AVG_SCAN_MS) * 100));
      setScanProgress(pct);
      // Pick status message based on progress
      const msg = statusMessages.reduce((acc, [threshold, text]) =>
        pct >= threshold ? text : acc, statusMessages[0][1]);
      setScanStatus(msg);
    }, 2000);

    // Poll Supabase every 12 seconds for scan completion
    const preLeadCount = (window._LIVE_LEADS || []).length;
    pollRef.current = setInterval(async () => {
      try {
        const res = await window._db.from("scans")
          .select("id, started_at, hot_count, leads_found")
          .order("started_at", { ascending: false })
          .limit(1);

        if (res.data && res.data.length > 0) {
          const latestScan = res.data[0];
          const scanTime = new Date(latestScan.started_at).getTime();
          // If latest scan started after we triggered
          if (scanTime >= scanStartRef.current - 30000) {
            // Check if new leads were added
            const leadsRes = await window._db.from("leads")
              .select("id", { count: "exact" })
              .gte("scan_date", new Date(scanStartRef.current - 60000).toISOString().slice(0,10));

            const newCount = leadsRes.count || latestScan.hot_count || 0;

            clearInterval(pollRef.current);
            clearInterval(progressRef.current);
            setScanProgress(100);
            setScanStatus("Scan complete!");
            setScanComplete({ newLeads: newCount });
          }
        }
      } catch(e) { console.log("Poll error:", e); }
    }, 12000);

    // Safety timeout after 25 minutes
    setTimeout(() => {
      if (pollRef.current) {
        clearInterval(pollRef.current);
        clearInterval(progressRef.current);
        setScanProgress(100);
        setScanStatus("Scan complete!");
        setScanComplete({ newLeads: 0 });
      }
    }, 1500000);
  };

  const handleRefreshAfterScan = () => {
    setScanning(false);
    setScanComplete(null);
    setScanProgress(0);
    setScanStatus("");
    // Reload live data from Supabase
    if (window._db) {
      Promise.all([
        window._db.from("leads").select("scan_date").order("scan_date",{ascending:false}).limit(1),
        window._db.from("leads").select("*").order("scan_date",{ascending:false}).limit(500),
        window._db.from("scans").select("*").order("started_at",{ascending:false}).limit(30)
      ]).then(([dateRes, leadsRes, scansRes]) => {
        const latestDate = dateRes.data?.[0]?.scan_date || null;
        if (latestDate && leadsRes.data) {
          window._LIVE_HOT = leadsRes.data.filter(l => l.scan_date === latestDate && l.tier === "HOT");
          window._LATEST_SCAN_DATE = latestDate;
          window._LIVE_LEADS = leadsRes.data;
          window._ALL_LEADS = leadsRes.data;
        }
        if (scansRes.data) window._LIVE_SCANS = scansRes.data;
        // Force re-render
        window._bidbotSetPage && window._bidbotSetPage("dashboard");
      });
    }
  };

  return (
    <div style={{
      display:"flex", flexDirection:"column", height:"100vh", width:"100%",
      background:"#0a0f1e", color:"#f8fafc",
      fontFamily:"'Segoe UI', system-ui, -apple-system, sans-serif"
    }}>
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { box-shadow: 0 4px 15px rgba(16,185,129,0.4); } 50% { box-shadow: 0 4px 25px rgba(16,185,129,0.8); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        select option { background: #1e293b; color: #f8fafc; }
      `}</style>

      <TopBar stateFilter={stateFilter} setStateFilter={setStateFilter} entityFilter={entityFilter} setEntityFilter={setEntityFilter} />

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
        <Sidebar active={page} setActive={setPage} onRunScan={runScan} scanning={scanning} />

        <main style={{ flex:1, display:"flex", overflow:"hidden", background:"#0a0f1e" }}>
          {page==="dashboard"  && <DashboardView onNavigate={setPage} onRunScan={runScan} scanning={scanning} />}
          {page==="hot_leads"  && <HotLeadsView stateFilter={stateFilter} />}
          {page==="all_bids"   && <HotLeadsView stateFilter={stateFilter} allBids />}
          {page==="sources"    && <SourcesView />}
          {page==="keywords"   && <KeywordsView />}
          {page==="history"    && <ScanHistoryView />}
          {page==="settings"   && <SettingsView />}
        </main>
      </div>

      {/* Toast */}
      {toast && (
        <div style={{
          position:"fixed", bottom:"24px", right:"24px",
          background: toast.type==="success" ? "#10b981" : "#ef4444",
          color:"#fff", padding:"12px 20px", borderRadius:"10px",
          fontSize:"13px", fontWeight:600, boxShadow:"0 8px 24px rgba(0,0,0,0.4)",
          display:"flex", alignItems:"center", gap:"8px", zIndex:9999,
          animation:"slideIn 0.3s ease"
        }}>
          <CheckCircle size={15} /> {toast.msg}
        </div>
      )}
    </div>
  );
}


var _bidbotRoot = null;
function _mountBidBot() {
  var hot=window._LIVE_HOT, all=window._LIVE_LEADS, src=window._LIVE_SOURCES, scn=window._LIVE_SCANS;
  if (hot) { MOCK_HOT_LEADS.length=0; hot.forEach(function(x){MOCK_HOT_LEADS.push(x);}); }
  if (all) { window._ALL_LEADS=all; }
  if (src) { MOCK_SOURCES.length=0; src.forEach(function(x){MOCK_SOURCES.push(x);}); }
  if (scn) { MOCK_SCAN_HISTORY.length=0; scn.forEach(function(x){MOCK_SCAN_HISTORY.push(x);}); }
  if (!_bidbotRoot) {
    _bidbotRoot = ReactDOM.createRoot(document.getElementById("root"));
  }
  _bidbotRoot.render(React.createElement(App));
}
if (window._bidbotData && window._bidbotData.ready) { _mountBidBot(); }
else {
  window._bidbotData.onReady = _mountBidBot;
  setTimeout(function(){ if(window._bidbotData.onReady){window._bidbotData.onReady=null;_mountBidBot();} }, 8000);
}
</script>
