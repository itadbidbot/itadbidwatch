<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window._bidbotData = { ready: false, onReady: null };
const _db = supabase.createClient(
  "https://powcnxmsrxixufcqbxbw.supabase.co",
  "sb_publishable_P_iPFer-s3i8zV8106O_zQ_McYNHXeJ"
);
window._db = _db;
Promise.all([
  _db.from("leads").select("scan_date").order("scan_date",{ascending:false}).limit(1),
  _db.from("leads").select("*").order("scan_date",{ascending:false}).limit(500),
  _db.from("sources").select("*"),
  _db.from("scans").select("*").order("started_at",{ascending:false}).limit(30)
]).then(function(r) {
  var allLeads = r[1].data;
  var latestDate = r[0].data && r[0].data.length ? r[0].data[0].scan_date : null;
  if (latestDate && allLeads) {
    window._LIVE_HOT = allLeads.filter(function(l){ return l.scan_date === latestDate && l.tier === "HOT"; });
    window._LATEST_SCAN_DATE = latestDate;
  }
  if (allLeads && allLeads.length)   window._LIVE_LEADS   = allLeads;
  if (r[2].data && r[2].data.length) window._LIVE_SOURCES = r[2].data;
  if (r[3].data && r[3].data.length) window._LIVE_SCANS   = r[3].data;
  console.log("ITAD Bid Watch: latest=", latestDate, "hot=", (window._LIVE_HOT||[]).length);
}).catch(function(e){ console.warn("Supabase error", e); })
.finally(function(){
  window._bidbotData.ready = true;
  if (window._bidbotData.onReady) window._bidbotData.onReady();
});
</script>

function ScoreBadge({ score }) {
  const color = score >= 70 ? "#10b981" : score >= 50 ? "#f59e0b" : "#64748b";
  return (
    <span style={{
      background:`${color}18`, border:`1px solid ${color}40`,
      color, fontSize:"11px", fontWeight:700, padding:"2px 8px", borderRadius:"99px",
      fontFamily:"'Courier New',monospace"
    }}>{score}</span>
  );
}

function TierBadge({ tier }) {
  return (
    <span style={{
      background: tier==="HOT" ? "rgba(239,68,68,0.15)" : "rgba(245,158,11,0.15)",
      border: tier==="HOT" ? "1px solid rgba(239,68,68,0.3)" : "1px solid rgba(245,158,11,0.3)",
      color: tier==="HOT" ? "#ef4444" : "#f59e0b",
      fontSize:"10px", fontWeight:700, padding:"2px 8px", borderRadius:"4px", letterSpacing:"0.05em"
    }}>{tier}</span>
  );
}

function StatusDot({ status }) {
  const colors = { active:"#10b981", error:"#ef4444", skipped:"#64748b", success:"#10b981", failed:"#ef4444" };
  const labels = { active:"Active", error:"Error", skipped:"Skipped", success:"Success", failed:"Failed" };
  return (
    <span style={{ display:"flex", alignItems:"center", gap:"5px" }}>
      <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:colors[status]||"#64748b", display:"inline-block" }} />
      <span style={{ color:colors[status]||"#64748b", fontSize:"12px" }}>{labels[status]||status}</span>
    </span>
  );
}

function SourcesView() {
  const [sources, setSources] = useState(MOCK_SOURCES);
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [editingId, setEditingId] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [showAddModal, setShowAddModal] = useState(false);
  const [showCsvModal, setShowCsvModal] = useState(false);
  const [stateFilter, setStateFilter] = useState("all");

  const sourceStates = ["all", ...Array.from(new Set(sources.map(s=>s.state).filter(Boolean))).sort()];
  const filtered = sources.filter(s => {
    const matchSearch = !search || (s.friendly_name||"").toLowerCase().includes(search.toLowerCase()) ||
      (s.url||"").toLowerCase().includes(search.toLowerCase()) || (s.state||"").toLowerCase().includes(search.toLowerCase());
    const matchState = stateFilter === "all" || s.state === stateFilter;
    return matchSearch && matchState;
  });

  const allChecked = filtered.length > 0 && filtered.every(s=>selected.has(s.id));
  const toggleAll = () => {
    if (allChecked) setSelected(new Set());
    else setSelected(new Set(filtered.map(s=>s.id)));
  };
  const toggleRow = (id) => {
    const ns = new Set(selected);
    ns.has(id) ? ns.delete(id) : ns.add(id);
    setSelected(ns);
  };

  const startEdit = (s) => { setEditingId(s.id); setEditVal(s.friendly_name); };
  const saveEdit = (id) => {
    setSources(prev=>prev.map(s=>s.id===id?{...s,friendly_name:editVal}:s));
    setEditingId(null);
  };

  return (
    <div style={{ padding:"28px", overflowY:"auto", flex:1 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"20px" }}>
        <div>
          <h1 style={{ fontSize:"22px", fontWeight:700, color:"#f8fafc", margin:"0 0 4px" }}>Bid Scan Sources</h1>
          <p style={{ color:"#64748b", fontSize:"13px", margin:0 }}>{sources.length} sources tracked · {sources.filter(s=>s.status==="active").length} active</p>
        </div>
        <div style={{ display:"flex", gap:"10px" }}>
          <button onClick={()=>setShowCsvModal(true)} style={{
            padding:"8px 16px", borderRadius:"8px", background:"transparent",
            border:"1px solid #334155", color:"#94a3b8", fontSize:"13px", cursor:"pointer",
            display:"flex", alignItems:"center", gap:"6px"
          }}><Upload size={13} /> Upload CSV</button>
          <button onClick={()=>setShowAddModal(true)} style={{
            padding:"8px 16px", borderRadius:"8px",
            background:"linear-gradient(135deg,#f59e0b,#f97316)", border:"none",
            color:"#0f172a", fontSize:"13px", fontWeight:700, cursor:"pointer",
            display:"flex", alignItems:"center", gap:"6px"
          }}><Plus size={13} /> Add Source</button>
        </div>
      </div>

      {/* Search */}
      <div style={{ position:"relative", marginBottom:"16px", maxWidth:"400px" }}>
        <Search size={13} style={{ position:"absolute", left:"10px", top:"50%", transform:"translateY(-50%)", color:"#475569" }} />
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, URL, state…"
          style={{ width:"100%", padding:"8px 12px 8px 32px", background:"#1e293b", border:"1px solid #334155", borderRadius:"8px", color:"#cbd5e1", fontSize:"13px", outline:"none", boxSizing:"border-box" }} />
      </div>

      {/* Bulk action bar */}
      {selected.size > 0 && (
        <div style={{ padding:"10px 16px", background:"#1e3a5f", border:"1px solid #2563eb", borderRadius:"8px", marginBottom:"12px", display:"flex", alignItems:"center", gap:"12px" }}>
          <span style={{ color:"#93c5fd", fontSize:"13px" }}>{selected.size} source{selected.size>1?"s":""} selected</span>
          <button style={{ padding:"5px 12px", background:"#2563eb", border:"none", color:"#fff", fontSize:"12px", borderRadius:"6px", cursor:"pointer" }}>
            <RefreshCw size={11} style={{ marginRight:"5px", verticalAlign:"middle" }} />Re-validate Selected
          </button>
          <button onClick={()=>setSelected(new Set())} style={{ marginLeft:"auto", background:"transparent", border:"none", color:"#64748b", cursor:"pointer", display:"flex", alignItems:"center", gap:"4px", fontSize:"12px" }}>
            <X size={12} /> Clear
          </button>
        </div>
      )}

      {/* Table */}
      <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"12px", overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:"#0f172a" }}>
              <th style={{ padding:"11px 12px", width:"36px" }}>
                <div onClick={toggleAll} style={{ cursor:"pointer", color:"#475569" }}>
                  {allChecked ? <CheckSquare size={14} color="#f59e0b" /> : <Square size={14} />}
                </div>
              </th>
              {["Friendly Name","URL","State","Site Type","Date Added","Last Scanned","Status","Actions"].map(h=>(
                <th key={h} style={{ padding:"11px 12px", textAlign:"left", fontSize:"11px", color:"#475569", fontWeight:600, letterSpacing:"0.06em" }}>{h.toUpperCase()}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((s,i)=>(
              <tr key={s.id} style={{ borderTop:"1px solid #0f172a", background: selected.has(s.id) ? "rgba(37,99,235,0.08)" : i%2===0?"transparent":"rgba(255,255,255,0.01)" }}>
                <td style={{ padding:"10px 12px" }}>
                  <div onClick={()=>toggleRow(s.id)} style={{ cursor:"pointer", color:"#475569" }}>
                    {selected.has(s.id) ? <CheckSquare size={14} color="#f59e0b" /> : <Square size={14} />}
                  </div>
                </td>
                <td style={{ padding:"10px 12px", maxWidth:"200px" }}>
                  {editingId===s.id ? (
                    <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
                      <input value={editVal} onChange={e=>setEditVal(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter")saveEdit(s.id);if(e.key==="Escape")setEditingId(null);}}
                        autoFocus
                        style={{ flex:1, padding:"4px 8px", background:"#0f172a", border:"1px solid #f59e0b", borderRadius:"4px", color:"#f8fafc", fontSize:"12px", outline:"none" }}
                      />
                      <button onClick={()=>saveEdit(s.id)} style={{ background:"#10b981", border:"none", borderRadius:"4px", padding:"4px 6px", cursor:"pointer" }}><Check size={11} color="#fff" /></button>
                      <button onClick={()=>setEditingId(null)} style={{ background:"transparent", border:"none", cursor:"pointer", color:"#64748b" }}><X size={11} /></button>
                    </div>
                  ) : (
                    <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                      <span style={{ fontSize:"13px", color:"#e2e8f0", fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{s.friendly_name}</span>
                      <button onClick={()=>startEdit(s)} style={{ background:"transparent", border:"none", cursor:"pointer", color:"#334155", padding:"2px", flexShrink:0 }}>
                        <Edit2 size={11} />
                      </button>
                    </div>
                  )}
                </td>
                <td style={{ padding:"10px 12px", maxWidth:"220px" }}>
                  <a href={s.url} target="_blank" rel="noreferrer" style={{ color:"#3b82f6", fontSize:"11px", textDecoration:"none", display:"block", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                    {s.url}
                  </a>
                </td>
                <td style={{ padding:"10px 12px" }}>
                  <span style={{ background:"#334155", color:"#94a3b8", fontSize:"11px", fontWeight:700, padding:"2px 7px", borderRadius:"4px", fontFamily:"monospace" }}>{s.state}</span>
                </td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#64748b", fontFamily:"monospace" }}>{s.site_type}</td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#475569", fontFamily:"monospace" }}>{s.date_added}</td>
                <td style={{ padding:"10px 12px", fontSize:"11px", color:"#475569", fontFamily:"monospace" }}>{s.last_scanned}</td>
                <td style={{ padding:"10px 12px" }}>
                  {(s.captcha_protected || s.captcha_protected === true)
                    ? <span style={{ fontSize:"11px", padding:"3px 8px", borderRadius:"99px", background:"rgba(124,58,237,0.15)", color:"#a78bfa", border:"1px solid rgba(124,58,237,0.3)", fontWeight:600 }}>🔒 CAPTCHA</span>
                    : <StatusDot status={s.status || "active"} />
                  }
                </td>
                <td style={{ padding:"10px 12px" }}>
                  <button style={{ background:"transparent", border:"1px solid #334155", color:"#64748b", fontSize:"11px", padding:"3px 8px", borderRadius:"4px", cursor:"pointer", display:"flex", alignItems:"center", gap:"4px" }}>
                    <RefreshCw size={10} />Validate
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Add Modal */}
      {showAddModal && <AddSourceModal onClose={()=>setShowAddModal(false)} onAdd={s=>{setSources(prev=>[...prev,{...s,id:prev.length+1,date_added:new Date().toISOString().slice(0,10),last_scanned:"never",status:"active"}]);setShowAddModal(false);}} />}
      {showCsvModal && <CsvModal onClose={()=>setShowCsvModal(false)} />}
    </div>
  );
}

function AddSourceModal({ onClose, onAdd }) {
  const [step, setStep] = React.useState(1); // 1=basics, 2=type-specific questions, 3=confirm
  const [url, setUrl] = React.useState("");
  const [name, setName] = React.useState("");
  const [state, setState] = React.useState("");
  const [stype, setStype] = React.useState("");
  const [validating, setValidating] = React.useState(false);
  const [error, setError] = React.useState("");

  // Links Page questions
  const [lp_startText, setLpStartText] = React.useState("");
  const [lp_stopText, setLpStopText] = React.useState("");
  const [lp_preClick, setLpPreClick] = React.useState("");
  const [lp_hasExpand, setLpHasExpand] = React.useState("");
  const [lp_docType, setLpDocType] = React.useState("");
  const [lp_hasPagination, setLpHasPagination] = React.useState("");

  // Search Page questions
  const [sp_inputLabel, setSpInputLabel] = React.useState("");
  const [sp_resultsFormat, setSpResultsFormat] = React.useState("");

  // Generic Table questions
  const [gt_titleCol, setGtTitleCol] = React.useState("");
  const [gt_stopText, setGtStopText] = React.useState("");

  const urlValid = url.startsWith("https://") && url.length > 12;

  const buildInstructions = () => {
    if (stype === "links_page") {
      let parts = [];
      if (lp_preClick) parts.push(`Click link containing ${lp_preClick} first`);
      if (lp_startText) parts.push(`Scan starts just below text beginning with ${lp_startText}`);
      parts.push("Scan bid title links on this page");
      if (lp_hasExpand === "yes") parts.push("Click each heading or expand button to reveal bid document links");
      if (lp_docType) parts.push(`Bid documents are ${lp_docType}`);
      if (lp_hasPagination === "yes") parts.push("Check all pages for additional bids");
      if (lp_stopText) parts.push(`Stop scanning when you reach ${lp_stopText}`);
      parts.push("Score content against keyword pillars only");
      return parts.join(". ") + ".";
    }
    if (stype === "search_page") {
      let parts = ["Search for bids using keyword terms"];
      if (sp_inputLabel) parts.push(`Search input is labeled ${sp_inputLabel}`);
      if (sp_resultsFormat) parts.push(`Results appear as ${sp_resultsFormat}`);
      parts.push("Score each result against keyword pillars");
      return parts.join(". ") + ".";
    }
    if (stype === "generic_table") {
      let parts = ["Scan all visible bid rows in the table"];
      if (gt_titleCol) parts.push(`Bid title is in the ${gt_titleCol} column`);
      if (gt_stopText) parts.push(`Stop scanning when you reach ${gt_stopText}`);
      parts.push("Score content against keyword pillars only");
      return parts.join(". ") + ".";
    }
    return "Scan bid links on this page. Score content against keyword pillars.";
  };

  const handleNext = () => {
    if (step === 1) {
      if (!urlValid || !state || !stype || !name.trim()) {
        setError("All fields are required. URL must start with https://");
        return;
      }
      setError("");
      setStep(2);
    } else if (step === 2) {
      setStep(3);
    }
  };

  const [submitError, setSubmitError] = React.useState("");
  const [submitSuccess, setSubmitSuccess] = React.useState(false);

  const handleSubmit = async () => {
    setValidating(true);
    setSubmitError("");
    const instructions = buildInstructions();
    const newSource = {
      url,
      friendly_name: name || url,
      state,
      site_type: stype,
      scan_instructions: instructions,
      captcha_protected: false,
    };
    try {
      if (!window._db) throw new Error("Database connection not ready. Please refresh and try again.");
      console.log("Inserting source:", newSource);
      const res = await window._db.from("sources").insert([newSource]).select();
      console.log("Insert result:", JSON.stringify(res));
      if (res.error) throw new Error(res.error.message || JSON.stringify(res.error));
      if (!res.data || res.data.length === 0) throw new Error("Insert returned no data. Row may not have been created.");
      setValidating(false);
      setSubmitSuccess(true);
      setTimeout(() => {
        onAdd(res.data[0]);
      }, 1500);
    } catch(err) {
      console.error("Save error:", err);
      setValidating(false);
      setSubmitError(err.message || "Failed to save. Please try again.");
    }
  };

  const inputStyle = {
    width:"100%", padding:"9px 12px", background:"#0f172a",
    border:"1px solid #334155", borderRadius:"8px", color:"#f8fafc",
    fontSize:"13px", outline:"none", boxSizing:"border-box"
  };
  const labelStyle = {
    fontSize:"11px", color:"#94a3b8", fontWeight:600,
    display:"block", marginBottom:"6px", letterSpacing:"0.06em"
  };
  const fieldStyle = { marginBottom:"14px" };
  const hintStyle = { fontSize:"11px", color:"#475569", marginTop:"4px", lineHeight:"1.5" };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:"20px" }}>
      <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"16px", padding:"28px", width:"580px", maxWidth:"100%", maxHeight:"90vh", overflowY:"auto" }}>

        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"20px" }}>
          <div>
            <h2 style={{ margin:0, fontSize:"16px", fontWeight:700, color:"#f8fafc" }}>Add New Source</h2>
            <div style={{ fontSize:"11px", color:"#475569", marginTop:"4px" }}>
              Step {step} of 3 — {step===1?"Basic Info":step===2?"Page Configuration":"Review & Add"}
            </div>
          </div>
          <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#64748b", cursor:"pointer", fontSize:"20px" }}>×</button>
        </div>

        {/* Progress */}
        <div style={{ display:"flex", gap:"4px", marginBottom:"24px" }}>
          {[1,2,3].map(s => (
            <div key={s} style={{
              flex:1, height:"3px", borderRadius:"99px",
              background: s <= step ? "#f59e0b" : "#334155",
              transition:"background 0.3s"
            }} />
          ))}
        </div>

        {/* Step 1 — Basic Info */}
        {step === 1 && (
          <div>
            <div style={fieldStyle}>
              <label style={labelStyle}>URL *</label>
              <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://example.com/bids" style={{...inputStyle, borderColor: url && !urlValid ? "#ef4444" : "#334155"}} />
              {url && !urlValid && <div style={{ fontSize:"11px", color:"#ef4444", marginTop:"4px" }}>Must be a valid HTTPS URL</div>}
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>FRIENDLY NAME *</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Lowndes County Schools - Bids" style={inputStyle} />
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"14px", marginBottom:"14px" }}>
              <div>
                <label style={labelStyle}>STATE *</label>
                <select value={state} onChange={e=>setState(e.target.value)} style={{...inputStyle, color: state?"#f8fafc":"#64748b"}}>
                  <option value="">Select state</option>
                  {STATES_LIST.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>PAGE TYPE *</label>
                <select value={stype} onChange={e=>setStype(e.target.value)} style={{...inputStyle, color: stype?"#f8fafc":"#64748b"}}>
                  <option value="">Select type</option>
                  <option value="links_page">Links Page — list of bid title links</option>
                  <option value="search_page">Search Page — has a search box</option>
                  <option value="generic_table">Table Page — bids in a table/grid</option>
                </select>
              </div>
            </div>
            {stype && (
              <div style={{ background:"#0f172a", borderRadius:"8px", padding:"12px", marginBottom:"14px", fontSize:"12px", color:"#64748b", lineHeight:"1.6" }}>
                {stype === "links_page" && "📋 Links Page: The page shows a list of bid titles. Each title is a clickable link leading to bid details or documents."}
                {stype === "search_page" && "🔍 Search Page: The page has a search input. The scanner will type keywords and score the results."}
                {stype === "generic_table" && "📊 Table Page: Bids are displayed in a table or structured grid. The scanner reads each row directly."}
              </div>
            )}
          </div>
        )}

        {/* Step 2 — Type-specific questions */}
        {step === 2 && stype === "links_page" && (
          <div>
            <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#f59e0b", lineHeight:"1.6" }}>
              <strong>Beta Note:</strong> Please answer these questions carefully. Accurate answers ensure the scanner finds the right bids.
              In a future Pro release, AI will determine this automatically.
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>STARTING SECTION HEADING</label>
              <input value={lp_startText} onChange={e=>setLpStartText(e.target.value)}
                placeholder="e.g. Current Open Bids, Active Solicitations, Purchasing"
                style={inputStyle} />
              <div style={hintStyle}>What is the exact heading text above where the bids begin? Leave blank if bids start at the top of the page.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>STOPPING SECTION HEADING</label>
              <input value={lp_stopText} onChange={e=>setLpStopText(e.target.value)}
                placeholder="e.g. Awarded Bids, Closed Solicitations, Past Bids"
                style={inputStyle} />
              <div style={hintStyle}>What heading marks where bids end? The scanner will stop here to avoid picking up awarded or closed bids. Leave blank if there is no end section.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>PRE-NAVIGATION CLICK</label>
              <input value={lp_preClick} onChange={e=>setLpPreClick(e.target.value)}
                placeholder="e.g. Open Solicitations, Current Bids, Active RFPs"
                style={inputStyle} />
              <div style={hintStyle}>Does the scanner need to click a tab, button, or link BEFORE bids appear? If yes, enter the exact text of that button/link. Leave blank if bids are visible immediately.</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>DO BID TITLES EXPAND WHEN CLICKED?</label>
              <div style={{ display:"flex", gap:"8px" }}>
                {[["yes","Yes — clicking a title reveals more info or a document link"],["no","No — each title is a direct link to the bid"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setLpHasExpand(val)} style={{
                    flex:1, padding:"8px 12px", borderRadius:"8px", cursor:"pointer", fontSize:"12px",
                    background: lp_hasExpand===val ? "rgba(245,158,11,0.15)" : "#0f172a",
                    border: `1px solid ${lp_hasExpand===val ? "#f59e0b" : "#334155"}`,
                    color: lp_hasExpand===val ? "#f59e0b" : "#64748b", textAlign:"left"
                  }}>{label}</button>
                ))}
              </div>
              <div style={hintStyle}>Some pages show bid titles that expand (accordion style) to reveal a "Full Bid Information" or document download button. Does this page work that way?</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>BID DOCUMENT TYPE</label>
              <select value={lp_docType} onChange={e=>setLpDocType(e.target.value)} style={{...inputStyle, color: lp_docType?"#f8fafc":"#64748b"}}>
                <option value="">Select document type</option>
                <option value="PDF files">PDF files (.pdf)</option>
                <option value="Google Drive documents">Google Drive documents</option>
                <option value="Word documents">Word documents (.doc/.docx)</option>
                <option value="links to a detail page">Links to a detail page</option>
                <option value="mixed types">Mixed types</option>
                <option value="unknown">Not sure</option>
              </select>
              <div style={hintStyle}>When you click a bid link, what type of document or page opens?</div>
            </div>

            <div style={fieldStyle}>
              <label style={labelStyle}>DOES THE PAGE HAVE MULTIPLE PAGES OF BIDS?</label>
              <div style={{ display:"flex", gap:"8px" }}>
                {[["yes","Yes — has Next/Previous page navigation"],["no","No — all bids on one page"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setLpHasPagination(val)} style={{
                    flex:1, padding:"8px 12px", borderRadius:"8px", cursor:"pointer", fontSize:"12px",
                    background: lp_hasPagination===val ? "rgba(245,158,11,0.15)" : "#0f172a",
                    border: `1px solid ${lp_hasPagination===val ? "#f59e0b" : "#334155"}`,
                    color: lp_hasPagination===val ? "#f59e0b" : "#64748b", textAlign:"left"
                  }}>{label}</button>
                ))}
              </div>
            </div>
          </div>
        )}

        {step === 2 && stype === "search_page" && (
          <div>
            <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#f59e0b" }}>
              <strong>Beta Note:</strong> The scanner will type each keyword from your active pillars into the search box and score the results.
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>SEARCH INPUT LABEL OR PLACEHOLDER</label>
              <input value={sp_inputLabel} onChange={e=>setSpInputLabel(e.target.value)}
                placeholder="e.g. Search by keyword, Search bids, Enter search term"
                style={inputStyle} />
              <div style={hintStyle}>What text appears inside or next to the search box on the page? This helps the scanner find the right input field.</div>
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>HOW DO RESULTS APPEAR?</label>
              <select value={sp_resultsFormat} onChange={e=>setSpResultsFormat(e.target.value)} style={{...inputStyle, color:sp_resultsFormat?"#f8fafc":"#64748b"}}>
                <option value="">Select format</option>
                <option value="a list of linked titles">A list of linked titles</option>
                <option value="a table with columns">A table with columns</option>
                <option value="cards or tiles">Cards or tiles</option>
                <option value="a numbered list">A numbered list</option>
              </select>
              <div style={hintStyle}>After you search, how are the results displayed on the page?</div>
            </div>
          </div>
        )}

        {step === 2 && stype === "generic_table" && (
          <div>
            <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:"8px", padding:"12px", marginBottom:"20px", fontSize:"12px", color:"#f59e0b" }}>
              <strong>Beta Note:</strong> The scanner reads all visible rows. Be specific about where bids start and end.
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>WHICH COLUMN CONTAINS THE BID TITLE?</label>
              <input value={gt_titleCol} onChange={e=>setGtTitleCol(e.target.value)}
                placeholder="e.g. Description, Bid Title, Project Name, first column"
                style={inputStyle} />
              <div style={hintStyle}>What is the column header that contains the bid name or title?</div>
            </div>
            <div style={fieldStyle}>
              <label style={labelStyle}>STOPPING ROW OR SECTION</label>
              <input value={gt_stopText} onChange={e=>setGtStopText(e.target.value)}
                placeholder="e.g. Awarded, Closed, Past Solicitations"
                style={inputStyle} />
              <div style={hintStyle}>Is there a row header or section title where the scanner should stop reading? This prevents picking up awarded or closed bids.</div>
            </div>
          </div>
        )}

        {/* Step 3 — Review */}
        {step === 3 && (
          <div>
            <div style={{ background:"#0f172a", borderRadius:"10px", padding:"16px", marginBottom:"20px" }}>
              <div style={{ fontSize:"12px", color:"#475569", fontWeight:600, marginBottom:"12px", letterSpacing:"0.06em" }}>REVIEW SOURCE CONFIGURATION</div>
              {[
                ["Friendly Name", name],
                ["URL", url],
                ["State", state],
                ["Page Type", stype],
              ].map(([label, val]) => (
                <div key={label} style={{ display:"flex", gap:"12px", marginBottom:"8px" }}>
                  <span style={{ fontSize:"12px", color:"#64748b", minWidth:"100px" }}>{label}:</span>
                  <span style={{ fontSize:"12px", color:"#e2e8f0" }}>{val}</span>
                </div>
              ))}
              <div style={{ marginTop:"12px", paddingTop:"12px", borderTop:"1px solid #1e293b" }}>
                <div style={{ fontSize:"12px", color:"#64748b", marginBottom:"6px" }}>Generated Scan Instructions:</div>
                <div style={{ fontSize:"12px", color:"#94a3b8", lineHeight:"1.6", fontStyle:"italic" }}>{buildInstructions()}</div>
              </div>
            </div>
            <div style={{ background:"rgba(16,185,129,0.08)", border:"1px solid rgba(16,185,129,0.2)", borderRadius:"8px", padding:"12px", fontSize:"12px", color:"#10b981", lineHeight:"1.6" }}>
              Ready to save. Click "Save Source" below to add this to your database.
              The scanner will use your keyword pillars to determine what qualifies as a lead.
            </div>
          </div>
        )}

        {/* Errors */}
        {error && (
          <div style={{ color:"#ef4444", fontSize:"12px", marginBottom:"12px", padding:"8px 12px", background:"rgba(239,68,68,0.1)", borderRadius:"6px", border:"1px solid rgba(239,68,68,0.2)" }}>{error}</div>
        )}
        {submitError && (
          <div style={{ color:"#ef4444", fontSize:"12px", marginBottom:"12px", padding:"10px 14px", background:"rgba(239,68,68,0.1)", borderRadius:"6px", border:"1px solid rgba(239,68,68,0.3)" }}>
            <strong>Save failed:</strong> {submitError}
          </div>
        )}
        {submitSuccess && (
          <div style={{ color:"#10b981", fontSize:"12px", marginBottom:"12px", padding:"10px 14px", background:"rgba(16,185,129,0.1)", borderRadius:"6px", border:"1px solid rgba(16,185,129,0.3)" }}>
            ✓ Source saved successfully! It will be included in your next scan.
          </div>
        )}

        {/* Footer buttons */}
        <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end", marginTop:"20px" }}>
          {step > 1 && (
            <button onClick={()=>setStep(step-1)} style={{ padding:"9px 18px", background:"transparent", border:"1px solid #334155", borderRadius:"8px", color:"#94a3b8", fontSize:"13px", cursor:"pointer" }}>
              ← Back
            </button>
          )}
          <button onClick={onClose} style={{ padding:"9px 18px", background:"transparent", border:"1px solid #334155", borderRadius:"8px", color:"#94a3b8", fontSize:"13px", cursor:"pointer" }}>
            Cancel
          </button>
          {step < 3 ? (
            <button onClick={handleNext} style={{ padding:"9px 18px", background:"linear-gradient(135deg,#f59e0b,#f97316)", border:"none", borderRadius:"8px", color:"#0f172a", fontSize:"13px", fontWeight:700, cursor:"pointer" }}>
              Next →
            </button>
          ) : (
            <button onClick={handleSubmit} disabled={validating || submitSuccess} style={{
              padding:"9px 18px",
              background: submitSuccess ? "linear-gradient(135deg,#10b981,#059669)" :
                          validating ? "#334155" : "linear-gradient(135deg,#f59e0b,#f97316)",
              border:"none", borderRadius:"8px",
              color: validating ? "#64748b" : "#0f172a",
              fontSize:"13px", fontWeight:700,
              cursor: validating || submitSuccess ? "not-allowed" : "pointer",
              display:"flex", alignItems:"center", gap:"6px",
              transition:"all 0.3s"
            }}>
              {submitSuccess ? "✓ Saved Successfully!" : validating ? "Saving..." : "Save Source →"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

const PILLAR_COLORS = ["#f59e0b","#3b82f6","#8b5cf6","#10b981","#ec4899","#06b6d4","#f97316","#84cc16"];

function KeywordsView() {
  const [pillars, setPillars] = useState([]);
  const [negativeTerms, setNegativeTerms] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newTermInputs, setNewTermInputs] = useState({});
  const [newNegTerm, setNewNegTerm] = useState("");
  const [newPillarName, setNewPillarName] = useState("");
  const [showAddPillar, setShowAddPillar] = useState(false);
  const [toast, setToast] = useState(null);
  const [savingPillar, setSavingPillar] = useState(null);
  const [savingNeg, setSavingNeg] = useState(false);
  const toastTimer = React.useRef(null);

  const COLORS = ["#f59e0b","#3b82f6","#10b981","#8b5cf6","#ef4444","#06b6d4","#f97316","#84cc16"];

  const showToast = (msg, color="#10b981", opts={}) => {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast({ msg, color, ...opts });
    if (!opts.persist) {
      const delay = color === "#ef4444" ? 5000 : 3000;
      toastTimer.current = setTimeout(() => setToast(null), delay);
    }
  };

  // Load from Supabase
  React.useEffect(() => {
    if (!window._db) { setLoading(false); return; }
    window._db.from("keywords").select("*").order("weight", { ascending: false })
      .then(({ data, error }) => {
        if (error || !data) { setLoading(false); return; }
        const neg = data.find(r => r.pillar_key === "negative_terms");
        const pos = data.filter(r => r.pillar_key !== "negative_terms" && r.weight >= 0);
        setNegativeTerms(neg ? (Array.isArray(neg.terms) ? neg.terms : JSON.parse(neg.terms || "[]")) : []);
        setPillars(pos.map((r, i) => ({
          key: r.pillar_key,
          name: r.pillar_name,
          terms: Array.isArray(r.terms) ? r.terms : JSON.parse(r.terms || "[]"),
          enabled: r.enabled !== false,
          color: r.color || COLORS[i % COLORS.length],
        })));
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  const togglePillar = (key) => {
    setPillars(prev => prev.map(p => p.key === key ? { ...p, enabled: !p.enabled } : p));
    // Note: user still needs to Save after toggling to persist
  };

  const addTerm = (pillarKey, term, onConfirmed=null) => {
    const t = term.trim().toLowerCase();
    if (!t) return true;
    // Exact match in negative terms — hard block
    if (negativeTerms.some(x => x.toLowerCase() === t)) {
      showToast(`"${t}" is in the Negative Terms list — remove it there first`, "#ef4444");
      return false;
    }
    // Exact match in other pillars — hard block
    const conflict = pillars.find(p => p.key !== pillarKey && p.terms.some(x => x.toLowerCase() === t));
    if (conflict) {
      showToast(`"${t}" already exists in "${conflict.name}" — remove it there first`, "#ef4444");
      return false;
    }
    // Partial match check
    let partialMsg = null;
    const negPartial = negativeTerms.find(x => { const xl = x.toLowerCase(); return xl !== t && (xl.includes(t) || t.includes(xl)); });
    if (negPartial) {
      partialMsg = `A similar term "${negPartial}" was found in Negative Terms — please review before saving`;
    } else {
      for (const p of pillars) {
        if (p.key === pillarKey) continue;
        const match = p.terms.find(x => { const xl = x.toLowerCase(); return xl !== t && (xl.includes(t) || t.includes(xl)); });
        if (match) { partialMsg = `A similar term "${match}" was found in "${p.name}" — please review before saving`; break; }
      }
    }
    const doAdd = () => {
      setPillars(prev => prev.map(p =>
        p.key === pillarKey ? { ...p, terms: [...p.terms.filter(x => x !== t), t] } : p
      ));
      setNewTermInputs(prev => ({ ...prev, [pillarKey]: "" }));
    };
    if (partialMsg) {
      if (onConfirmed) {
        // Save context: block save, ask for confirmation
        showToast(partialMsg, "#f59e0b", {
          persist: true,
          confirmLabel: "Save Anyway",
          onConfirm: () => { doAdd(); setToast(null); onConfirmed(); },
        });
        return "warn";
      } else {
        // Standalone add: add immediately, show dismissable warning
        doAdd();
        showToast(partialMsg, "#f59e0b", { persist: true });
        return true;
      }
    }
    doAdd();
    return true;
  };

  const removeTerm = (pillarKey, term) => {
    setPillars(prev => prev.map(p =>
      p.key === pillarKey ? { ...p, terms: p.terms.filter(t => t !== term) } : p
    ));
  };

  const doSave = (pillarKey) => {
    setSavingPillar(pillarKey);
    // Use functional update to get current state at save time
    setPillars(current => {
      const pillar = current.find(p => p.key === pillarKey);
      if (!pillar) return current;
      window._db.from("keywords").upsert({
        pillar_key: pillar.key,
        pillar_name: pillar.name,
        weight: 1,
        terms: pillar.terms,
        enabled: pillar.enabled,
        color: pillar.color,
        updated_at: new Date().toISOString(),
      }, { onConflict: "pillar_key" })
      .then(() => { showToast(`"${pillar.name}" saved!`); setSavingPillar(null); })
      .catch(() => { showToast("Save failed", "#ef4444"); setSavingPillar(null); });
      return current;
    });
  };

  const savePillar = (pillarKey) => {
    if (!window._db) return;
    const pending = (newTermInputs[pillarKey] || "").trim();
    if (pending) {
      const result = addTerm(pillarKey, pending, () => doSave(pillarKey));
      if (result === false || result === "warn") return;
    }
    doSave(pillarKey);
  };

  const deletePillar = async (key) => {
    if (!window._db) return;
    try {
      await window._db.from("keywords").delete().eq("pillar_key", key);
      setPillars(prev => prev.filter(p => p.key !== key));
      showToast("Pillar removed", "#ef4444");
    } catch(e) {
      showToast("Delete failed", "#ef4444");
    }
  };

  const saveNegatives = async () => {
    if (!window._db) return;
    setSavingNeg(true);
    try {
      await window._db.from("keywords").upsert({
        pillar_key: "negative_terms",
        pillar_name: "Negative Terms",
        weight: -999,
        terms: negativeTerms,
        enabled: true,
        color: "#ef4444",
        updated_at: new Date().toISOString(),
      }, { onConflict: "pillar_key" });
      showToast("Negative terms saved!");
    } catch(e) {
      showToast("Save failed", "#ef4444");
    }
    setSavingNeg(false);
  };

  const addPillar = async () => {
    const name = newPillarName.trim();
    if (!name || !window._db) return;
    const key = "custom_" + name.toLowerCase().replace(/\s+/g, "_") + "_" + Date.now();
    const color = COLORS[pillars.length % COLORS.length];
    const newP = { key, name, terms: [], enabled: true, color };
    try {
      await window._db.from("keywords").insert({
        pillar_key: key, pillar_name: name, weight: 1,
        terms: [], enabled: true, color,
      });
      setPillars(prev => [...prev, newP]);
      setNewPillarName("");
      setShowAddPillar(false);
      showToast(`"${name}" pillar created!`);
    } catch(e) {
      showToast("Create failed", "#ef4444");
    }
  };

  if (loading) return (
    <div style={{ padding:"28px", color:"#64748b", fontSize:"14px" }}>Loading keywords...</div>
  );

  return (
    <div style={{ padding:"28px", overflowY:"auto", flex:1, position:"relative" }}>

      {toast && (
        <div style={{ position:"fixed", bottom:"28px", right:"28px", zIndex:999,
          background: toast.color, color:"#fff", padding:"12px 16px",
          borderRadius:"10px", fontSize:"13px", fontWeight:600,
          boxShadow:"0 4px 20px rgba(0,0,0,0.4)",
          display:"flex", alignItems:"flex-start", gap:"10px", maxWidth:"380px" }}>
          <span style={{ flex:1, lineHeight:"1.4" }}>{toast.msg}</span>
          {toast.onConfirm ? (
            <div style={{ display:"flex", gap:"6px", flexShrink:0 }}>
              <button onClick={toast.onConfirm} style={{
                background:"rgba(255,255,255,0.25)", border:"none", borderRadius:"6px",
                color:"#fff", padding:"3px 10px", fontSize:"12px", fontWeight:700, cursor:"pointer" }}>
                {toast.confirmLabel || "Confirm"}
              </button>
              <button onClick={() => setToast(null)} style={{
                background:"rgba(0,0,0,0.2)", border:"none", borderRadius:"6px",
                color:"#fff", padding:"3px 10px", fontSize:"12px", fontWeight:600, cursor:"pointer" }}>
                Cancel
              </button>
            </div>
          ) : toast.persist ? (
            <span onClick={() => setToast(null)}
              style={{ cursor:"pointer", fontSize:"15px", lineHeight:1, opacity:0.8, flexShrink:0 }}>✕</span>
          ) : null}
        </div>
      )}

      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"24px" }}>
        <div>
          <h1 style={{ fontSize:"22px", fontWeight:700, color:"#f8fafc", margin:"0 0 4px" }}>Keywords & Pillars</h1>
          <p style={{ color:"#64748b", fontSize:"13px", margin:0 }}>
            {pillars.filter(p=>p.enabled).length} of {pillars.length} pillars active · Toggle on to include in scans
          </p>
        </div>
        <button onClick={() => setShowAddPillar(!showAddPillar)} style={{
          padding:"8px 16px", borderRadius:"8px", fontSize:"13px", fontWeight:600,
          cursor:"pointer", display:"flex", alignItems:"center", gap:"7px",
          background:"linear-gradient(135deg,#f59e0b,#f97316)", border:"none", color:"#0f172a",
          boxShadow:"0 3px 12px rgba(245,158,11,0.35)"
        }}>
          + Add Pillar
        </button>
      </div>

      {/* Add Pillar inline */}
      {showAddPillar && (
        <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:"12px",
          padding:"16px 20px", marginBottom:"20px", display:"flex", gap:"10px", alignItems:"center" }}>
          <input value={newPillarName} onChange={e=>setNewPillarName(e.target.value)}
            placeholder="Pillar name e.g. Networking Gear"
            onKeyDown={e=>e.key==="Enter" && addPillar()}
            style={{ flex:1, background:"#0f172a", border:"1px solid #334155", color:"#f8fafc",
              padding:"8px 12px", borderRadius:"8px", fontSize:"13px", outline:"none" }} />
          <button onClick={addPillar} style={{
            padding:"8px 16px", background:"#10b981", border:"none", borderRadius:"8px",
            color:"#fff", fontSize:"13px", fontWeight:600, cursor:"pointer" }}>Create</button>
          <button onClick={()=>setShowAddPillar(false)} style={{
            padding:"8px 12px", background:"transparent", border:"1px solid #334155",
            borderRadius:"8px", color:"#64748b", fontSize:"13px", cursor:"pointer" }}>Cancel</button>
        </div>
      )}

      {/* Pillars grid */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"16px", marginBottom:"24px" }}>
        {[...pillars].sort((a,b) => (b.enabled?1:0)-(a.enabled?1:0)).map(pillar => (
          <div key={pillar.key} style={{
            background:"#1e293b",
            border:`1px solid ${pillar.enabled ? pillar.color+"40" : "#1e293b"}`,
            borderLeft:`3px solid ${pillar.enabled ? pillar.color : "#334155"}`,
            borderRadius:"12px", padding:"18px",
            opacity: pillar.enabled ? 1 : 0.5, transition:"all 0.2s"
          }}>
            {/* Pillar header */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px" }}>
              <div style={{ fontWeight:700, color: pillar.enabled?"#f8fafc":"#475569", fontSize:"14px" }}>
                {pillar.name}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                {/* Toggle */}
                <div onClick={() => togglePillar(pillar.key)} style={{
                  width:"36px", height:"20px", borderRadius:"99px", cursor:"pointer",
                  background: pillar.enabled ? pillar.color : "#334155",
                  position:"relative", transition:"background 0.2s", flexShrink:0
                }}>
                  <div style={{
                    position:"absolute", top:"2px",
                    left: pillar.enabled ? "18px" : "2px",
                    width:"16px", height:"16px", borderRadius:"50%",
                    background:"#fff", transition:"left 0.2s"
                  }}/>
                </div>
              </div>
            </div>

            {/* Terms */}
            <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom:"12px", minHeight:"28px" }}>
              {pillar.terms.map(t => (
                <span key={t} style={{
                  background:"#0f172a", border:"1px solid #334155", color:"#94a3b8",
                  fontSize:"11px", padding:"3px 8px", borderRadius:"4px", fontFamily:"monospace",
                  display:"flex", alignItems:"center", gap:"4px"
                }}>
                  {t}
                  <span onClick={() => removeTerm(pillar.key, t)}
                    style={{ cursor:"pointer", color:"#475569", fontSize:"10px", lineHeight:1 }}>✕</span>
                </span>
              ))}
              {pillar.terms.length === 0 && (
                <span style={{ fontSize:"11px", color:"#334155", fontStyle:"italic" }}>No terms yet</span>
              )}
            </div>

            {/* Add term input */}
            <div style={{ display:"flex", gap:"6px", marginBottom:"10px" }}>
              <input
                value={newTermInputs[pillar.key] || ""}
                onChange={e => setNewTermInputs(prev=>({...prev,[pillar.key]:e.target.value}))}
                onKeyDown={e => e.key==="Enter" && addTerm(pillar.key, newTermInputs[pillar.key]||"")}
                onBlur={e => addTerm(pillar.key, e.target.value)}
                placeholder="Add term..."
                style={{ flex:1, background:"#0f172a", border:"1px solid #1e293b", color:"#94a3b8",
                  padding:"5px 8px", borderRadius:"6px", fontSize:"11px", outline:"none",
                  fontFamily:"monospace" }}
              />
              <button onClick={() => addTerm(pillar.key, newTermInputs[pillar.key]||"")}
                style={{ padding:"5px 10px", background:"#1e293b", border:"1px solid #334155",
                  borderRadius:"6px", color:"#94a3b8", fontSize:"11px", cursor:"pointer" }}>+</button>
            </div>
            <div style={{ fontSize:"10px", color:"#475569", marginBottom:"8px", fontStyle:"italic" }}>
              Press Enter to add keyword before saving
            </div>

            {/* Save + Delete row */}
            <div style={{ display:"flex", justifyContent:"flex-end", gap:"6px" }}>
              <button onClick={() => deletePillar(pillar.key)} style={{
                padding:"4px 8px", background:"transparent", border:"1px solid #334155",
                borderRadius:"6px", color:"#ef4444", fontSize:"11px", cursor:"pointer"
              }}>✕ Remove</button>
              <button onClick={() => savePillar(pillar.key)} disabled={savingPillar===pillar.key} style={{
                padding:"4px 10px", background: savingPillar===pillar.key?"#1e293b":"#10b981",
                border:"none", borderRadius:"6px", color:"#fff", fontSize:"11px",
                fontWeight:600, cursor:"pointer"
              }}>{savingPillar===pillar.key ? "Saving..." : "💾 Save"}</button>
            </div>
          </div>
        ))}
      </div>

      {/* Negative Terms */}
      <div style={{ background:"#1e293b", border:"1px solid #ef444440", borderLeft:"3px solid #ef4444",
        borderRadius:"12px", padding:"18px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px" }}>
          <div>
            <div style={{ fontWeight:700, color:"#f8fafc", fontSize:"14px" }}>🚫 Negative Terms</div>
            <div style={{ fontSize:"11px", color:"#64748b", marginTop:"2px" }}>
              Bids matching any of these terms will be excluded from results
            </div>
          </div>
        </div>

        <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom:"12px", minHeight:"28px" }}>
          {negativeTerms.map(t => (
            <span key={t} style={{
              background:"#0f172a", border:"1px solid #ef444430", color:"#ef4444",
              fontSize:"11px", padding:"3px 8px", borderRadius:"4px", fontFamily:"monospace",
              display:"flex", alignItems:"center", gap:"4px"
            }}>
              {t}
              <span onClick={() => setNegativeTerms(prev => prev.filter(x=>x!==t))}
                style={{ cursor:"pointer", color:"#991b1b", fontSize:"10px" }}>✕</span>
            </span>
          ))}
          {negativeTerms.length === 0 && (
            <span style={{ fontSize:"11px", color:"#334155", fontStyle:"italic" }}>No negative terms</span>

      </div>

    </div>
  );
}
